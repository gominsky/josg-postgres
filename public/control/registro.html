<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de Alumno</title>
  <style>
    body { font-family: sans-serif; background: #f2f2f2; padding: 2rem; }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 1rem;
      border-radius: 0.5rem;
      border: 1px solid #ccc;
    }
    button {
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Registro</h2>
    <p>Introduce tu email, DNI y elige una contraseña para acceder.</p>
    <input type="email" id="email" placeholder="Email" required />
    <input type="text" id="dni" placeholder="DNI" required />
    <input type="password" id="password" placeholder="Contraseña" required />
    <button onclick="registrar()">Registrarme</button>
    <p id="mensaje"></p>
    <button onclick="location.href='index.html'">← Volver</button>
  </div>

  <script>
    async function registrar() {
      const email = document.getElementById('email').value.trim();
      const dni = document.getElementById('dni').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/asistencias/registro-app', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, dni, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem('alumno_id', data.alumno_id);
        window.location.href = 'firma.html';
      } else {
        document.getElementById('mensaje').innerText = data.error || 'Error al registrar';
      }
    }
  </script>
</body>
</html>
