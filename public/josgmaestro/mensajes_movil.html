<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡En tu mano! - Mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    /* === ÚNICO CONTENEDOR CON PENTAGRAMA CLARO (vintage) === */
    .container.with-staff{
      position: relative;
      min-height: 100vh;
      border: 0 !important;            /* evita “marco” exterior */
      box-shadow: none !important;
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(209,145,62,.08), transparent 60%),
        linear-gradient(180deg, #fffaf1 0%, #fffdfb 100%);
    }
    .container.with-staff::before{
      content:"";
      position:absolute; inset:0;
      pointer-events:none; z-index:0;
      /* 5 líneas (pentagrama) + hueco; tono suave */
      background:
        repeating-linear-gradient(
          180deg,
          rgba(0,0,0,.13) 0 1px,  transparent 1px 7px,
          rgba(0,0,0,.13) 7px 8px, transparent 8px 14px,
          rgba(0,0,0,.13) 14px 15px, transparent 15px 21px,
          rgba(0,0,0,.13) 21px 22px, transparent 22px 28px,
          rgba(0,0,0,.13) 28px 29px, transparent 29px 53px
        );
      opacity:.24;
    }

    /* Capa de símbolos a nivel contenedor (única) */
    .with-staff .motifs-layer{
      position:absolute; inset:0; z-index:1; pointer-events:none;
    }
    .with-staff .motifs-layer .motif{
      position:absolute; font-size:40px; line-height:1;
      opacity:.16; filter: blur(.1px);
    }

    /* Todo el contenido por encima del fondo y símbolos */
    .with-staff .topbar,
    .with-staff .hero{ position:relative; z-index:2; }

    /* ⛔️ Elimina cualquier fondo/caja que genere el “recuadro interior” */
    .with-staff .hero,
    .with-staff .hero-content{
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }
    .with-staff .hero::before,
    .with-staff .hero::after{ content:none !important; }
    .with-staff .panel,
    .with-staff .panel-blanco{ display:none !important; } /* por si quedara en el HTML */

    /* ===== Estilos base del formulario (transparente) ===== */
    .form-vertical { display:flex; flex-direction:column; gap:12px; }
    input.form-control, textarea.form-control { width:100%; box-sizing:border-box; }
    textarea#cuerpo{
      min-height:20vh; font-size:1rem; line-height:1.45; padding:.8rem 1rem;
      background: transparent;
    }

    .chips{ display:flex; gap:.5rem; flex-wrap:wrap; }
    .chip{ padding:.5rem .8rem; border:1px solid #e6e6e6; border-radius:999px; background:#fafafa; cursor:pointer; user-select:none; }
    .chip.active{ background:#ffd893; border-color:#ffb84d; }

    .help{ font-size:.9rem; color:#6c757d; }
    .actions{ display:flex; gap:.6rem; flex-wrap:wrap; margin-top:10px; }

    .toast-fixed{
      position:fixed; top:16px; right:16px; z-index:2000; min-width:240px;
      background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46;
      border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,.12);
      padding:.65rem .8rem; display:none; font-size:.95rem;
    }
    .toast-fixed.error{ background:#fef2f2; border-color:#fecaca; color:#7f1d1d; }
    .toast-fixed.show{ display:block; }

    .button-base { display:inline-block; padding:0.6rem 1.4rem; border-radius:12px; font-weight:600; color:#fff; border:none; cursor:pointer; box-shadow:0 4px 12px rgba(0,0,0,.15); transition:transform .12s ease, box-shadow .12s ease; }
    .button-base:hover { transform: translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .button-base:active { transform: translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .button-send { background: linear-gradient(180deg,#ffb24a,#f59e0b); border:1px solid #f59e0b; }
    .button-cancel { background: linear-gradient(180deg,#f28d63,#ea6b38); border: 1px solid #cc5c2f; }

    /* — Línea única de separación entre cabecera y cuerpo — */
    .page-sep{
      height:1px; background: rgba(0,0,0,.28);
      margin:8px 10px 10px;
    }
    /* ——— Modo compacto: todo más arriba, sin cambiar tipografías ——— */
.compact .topbar{
  margin-bottom: 4px !important;   /* reduce hueco bajo la topbar */
}

.compact .hero{
  margin-top: 0 !important;
  padding-top: 2px !important;     /* acerca logo/títulos a la topbar */
  background: transparent !important;  /* por si quedaba algún fondo */
  box-shadow: none !important;
  border: 0 !important;
}

.compact .hero-logo{
  /* no cambiamos tamaño, solo márgenes */
  margin: 0 0 4px 0 !important;
}

.compact .hero h1,
.compact .hero p{
  margin: 0 0 2px 0 !important;    /* comprime títulos/subtítulo */
}

.compact .page-sep{
  margin: 4px 10px 6px !important; /* la línea queda pegada a la cabecera */
}

.compact .hero-content{
  padding-top: 6px !important;     /* acerca el cuerpo a la línea */
}
/* — Modo ultra-compacto: subir todo hacia arriba — */
.compact.tight .topbar{ margin-bottom:2px !important; }
.compact.tight .hero{
  margin-top:0 !important;
  padding-top:0 !important;
  background:transparent !important;
  box-shadow:none !important;
  border:0 !important;
}
.compact.tight .hero-logo{ margin:0 0 2px 0 !important; }
.compact.tight .hero h1,
.compact.tight .hero p{ margin:0 0 1px 0 !important; }
.compact.tight .page-sep{ margin:2px 10px 4px !important; }
.compact.tight .hero-content{ padding-top:4px !important; }
/* — Centrar el formulario de login y su acción — */
.hero{ display:flex; flex-direction:column; align-items:center; }
.hero .form-vertical{ width:100%; max-width:420px; margin:0 auto; }
.form-actions{ justify-content:center; }
/* Línea de separación entre cabecera y cuerpo */
.page-sep{
  height: 1px;
  background: rgba(0,0,0,.28);
  margin: 8px 10px 10px;
}

/* Ajustes cuando usamos los modos compactos */
.compact .page-sep{ margin: 4px 10px 6px; }
.compact.tight .page-sep{ margin: 2px 10px 4px; }

  </style>
</head>
<body>
  <div class="container with-staff compact tight">


    <!-- Motivos musicales a nivel contenedor -->
    <div class="motifs-layer" aria-hidden="true"></div>

    <!-- Topbar -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- Cabecera (sin contenedor interior) -->
    <div class="hero" aria-label="Mensajes">
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Enviar mensajes</p>
      <div class="page-sep" aria-hidden="true"></div>

      <!-- Cuerpo (formulario transparente) -->
      <div class="hero-content" style="padding:8px 10px 12px;">
        <div id="toast" class="toast-fixed" role="status" aria-live="polite"></div>

        <form id="msg-form" class="form-vertical" autocomplete="off">
          <label for="titulo"><strong>Título</strong></label>
          <input id="titulo" class="form-control" maxlength="80" placeholder="p. ej., Recordatorio de ensayo" required />

          <label for="cuerpo"><strong>Mensaje</strong></label>
          <textarea id="cuerpo" class="form-control" maxlength="2000" placeholder="Escribe el mensaje…" required></textarea>

          <label for="url"><strong>Enlace (opcional)</strong></label>
          <input id="url" class="form-control" placeholder="https://…" />
          <div class="help">Se mostrará como botón “Abrir”.</div>

          <div>
            <p><strong>Destinatarios</strong></p>
            <div class="chips" id="chips"></div>
            <div id="chips-help" class="help"></div>
          </div>

          <div class="form-actions actions">
            <button type="submit" class="button-base button-send">Enviar</button>
            <button type="button" class="button-base button-cancel" onclick="window.history.back()">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Pill + logout -->
  <script>
    (function(){
      const $  = s => document.querySelector(s);
      async function cargarUsuarioPill(){
        const pill = $('#user-pill'); if(!pill) return;
        let nombre = localStorage.getItem('usuario_nombre') || '';
        try{
          const r = await fetch('/josgmaestro/api/yo', { credentials:'same-origin' });
          if (r.ok) { const me = await r.json(); if (me?.nombre) nombre = me.nombre; }
        }catch(e){}
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre.trim()[0]||'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
      }
      function bindLogout(){
        const btn = document.getElementById('btn-logout');
        if (!btn) return;
        btn.addEventListener('click', ()=>{
          fetch('/josgmaestro/logout', { method:'POST', credentials:'include' })
            .finally(()=>{ localStorage.clear(); location.href='index.html'; });
        });
      }
      document.addEventListener('DOMContentLoaded', cargarUsuarioPill);
      document.addEventListener('DOMContentLoaded', bindLogout);
    })();
  </script>

  <!-- Lógica envío mensajes -->
  <script>
    const $  = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));
    const API_BASE = '/josgmaestro/api';
    const usuario_id = localStorage.getItem('usuario_id');
    const rol        = localStorage.getItem('rol') || '';
    if (!usuario_id) location.href = 'index.html';

    const state = { scope: null, grupos: [] };

    function toast(msg, ok=true){
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'toast-fixed show' + (ok ? '' : ' error');
      clearTimeout(toast._t); toast._t = setTimeout(()=> t.classList.remove('show'), 3000);
    }
    const ensureProto = u => /^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(u) ? u : 'https://' + u;

    /* ====== Chips de destinatarios ====== */
    function bindChips(){
      $$('#chips .chip').forEach(ch => ch.addEventListener('click', ()=>{
        $$('#chips .chip').forEach(c => c.classList.remove('active'));
        ch.classList.add('active');
        state.scope = ch.getAttribute('data-scope');
      }));
    }
    async function cargarChips(){
      const cont = $('#chips'); const help = $('#chips-help');
      cont.innerHTML = ''; help.textContent = '';
      try{
        if (rol === 'admin') {
          cont.insertAdjacentHTML('beforeend', `<span class="chip active" data-scope="todos">Todos</span>`);
          const r = await fetch(`${API_BASE}/grupos`, { cache:'no-store', credentials:'same-origin' });
          const nombres = await r.json();
          state.scope = 'todos'; state.grupos = nombres;
          for (const nombre of nombres) cont.insertAdjacentHTML('beforeend', `<span class="chip" data-scope="${nombre}">${nombre}</span>`);
          help.textContent = 'Selecciona “Todos” o un grupo concreto.';
        } else if (rol === 'docente') {
          const r = await fetch(`${API_BASE}/mis-grupos`, { cache:'no-store', credentials:'same-origin' });
          const grupos = await r.json();
          state.scope = grupos[0]?.nombre || null; state.grupos = grupos.map(g => g.nombre);
          for (const g of grupos) cont.insertAdjacentHTML('beforeend', `<span class="chip${state.scope===g.nombre?' active':''}" data-scope="${g.nombre}">${g.nombre}</span>`);
          help.textContent = grupos.length ? 'Solo puedes enviar a tus grupos.' : 'No tienes grupos asignados.';
        } else {
          help.textContent = 'Tu rol no permite enviar mensajes.';
        }
      }catch(e){
        console.error(e); help.textContent = 'No se pudieron cargar los grupos.';
      } finally { bindChips(); }
    }
    cargarChips();

    /* ====== Autenticación y envío ====== */
    function authHeaders() {
      const h = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
      const t = localStorage.getItem('token');
      if (t) h['Authorization'] = 'Bearer ' + t;
      return h;
    }
    async function enviarMensaje(body) {
      const opts = {
        method: 'POST',
        headers: authHeaders(),
        credentials: 'include',
        body: JSON.stringify(body)
      };
      let res = await fetch('/josgmaestro/api/mensajes', opts).catch(() => null);
      if (!res || res.status === 404) {
        res = await fetch('/mensajes', opts).catch(() => null);
      }
      return res;
    }

    /* ====== Submit ====== */
    document.getElementById('msg-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const btn = ev.submitter; const old = btn.textContent;
      btn.disabled = true; btn.textContent = 'Enviando…';

      try {
        const titulo = $('#titulo').value.trim();
        const cuerpo = $('#cuerpo').value.trim();
        const urlRaw = $('#url').value.trim();
        if (!titulo) throw new Error('Añade un título');
        if (!cuerpo) throw new Error('Escribe el mensaje');
        if (!state.scope) throw new Error('Selecciona un grupo de destinatarios');

        const isTodos = (rol === 'admin') && state.scope === 'todos';
        const grupoNombre = isTodos ? null : state.scope;

        const body = {
          titulo,
          cuerpo,
          url: urlRaw ? ensureProto(urlRaw) : null,
          broadcast: isTodos,
          grupo_nombre: grupoNombre,
          grupos_nombres: isTodos ? [] : (grupoNombre ? [grupoNombre] : []),
          grupos: []
        };

        const r = await enviarMensaje(body);
        if (!r) throw new Error('Sin respuesta del servidor');
        if (r.status === 401 || r.status === 403) {
          toast('No autenticado. Vuelve a iniciar sesión.', false);
          setTimeout(() => location.href = 'index.html', 600);
          return;
        }
        const j = await r.json().catch(() => ({}));
        if (!r.ok || j.success === false) throw new Error(j.error || `Error HTTP ${r.status}`);

        toast(`✅ Enviado${j.enviados ? ' a ' + j.enviados + ' alumno(s)' : ''}.`);
        $('#titulo').value = '';
        $('#cuerpo').value = '';
        $('#url').value = '';
      } catch (e) {
        console.error(e);
        toast('❌ ' + (e.message || 'No se pudo enviar'), false);
      } finally {
        btn.disabled = false; btn.textContent = old;
      }
    });
  </script>

  <!-- Motivos musicales (30–40 px) en el CONTENEDOR exterior (3–5 símbolos) -->
  <script>
    (function(){
      const ROOT = document.querySelector('.container.with-staff');
      if(!ROOT) return;
      const LAYER = ROOT.querySelector('.motifs-layer');

      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 3, COUNT_MAX = 5;   /* menos motivos */
      const SIZE_MIN = 30, SIZE_MAX = 40;
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        if(!ROOT || !LAYER) return;
        LAYER.innerHTML='';

        /* Dejamos visibles en cabecera; solo evitamos el formulario/acciones */
        const avoid=[];
        ['form','.actions'].forEach(sel=>{
          const el=ROOT.querySelector(sel); if(!el)return;
          const r=rel(el,ROOT); avoid.push({x:r.x-12,y:r.y-12,w:r.w+24,h:r.h+24});
        });

        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS);
          s.style.opacity='0'; LAYER.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, ROOT.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, ROOT.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,ROOT);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>ROOT.clientWidth-EDGE_PAD||rr.y+rr.h>ROOT.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) LAYER.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
