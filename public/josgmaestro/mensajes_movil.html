<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOSG Maestro - Mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    .form-vertical { display:flex; flex-direction:column; gap:12px; }
    .panel-blanco{
      background:#fff; border:1px solid rgba(0,0,0,.08);
      border-radius:16px; padding:16px 18px;
    }
    input.form-control, textarea.form-control { width:100%; box-sizing:border-box; }
    textarea#cuerpo{ min-height:20vh; font-size:1rem; line-height:1.45; padding:.8rem 1rem; }

    .chips{ display:flex; gap:.5rem; flex-wrap:wrap; }
    .chip{
      padding:.5rem .8rem; border:1px solid #e6e6e6; border-radius:999px;
      background:#fafafa; cursor:pointer; user-select:none;
    }
    .chip.active{ background:#ffd893; border-color:#ffb84d; }

    .help{ font-size:.9rem; color:#6c757d; }
    .actions{ display:flex; gap:.6rem; flex-wrap:wrap; margin-top:10px; }

    .toast-fixed{
      position:fixed; top:16px; right:16px; z-index:2000; min-width:240px;
      background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46;
      border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,.12);
      padding:.65rem .8rem; display:none; font-size:.95rem;
    }
    .toast-fixed.error{ background:#fef2f2; border-color:#fecaca; color:#7f1d1d; }
    .toast-fixed.show{ display:block; }

  .button-base {
    display: inline-block;
    padding: 0.6rem 1.4rem;
    border-radius: 12px;      /* mismo radio que portal */
    font-weight: 600;
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .button-base:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(0,0,0,.2);
  }
  .button-base:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
  }

  /* Estilo para ENVIAR */
  .button-send {
    background: linear-gradient(180deg,#ffb24a,#f59e0b);
    border:1px solid #f59e0b;
  }

  /* Estilo para CANCELAR (igual a Eventos del portal) */
  .button-cancel {
    background: linear-gradient(180deg,#f28d63,#ea6b38);
    border: 1px solid #cc5c2f;
  }
</style>
</head>
<body>
  <div class="container">
    <h2>JOSG Maestro - Mensajes</h2>
    <div id="toast" class="toast-fixed" role="status" aria-live="polite"></div>

    <form id="msg-form" class="form-vertical panel-blanco" autocomplete="off">
      <label for="titulo"><strong>Título</strong></label>
      <input id="titulo" class="form-control" maxlength="80" placeholder="p. ej., Recordatorio de ensayo" required />

      <label for="cuerpo"><strong>Mensaje</strong></label>
      <textarea id="cuerpo" class="form-control" maxlength="2000" placeholder="Escribe el mensaje…" required></textarea>

      <label for="url"><strong>Enlace (opcional)</strong></label>
      <input id="url" class="form-control" placeholder="https://…" />
      <div class="help">Se mostrará como botón “Abrir”.</div>

      <div>
        <p><strong>Destinatarios</strong></p>
        <div class="chips" id="chips"><!-- chips dinámicos --></div>
        <div id="chips-help" class="help"></div>
      </div>

      <div class="form-actions">
        <button type="submit" class="button-base button-send">Enviar</button>
        <button type="button" class="button-base button-cancel" onclick="window.history.back()">Cancelar</button>
      </div>
    </form>
  </div>

  <script>
    const $  = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));

    // Prefijo de API según ubicación (móvil bajo /josgmaestro/)
    const API_BASE = '/josgmaestro/api';
    // Sesión
    const usuario_id = localStorage.getItem('usuario_id');
    const rol        = localStorage.getItem('rol') || '';
    if (!usuario_id) location.href = 'index.html';

    // Estado UI
    const state = { scope: null, grupos: [] }; // scope: 'todos' | nombreGrupo

    function toast(msg, ok=true){
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'toast-fixed show' + (ok ? '' : ' error');
      clearTimeout(toast._t); toast._t = setTimeout(()=> t.classList.remove('show'), 3000);
    }
    const ensureProto = u => /^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(u) ? u : 'https://' + u;

    function bindChips(){
      $$('#chips .chip').forEach(ch => ch.addEventListener('click', ()=>{
        $$('#chips .chip').forEach(c => c.classList.remove('active'));
        ch.classList.add('active');
        state.scope = ch.getAttribute('data-scope'); // 'todos' | nombre del grupo
      }));
    }

    async function cargarChips(){
      const cont = $('#chips');
      const help = $('#chips-help');
      cont.innerHTML = ''; help.textContent = '';
      try{
        if (rol === 'admin') {
          // Admin: "Todos" + todos los grupos existentes
          cont.insertAdjacentHTML('beforeend', `<span class="chip active" data-scope="todos">Todos</span>`);
          const r = await fetch(`${API_BASE}/grupos`, { cache:'no-store', credentials:'same-origin' });
          const nombres = await r.json(); // ["JOSG","OEG",...]
          state.scope = 'todos';
          state.grupos = nombres;
          for (const nombre of nombres) {
            cont.insertAdjacentHTML('beforeend', `<span class="chip" data-scope="${nombre}">${nombre}</span>`);
          }
          help.textContent = 'Selecciona “Todos” o un grupo concreto.';
        } else if (rol === 'docente') {
          // Docente: solo sus grupos
          const r = await fetch(`${API_BASE}/mis-grupos`, { cache:'no-store', credentials:'same-origin' });
          const grupos = await r.json(); // [{id,nombre}]
          state.scope = grupos[0]?.nombre || null;
          state.grupos = grupos.map(g => g.nombre);
          for (const g of grupos) {
            cont.insertAdjacentHTML('beforeend', `<span class="chip${state.scope===g.nombre?' active':''}" data-scope="${g.nombre}">${g.nombre}</span>`);
          }
          if (!grupos.length) {
            help.textContent = 'No tienes grupos asignados.';
          } else {
            help.textContent = 'Solo puedes enviar a tus grupos.';
          }
        } else {
          help.textContent = 'Tu rol no permite enviar mensajes.';
        }
      }catch(e){
        console.error(e);
        help.textContent = 'No se pudieron cargar los grupos.';
      } finally {
        bindChips();
      }
    }
    cargarChips();

    // Envío
    $('#msg-form').addEventListener('submit', async ev=>{
      ev.preventDefault();
      const titulo = $('#titulo').value.trim();
      const cuerpo = $('#cuerpo').value.trim();
      const url    = $('#url').value.trim();

      if (!titulo){ toast('Añade un título', false); return; }
      if (!cuerpo){ toast('Escribe el mensaje', false); return; }
      if (!state.scope){
        toast('Selecciona un grupo de destinatarios', false); return;
      }

      const isTodos = (rol === 'admin') && state.scope === 'todos';
      const grupoNombre = isTodos ? null : state.scope;

      const body = {
        // usuario_id,  ← quitar
        titulo,
        cuerpo,
        url: url ? ensureProto(url) : null,
        broadcast: isTodos,
        grupo_nombre: grupoNombre,
        grupos_nombres: isTodos ? [] : (grupoNombre ? [grupoNombre] : []),
        grupos: []
      };

      const btn = ev.submitter;
      const old = btn.textContent;
      btn.disabled = true; btn.textContent = 'Enviando…';

      try{
        const r = await fetch(`${API_BASE}/mensajes`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          credentials:'same-origin',
          body: JSON.stringify(body)
        });
        const j = await r.json();
        if (!r.ok || !j.success) throw new Error(j.error || 'No se pudo enviar');

        toast(`✅ Enviado${j.enviados ? ' a ' + j.enviados + ' alumno(s)' : ''}.`);
        $('#titulo').value=''; $('#cuerpo').value=''; $('#url').value='';

        // Reset selección
        if (rol === 'admin') {
          state.scope = 'todos';
          $$('#chips .chip').forEach(c => c.classList.remove('active'));
          const chipTodos = $$('#chips .chip').find(c => c.getAttribute('data-scope')==='todos');
          chipTodos && chipTodos.classList.add('active');
        } else if (rol === 'docente') {
          // deja la selección actual (o la primera)
          if (!state.scope && state.grupos.length){
            state.scope = state.grupos[0];
            $$('#chips .chip').forEach(c => c.classList.toggle('active', c.getAttribute('data-scope')===state.scope));
          }
        }
      }catch(e){
        console.error(e);
        toast('❌ ' + e.message, false);
      }finally{
        btn.disabled = false; btn.textContent = old;
      }
    });
  </script>
</body>
</html>
