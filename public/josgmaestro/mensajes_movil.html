    .button-base:hover { transform: translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }

<body>
<div class="container">
<!-- Topbar -->
<div class="topbar">
<div class="user-pill" id="user-pill" style="display:none;">
<span class="avatar"></span><span class="name"></span>
</div>
<button aria-label="Cerrar sesión" class="icon-btn" id="btn-logout" title="Cerrar sesión">⎋</button>
</div>
<!-- Hero con formulario dentro -->
<div aria-label="Mensajes" class="hero">
<div aria-hidden="true" class="motifs-layer"></div>
<img alt="JOSG" class="hero-logo" src="../imagenes/logoJOSG.png"/>
<h1>¡En tu mano!</h1>
<p>Enviar mensajes</p>
<div class="panel">
<div aria-live="polite" class="toast-fixed" id="toast" role="status"></div>
<form autocomplete="off" class="form-vertical" id="msg-form">
<label for="titulo"><strong>Título</strong></label>
<input class="form-control" id="titulo" maxlength="80" placeholder="p. ej., Recordatorio de ensayo" required=""/>
<label for="cuerpo"><strong>Mensaje</strong></label>
<textarea class="form-control" id="cuerpo" maxlength="2000" placeholder="Escribe el mensaje…" required=""></textarea>
<label for="url"><strong>Enlace (opcional)</strong></label>
<input class="form-control" id="url" placeholder="https://…"/>
<div class="help">Se mostrará como botón “Abrir”.</div>
<div>
  <label for="adjuntos"><strong>Archivos adjuntos</strong></label>
  <input id="adjuntos" class="form-control" type="file" multiple accept=".pdf,image/*,audio/*"/>
  <div class="adjuntos-help">Hasta 5 archivos • máx. 10&nbsp;MB cada uno • PDF, imágenes o audio</div>
  <ul id="adjuntos-list" class="adjuntos-list"></ul>
</div>
<div>
<label for="destinatario"><strong>Destinatarios</strong></label>

</div>

<!-- Pill + logout -->
<script>
    (function(){
      const $  = s => document.querySelector(s);
      async function cargarUsuarioPill(){
        const pill = $('#user-pill'); if(!pill) return;
        let nombre = localStorage.getItem('usuario_nombre') || '';
        try{
          const r = await fetch('/josgmaestro/api/yo', { credentials:'same-origin' });
          if (r.ok) { const me = await r.json(); if (me?.nombre) nombre = me.nombre; }
        }catch(e){}
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre.trim()[0]||'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
      }
      function bindLogout(){
        const btn = document.getElementById('btn-logout');
        if (!btn) return;
        btn.addEventListener('click', ()=>{
          fetch('/josgmaestro/logout', { method:'POST', credentials:'include' })
            .finally(()=>{ localStorage.clear(); location.href='/josgentumano/login.html'; });
        });
      }
      document.addEventListener('DOMContentLoaded', cargarUsuarioPill);
      document.addEventListener('DOMContentLoaded', bindLogout);
    })();
  </script>
<!-- Lógica envío mensajes -->
<script>
    const $  = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));
    const API_BASE = '/josgmaestro/api';
    const usuario_id = localStorage.getItem('usuario_id');
    const rol        = localStorage.getItem('rol') || '';
    if (!usuario_id) location.href = '/josgentumano/login.html';

    const state = { scope: null, grupos: [], adjuntos: [] };

/* === Adjuntos === */
const MAX_FILES = 5; const MAX_SIZE = 10 * 1024 * 1024;
const ACCEPTED = ['application/pdf', 'image/', 'audio/'];
const $listAdj = () => document.getElementById('adjuntos-list');
function formatBytes(n){ if(!n && n!==0) return ''; const u=['B','KB','MB','GB']; let i=0; while(n>=1024&&i<u.length-1){n/=1024;i++;} return (Math.round(n*10)/10)+' '+u[i]; }
function allowedType(t){ return ACCEPTED.some(a=> a.endsWith('/') ? t.startsWith(a) : t===a); }
function renderAdjuntos(){ const ul=$listAdj(); if(!ul) return; ul.innerHTML=''; state.adjuntos.forEach((f,i)=>{ const li=document.createElement('li'); li.innerHTML=`<span class="meta">${f.name} · ${formatBytes(f.size)}</span><button class="remove" aria-label="Quitar" data-i="${i}">Quitar</button>`; ul.appendChild(li); }); ul.querySelectorAll('.remove').forEach(b=> b.addEventListener('click', (e)=>{ const i=Number(e.currentTarget.dataset.i); state.adjuntos.splice(i,1); renderAdjuntos(); })); }
document.addEventListener('change', (e)=>{ if(e.target && e.target.id==='adjuntos'){ const files=Array.from(e.target.files||[]); for(const f of files){ if(state.adjuntos.length>=MAX_FILES){ toast('Máximo 5 adjuntos.', false); break; } if(f.size>MAX_SIZE){ toast(`'${f.name}' supera 10 MB`, false); continue; } if(!allowedType(f.type)){ toast(`Tipo no permitido: ${f.type||'desconocido'}`, false); continue; } // evitar duplicados por nombre+size+mtime
 const dup = state.adjuntos.some(x=> x.name===f.name && x.size===f.size && x.lastModified===f.lastModified); if(!dup) state.adjuntos.push(f); }
 renderAdjuntos(); e.target.value=''; } });
async function uploadAdjuntos(){ if(!state.adjuntos.length) return []; const fd = new FormData(); state.adjuntos.forEach(f=> fd.append('files', f, f.name)); const token = localStorage.getItem('token'); const headers = token ? { 'Authorization': 'Bearer '+token } : {}; let resp=null; try{ resp = await fetch(`${API_BASE}/uploads`, { method:'POST', body: fd, headers, credentials:'include' }); }catch(e){} if(!resp || !resp.ok){ try{ resp = await fetch(`/api/uploads`, { method:'POST', body: fd, headers, credentials:'include' }); }catch(e){} }
 if(!resp || !resp.ok){ throw new Error('No se pudieron subir los adjuntos'); }
 const j = await resp.json().catch(()=>null); const arr = (j && (j.files||j)) || []; return arr.map(x=> x.url || x.href || x.path).filter(Boolean); }


    function toast(msg, ok=true){
      const t = $('#toast');
      t.textContent = msg;
      t.className = 'toast-fixed show' + (ok ? '' : ' error');
      clearTimeout(toast._t); toast._t = setTimeout(()=> t.classList.remove('show'), 3000);
    }
    const ensureProto = u => /^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(u) ? u : 'https://' + u;

    
    /* ====== Destinatarios (desplegable) ====== */

  function bindDestinatario(){
    const sel = document.querySelector('#destinatario');
    if (!sel) return;
    sel.addEventListener('change', ()=>{
      state.scope = sel.value || null;
    });
  }

  // Normaliza arrays de grupos a nombres (acepta strings u objetos)
  function toNombres(arr){
    if (!Array.isArray(arr)) return [];
    return arr.map(g => {
      if (typeof g === 'string') return g;
      if (g && typeof g === 'object') return g.nombre || g.name || '';
      return '';
    }).filter(Boolean);
  }

  async function getRolSeguro(){
    // lee, normaliza y si no hay, intenta /josgmaestro/api/yo
    let r = (localStorage.getItem('rol') || '').toLowerCase();
    if (r) return r;
    try{
      const me = await fetch(`${API_BASE}/yo`, { credentials:'include', headers: authHeaders() });
      if (me.ok){
        const j = await me.json().catch(()=>null);
        r = (j?.rol || j?.role || '').toLowerCase();
        if (r) localStorage.setItem('rol', r);
      }
    }catch(e){}
    return r;
  }

  async function cargarDestinatario(){
    const sel  = document.querySelector('#destinatario');
    const help = document.querySelector('#destinatario-help');
    if (!sel) return;
    sel.innerHTML = ''; help.textContent = ''; sel.disabled = false;

    const rol = await getRolSeguro();

    try{
      if (rol === 'admin'){
        // Opción “Todos”
        const optTodos = document.createElement('option');
        optTodos.value = 'todos'; optTodos.textContent = 'Todos';
        sel.appendChild(optTodos);

        // Pido grupos con auth header + cookies
        const r = await fetch(`${API_BASE}/grupos`, {
          cache:'no-store',
          credentials:'include',
          headers: authHeaders()
        });
        const data = await r.json().catch(()=>[]);
        const nombres = toNombres(data);

        state.scope  = 'todos';
        state.grupos = nombres;

        for (const nombre of nombres){
          const o = document.createElement('option');
          o.value = nombre; o.textContent = nombre;
          sel.appendChild(o);
        }
        sel.value = 'todos';
        help.textContent = 'Selecciona “Todos” o un grupo concreto.';
      } else if (rol === 'docente'){
        const r = await fetch(`${API_BASE}/mis-grupos`, {
          cache:'no-store',
          credentials:'include',
          headers: authHeaders()
        });
        const data   = await r.json().catch(()=>[]);
        const nombres = toNombres(data); // por si el endpoint devuelve [{nombre}]

        state.grupos = nombres;
        state.scope  = nombres[0] || null;

        for (const nombre of nombres){
          const o = document.createElement('option');
          o.value = nombre; o.textContent = nombre;
          sel.appendChild(o);
        }
        if (state.scope) sel.value = state.scope;

        sel.disabled = nombres.length === 0;
        help.textContent = nombres.length
          ? 'Solo puedes enviar a tus grupos.'
          : 'No tienes grupos asignados.';
      } else {
        sel.disabled = true;
        help.textContent = 'Tu rol no permite enviar mensajes.';
      }
    } catch(e){
      console.error(e);
      help.textContent = 'No se pudieron cargar los grupos.';
      sel.disabled = true;
    } finally {
      bindDestinatario();
    }
  }

  // Lanza la carga tras definir authHeaders() en el fichero
  document.addEventListener('DOMContentLoaded', cargarDestinatario);

    /* ====== Autenticación y envío ====== */
    function authHeaders() {
      const h = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
      const t = localStorage.getItem('token');
      if (t) h['Authorization'] = 'Bearer ' + t;
      return h;
    }
    async function enviarMensaje(body) {
      const opts = {
        method: 'POST',
        headers: authHeaders(),
        credentials: 'include',         // envía cookie/sesión
        body: JSON.stringify(body)
      };
      // API principal
      let res = await fetch('/josgmaestro/api/mensajes', opts).catch(() => null);
      // Fallback legacy si no existe el endpoint o devuelve 404
      if (!res || res.status === 404) {
        res = await fetch('/mensajes', opts).catch(() => null);
      }
      return res;
    }

    /* ====== Submit ====== */
    document.getElementById('msg-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const btn = ev.submitter; const old = btn.textContent;
      btn.disabled = true; btn.textContent = 'Enviando…';

      try {
        const titulo = $('#titulo').value.trim();
        const cuerpo = $('#cuerpo').value.trim();
        const urlRaw = $('#url').value.trim();
        if (!titulo) throw new Error('Añade un título');
        if (!cuerpo) throw new Error('Escribe el mensaje');
        if (!state.scope) throw new Error('Selecciona un grupo de destinatarios');

        const isTodos = (rol === 'admin') && state.scope === 'todos';
        const grupoNombre = isTodos ? null : state.scope;

        const body = {
          titulo,
          cuerpo,
          url: urlRaw ? ensureProto(urlRaw) : null,
          broadcast: isTodos,
          grupo_nombre: grupoNombre,
          grupos_nombres: isTodos ? [] : (grupoNombre ? [grupoNombre] : []),
          grupos: []
        };

        const r = await enviarMensaje(body);
        if (!r) throw new Error('Sin respuesta del servidor');
        if (r.status === 401 || r.status === 403) {
          toast('No autenticado. Vuelve a iniciar sesión.', false);
          setTimeout(() => location.href = '/josgentumano/login.html', 600);
          return;
        }
        const j = await r.json().catch(() => ({}));
        if (!r.ok || j.success === false) throw new Error(j.error || `Error HTTP ${r.status}`);

        toast(`✅ Enviado${j.enviados ? ' a ' + j.enviados + ' alumno(s)' : ''}.`);
        $('#titulo').value = '';
        $('#cuerpo').value = '';
        $('#url').value = '';
      } catch (e) {
        console.error(e);
        toast('❌ ' + (e.message || 'No se pudo enviar'), false);
      } finally {
        btn.disabled = false; btn.textContent = old;
      }
    });
  </script>
<!-- Push (SW / VAPID) -->
<script>
/* === Push desde servidor: SOLO /sw.js + autodetección de VAPID y endpoints === */
(function(){
  const API_BASES = ['/josgmaestro/api', '/api'];

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }
  async function ensurePermission(){
    if (!('Notification' in window)) return false;
    if (Notification.permission === 'granted') return true;
    try { const res = await Notification.requestPermission(); return res === 'granted'; }
    catch { return false; }
  }
  async function getRegistration(){
    if (!('serviceWorker' in navigator)) return null;
    const existing = await navigator.serviceWorker.getRegistration();
    if (existing) return existing;
    // Registrar solamente tu SW global
    return await navigator.serviceWorker.register('/sw.js');
  }
  async function getVapid(){
    const meta = document.querySelector('meta[name="vapid"]');
    if (meta && meta.content) return meta.content.trim();
    for (const base of API_BASES){
      try{
        const r = await fetch(`${base}/push/vapid-public-key`, { credentials:'include' });
        if (r.ok){ const t = (await r.text()).trim(); if (t) return t.replace(/['"]/g, ''); }
      }catch(e){}
    }
    return null;
  }
  async function subscribeIfNeeded(reg, vapid){
    let sub = await reg.pushManager.getSubscription();
    if (!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapid)
      });
    }
    return sub;
  }
  async function sendSubscription(sub){
    for (const base of API_BASES){
      try{
        const resp = await fetch(`${base}/push/subscribe`, {
          method:'POST',
          headers:{ 'content-type':'application/json' },
          credentials:'include',
          body: JSON.stringify({ subscription: sub, topic: 'mensajes' })
        });
        if (resp.ok) return true;
      }catch(e){}
    }
    return false;
  }
  async function setupPush(){
    if (!('PushManager' in window)) return;
    if (!(await ensurePermission())) return;
    const reg = await getRegistration(); if (!reg) return;
    const vapid = await getVapid(); if (!vapid) return;
    const sub = await subscribeIfNeeded(reg, vapid);
    await sendSubscription(sub);
  }
  // Primera interacción del usuario
  let done=false;
  const boot=()=>{ if(done) return; done=true; setupPush(); };
  window.addEventListener('click', boot, { once:true });
  window.addEventListener('keydown', boot, { once:true });
  window.addEventListener('touchstart', boot, { once:true });
})();
</script>
<!-- Motivos musicales (maestro: 30–40 px) -->
<script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 30, SIZE_MAX = 40;  /* solicitado */
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p','.panel .form-vertical','.panel .actions'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
