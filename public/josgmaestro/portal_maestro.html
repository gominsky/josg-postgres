<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOSG Maestro - Portal</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    .topbar{ display:flex; justify-content:space-between; align-items:center; }
    .icon-btn{
      border:1px solid #e5e7eb; background:transparent; color:#111;
      width:36px; height:36px; border-radius:10px; font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .hero{ text-align:center; margin:16px 0 8px; }
    .hero h1{
      margin:0; font-weight:600; letter-spacing:.4px; line-height:1.05;
      font-size: clamp(28px, 6.2vw, 44px);
    }
    .grid-actions{
      display:grid; grid-template-columns: repeat(2, 1fr);
      gap:14px; margin:16px 0 18px;
    }
    .action{
      display:flex; align-items:center; justify-content:center; text-align:center;
      min-height:96px; border-radius:18px; text-decoration:none; position:relative;
      font-weight:600; letter-spacing:.1px; color:#fff; user-select:none;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }
    .action:hover{ transform: translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,.16); }
    .action:active{ transform: translateY(0); }
    .action--orange{
      background: linear-gradient(180deg,#ffb24a,#f59e0b);
      border:1px solid #f59e0b;
    }
    .action--accent{
      background: linear-gradient(180deg,#f28d63,#ea6b38);
      border:1px solid #cc5c2f;
    }
    .section-title{ margin:8px 0; font-weight:700; }
    .upcoming{
      display:flex; gap:12px; overflow-x:auto; padding-bottom:6px; scrollbar-width:thin;
    }
    .poster{
      flex:0 0 220px; background:linear-gradient(180deg,#fff,#fdf8f2);
      border:1px solid #eee; border-radius:16px; box-shadow:0 2px 8px rgba(0,0,0,.06);
      padding:12px; display:flex; flex-direction:column; justify-content:space-between;
      text-decoration:none; color:inherit;
    }
    .poster .date{ display:flex; align-items:baseline; gap:8px; }
    .poster .num{ font-size:54px; font-weight:800; line-height:1; letter-spacing:-1px; color:#000; }
    .poster .meta{ display:flex; flex-direction:column; gap:2px; text-transform:uppercase; font-weight:700; color:#b45309; font-size:12px; }
    .poster .title{ margin-top:8px; font-weight:700; line-height:1.2; min-height:2.4em; color:#000; }
    .poster .line{ height:2px; background:repeating-linear-gradient(90deg,#000 0 8px, transparent 8px 12px); opacity:.25; margin:6px 0; }
    .poster .venue{ color:#6b7280; font-size:.9rem; }
    .muted{ color:#6b7280; font-size:.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
            <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG" style="max-width:140px; margin-bottom:10px;">
            <div style="display:flex; flex-direction:column; align-items:flex-end;">
              <div id="user-box" class="muted" style="margin-bottom:4px; font-weight:600;"></div>
              <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
            </div>
          </div>
    <div class="hero">
      <h1>Maestro</h1>
    </div>

    <div class="grid-actions">
      <a class="action action--orange" href="mensajes_movil.html">Mensajes</a>
      <a class="action action--accent" href="eventos.html">Eventos</a>
    </div>

    <h3 class="section-title">Próximos eventos</h3>
    <div id="upcoming" class="upcoming"></div>
    <div id="no-events" class="muted" style="display:none;">No tienes eventos próximos.</div>
  </div>
<script>
  (function () {
    const API_BASE = '/josgmaestro/api';
    // Sesión
    const usuario_id = localStorage.getItem('usuario_id');
    if (!usuario_id) { location.href = 'index.html'; return; }

    // Logout
    const $logout = document.getElementById('btn-logout');
    if ($logout) {
      $logout.addEventListener('click', () => {

        fetch('/josgmaestro/logout', { method: 'POST', credentials: 'include' })
        .finally(() => {
            localStorage.clear();
            location.href = 'index.html';
        });
      });
    }

    // Nombre de usuario
    const nombre = localStorage.getItem('usuario_nombre');
    const box = document.getElementById('user-box');
    if (box) box.textContent = nombre ? `Usuario: ${nombre}` : `Usuario #${usuario_id}`;

    // *** RUTA CORRECTA (sin /api duplicado) ***
    const API_EVENTOS = `${API_BASE}/eventos`;

    const meses = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
    const dias  = ['dom','lun','mar','mié','jue','vie','sáb'];

    function posterHTML(ev){
      const d = new Date(ev.start);
      const diaNum = d.getDate();
      const mesTxt = meses[d.getMonth()];
      const dowTxt = dias[d.getDay()];
      const hora   = d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      const venue = ev.espacio || ev.lugar || ev.sala || ev.ubicacion || ev.grupo_nombre || '';
      return `
        <a class="poster" href="evento_detalle.html?id=${ev.id}">
          <div>
            <div class="date">
              <div class="num">${diaNum}</div>
              <div class="meta">
                <span>${mesTxt}</span>
                <span>${dowTxt} · ${hora}</span>
              </div>
            </div>
            <div class="title">${ev.title || ev.titulo || 'Evento'}</div>
            <div class="line"></div>
          </div>
          ${venue ? `<div class="venue">${venue}</div>` : ''}
        </a>`;
    }

    function normalizarEventos(data){
      const arr = Array.isArray(data) ? data : [];
      return arr.map(e=>{
        const id = e.id ?? e.ID ?? e.Id;
        const start = e.start ?? e.fecha_inicio ?? e.inicio;
        const end   = e.end   ?? e.fecha_fin   ?? e.fin;
        const grupo_nombre = e.grupo_nombre ?? e.grupo ?? e.group_name ?? null;
        const title = e.title ?? (e.titulo && grupo_nombre ? `${e.titulo} (${grupo_nombre})` : (e.titulo || 'Evento'));
        const espacio = e.espacio ?? e.lugar ?? e.sala ?? e.ubicacion ?? e?.extendedProps?.espacio ?? null;
        return { id, title, start, end, espacio, grupo_nombre };
      }).filter(ev => ev.id != null && ev.start);
    }

    function filtrarProximos(eventos){
      const hoy = new Date();
      const hoy0 = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
      // Próximos (>= hoy)
      const futuros = eventos
        .filter(ev => new Date(ev.start).getTime() >= hoy0.getTime())
        .sort((a,b) => new Date(a.start) - new Date(b.start));
      if (futuros.length) return futuros.slice(0, 8);
      // Fallback: recientes (14 días hacia atrás)
      const desde = new Date(hoy0); desde.setDate(desde.getDate() - 14);
      const recientes = eventos
        .filter(ev => {
          const t = new Date(ev.start).getTime();
          return t >= desde.getTime() && t < hoy0.getTime();
        })
        .sort((a,b) => new Date(b.start) - new Date(a.start));
      return recientes.slice(0, 8);
    }

    async function cargarProximos(){
      const wrap  = document.getElementById('upcoming');
      const empty = document.getElementById('no-events');
      if (!wrap || !empty) return;

      wrap.innerHTML = '';
      empty.style.display = 'none';

      try{
        const res = await fetch(`${API_EVENTOS}`, {
          headers: { 'Accept': 'application/json' },
          cache: 'no-store',
          credentials: 'same-origin'
        });
        if (res.status === 401) {
          localStorage.clear();
          location.href = 'index.html';
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw  = await res.json().catch(()=>[]);
        const norm = normalizarEventos(raw);
        const proximos = filtrarProximos(norm);

        if (!proximos.length) { empty.style.display='block'; return; }
        wrap.innerHTML = proximos.map(posterHTML).join('');
      }catch(e){
        console.error('No se pudieron cargar eventos', e);
        empty.textContent = 'No se pudieron cargar los eventos.';
        empty.style.display = 'block';
      }
    }

    document.addEventListener('DOMContentLoaded', cargarProximos);
  })();
</script>

</body>
</html>
