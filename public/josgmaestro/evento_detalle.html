<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡En tu mano! - Detalles del evento</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <style>
    .hero .panel{ position:relative; z-index:2; }
    .hero .motifs-layer{ pointer-events:none; }

    .space-card{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:12px;
      border:1px solid #e6eefb; background:linear-gradient(180deg,#ffffff,#f5f9ff 85%);
      box-shadow:0 3px 10px rgba(0,0,0,.08);
      text-decoration:none; color:#f59e0b; max-width:100%;
      transition: transform .12s ease, box-shadow .12s ease;
      margin:.25rem 0 .5rem;
    }
    .space-card:hover{ transform:translateY(-1px); box-shadow:0 8px 16px rgba(0,0,0,.12); }
    .space-card svg{ width:14px; height:14px; fill:currentColor; opacity:.9; }
    .space-card .meta{ font-weight:700; line-height:1.2; }

    /* ⬇️ SIEMPRE 2 columnas (también en móvil) */
    .grid-actions{
      display:grid; grid-template-columns: repeat(2, minmax(0,1fr));
      gap:12px; margin:12px 0 18px;
    }
    .action{
      display:flex; align-items:center; justify-content:center; min-height:96px;
      border-radius:18px; text-decoration:none; font-weight:700; color:#fff; user-select:none;
      box-shadow:0 6px 18px rgba(0,0,0,.12); transition: transform .12s ease, box-shadow .12s ease;
      padding: 1rem 1.25rem; position: relative;
    }
    .action:hover{ transform: translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,.16); }
    .action--orange{ background: linear-gradient(180deg,#ffb24a,#f59e0b); border:1px solid #f59e0b; }
    .action--red   { background: linear-gradient(180deg,#ef4444,#b91c1c); border:1px solid #b91c1c; }
    .action--accent{ background: linear-gradient(180deg,#f28d63,#ea6b38); border:1px solid #cc5c2f; }

    .count-badge{ position:absolute; top:8px; right:10px; display:inline-block; background:#111; color:#fff; border:1px solid #000; padding:.1rem .5rem; border-radius:999px; font-size:.82rem; font-weight:800; line-height:1.1; }

    /* Cabeceras y lista */
    .grupo-head{ margin:.2rem 0 .4rem; }
    .grupo-valor{ font-weight:800; font-size:1.15rem; }
    .firma-header, .item-firma{ display:grid; grid-template-columns: 56px 1fr; gap:10px; align-items:center; }
    .firma-header{ padding:.35rem .25rem; border-bottom:1px solid #eee; margin-top:.25rem; }
    .item-firma{ padding:.4rem .25rem; border-bottom:1px dashed #eee; }

    .btn {
      display:inline-block; padding:0.6rem 1.4rem; border-radius:12px;
      font-weight:600; color:#fff; border:none; cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      transition:transform .12s ease, box-shadow .12s ease;
      text-decoration:none; text-align:center; min-width:110px;
    }
    .btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .btn:active { transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .btn-primary { background: linear-gradient(180deg,#ffb24a,#f59e0b); border:1px solid #f59e0b; }
    .btn-accent  { background: linear-gradient(180deg,#f28d63,#ea6b38); border:1px solid #cc5c2f; }

    /* ⬇️ Slot del QR dentro de la grid, ocupa toda la fila cuando se muestra */
    #qr-slot{
      display:none; grid-column: 1 / -1;
      background:#fff; border:1px solid #e5e7eb; border-radius:14px;
      padding:12px; place-items:center;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Topbar -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- Hero envolviendo toda la funcionalidad -->
    <div class="hero" aria-label="Firmar asistencia">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Detalles del evento</p>

      <div class="panel">
        <h2 id="titulo" style="margin:.25rem 0 .35rem;">Firmar asistencia</h2>

        <div id="info-evento"></div>

        <a id="space-card" class="space-card" href="#" target="_blank" rel="noopener" style="display:none;">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
          <span class="meta" id="space-name"></span>
        </a>

        <p id="qr-estado" class="subtitulo" style="margin:.25rem 0 .25rem;"></p>

        <!-- Botonera 2x2 + SLOT QR debajo de los 2 primeros -->
        <div class="grid-actions" id="quick-actions">
          <!-- 1 -->
          <a href="#" class="action action--orange" id="card-toggle-qr"
             onclick="toggleQR(); if(window.syncCards) syncCards(); return false;">
            <div class="content"><div class="title" id="label-toggle-qr">Activar QR</div></div>
          </a>
          <!-- 2 -->
          <a href="#" class="action action--orange" id="card-show-qr"
             onclick="mostrarQR(); if(window.syncCards) syncCards(); return false;">
            <div class="content"><div class="title" id="label-show-qr">Mostrar QR</div></div>
          </a>

          <!-- ⬇️ Aquí se abrirá el QR (debajo de los dos primeros) -->
          <div id="qr-slot" aria-live="polite"></div>

          <!-- 3 -->
          <a href="#" class="action action--orange" id="card-toggle-alumnos"
             onclick="toggleAlumnos(); if(window.syncCards) syncCards(); return false;">
            <div class="content"><div class="title" id="label-toggle-alumnos">Ocultar músicos</div></div>
            <span id="badge-alumnos-card" class="count-badge" style="display:none;"></span>
          </a>
          <!-- 4 -->
          <a href="#" class="action action--accent" id="card-ver-asistencias" onclick="verAsistencias(); return false;">
            <div class="content"><div class="title">Ver registro de firmas</div></div>
          </a>
        </div>

        <form id="form-asistencias">
          <div id="lista-alumnos"></div>

          <div style="margin-top: 1rem;">
            <label for="observaciones_generales"><strong>Observaciones generales:</strong></label><br>
            <textarea id="observaciones_generales" rows="8" style="width: 100%; font-size:1rem; min-height:180px;"></textarea>
          </div>
        </form>

        <p id="mensaje"></p>

        <div class="actions" style="margin-top:.9rem;">
          <button id="btn-guardar" class="btn btn-primary" onclick="document.getElementById('form-asistencias').requestSubmit();">Guardar cambios</button>
          <button onclick="location.href='eventos.html'" class="btn btn-accent">← Volver</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Estado cards + pill + logout -->
  <script>
    (function(){
      function setCard(el, titleEl, text, onClass, offClass, isOn){
        if(titleEl) titleEl.textContent = text;
        if(!el) return;
        el.classList.remove('action--orange','action--red','action--accent');
        el.classList.add(isOn ? onClass : offClass);
      }
      function syncCards(){
        const active  = !!window.__qrActivo;
        const visible = !!window.__qrVisible;
        const listVis = !window.__alumnosOcultos;
        setCard(document.getElementById('card-toggle-qr'),document.getElementById('label-toggle-qr'),active ? 'Desactivar QR' : 'Activar QR','action--orange','action--red',active);
        setCard(document.getElementById('card-show-qr'),document.getElementById('label-show-qr'),visible ? 'Ocultar QR' : 'Mostrar QR','action--red','action--orange',visible);
        setCard(document.getElementById('card-toggle-alumnos'),document.getElementById('label-toggle-alumnos'),listVis ? 'Ocultar músicos' : 'Mostrar músicos','action--red','action--orange',listVis);
      }
      window.syncCards = syncCards;
      document.addEventListener('DOMContentLoaded', syncCards);
      window.addEventListener('load', syncCards);
      setInterval(syncCards, 600);

      async function cargarUsuarioPill(){
        const pill = document.getElementById('user-pill'); if(!pill) return;
        let nombre = localStorage.getItem('usuario_nombre') || '';
        try{
          const r = await fetch('/josgmaestro/api/yo', { credentials:'same-origin' });
          if(r.ok){ const me = await r.json(); if(me?.nombre) nombre = me.nombre; }
        }catch(e){}
        if(!nombre) return;
        pill.querySelector('.avatar').textContent = (nombre.trim()[0]||'U').toUpperCase();
        pill.querySelector('.name').textContent = nombre;
        pill.style.display = 'inline-flex';
      }
      function bindLogout(){
        const btn = document.getElementById('btn-logout');
        if(!btn) return;
        btn.addEventListener('click', ()=>{
          fetch('/josgmaestro/logout', { method:'POST', credentials:'include' })
            .finally(()=>{ localStorage.clear(); location.href='index.html'; });
        });
      }
      document.addEventListener('DOMContentLoaded', cargarUsuarioPill);
      document.addEventListener('DOMContentLoaded', bindLogout);
    })();
  </script>

  <!-- Lógica de datos -->
  <script>
    const API_BASE = '/josgmaestro/api';
    let evento_id = new URLSearchParams(location.search).get('id') || '';
    let tokenQR = '';

    window.__qrActivo = false;
    window.__qrVisible = false;
    window.__alumnosOcultos = true;
    const estadoInicial = new Map();

    document.addEventListener('DOMContentLoaded', () => {
      cargarEventoYAlumnos();
      document.getElementById('form-asistencias').addEventListener('submit', guardarAsistencias);
    });

    function verAsistencias(){ location.href = `asistencias_evento.html?id=${evento_id}`; }
    function toggleAlumnos(){ window.__alumnosOcultos = !window.__alumnosOcultos; applyToggleState(); if(window.syncCards) syncCards(); }
    function applyToggleState() {
      const lista=document.getElementById('lista-alumnos');
      if(lista) lista.style.display = window.__alumnosOcultos ? 'none' : '';
    }

    async function cargarEventoYAlumnos() {
      try{
        const eventoRes = await fetch(`${API_BASE}/eventos/${evento_id}`, { credentials:'same-origin' });
        const evento = await eventoRes.json();

        document.getElementById('titulo').innerText = evento.titulo || 'Firmar asistencia';
        const f  = normalizarFecha(evento.fecha_inicio);
        const h1 = normalizarHora(evento.hora_inicio);
        const h2 = normalizarHora(evento.hora_fin);
        const partes = []; if (f) partes.push(f); if (h1) partes.push(h1);
        const inicioLinea = partes.join(' ') + (h2 ? ' - ' + h2 : '');

        document.getElementById('info-evento').innerHTML = `
          <p class="grupo-head"><strong class="grupo-valor">${(evento.grupo_nombre||'').toString()}</strong></p>
          <p><strong>Inicio:</strong> ${inicioLinea}</p>`;

        document.getElementById('observaciones_generales').value = evento.observaciones || '';

        const espacioNombre = (evento.espacio || evento.espacio_nombre || evento.lugar || evento.sala || '').toString().trim();
        const rawUbic = (evento.espacio_ubicacion || evento.ubicacion || evento.espacio_url || evento.ubicacion_url || '').toString().trim();
        const mapsHref = mapsHrefFrom(rawUbic, espacioNombre);
        const sc = document.getElementById('space-card'); const sn = document.getElementById('space-name');
        if (sc && sn) {
          if (mapsHref) { sc.href = mapsHref; sc.style.display = ''; sc.setAttribute('target','_blank'); sc.setAttribute('rel','noopener'); }
          else { sc.removeAttribute('href'); sc.removeAttribute('target'); sc.removeAttribute('rel'); sc.style.display = espacioNombre ? '' : 'none'; }
          sn.textContent = espacioNombre || 'Ver ubicación';
        }

        tokenQR = evento.token || '';
        window.__qrActivo = Boolean(evento.activo);
        document.getElementById('qr-estado').innerText = window.__qrActivo ? 'QR activo' : 'QR desactivado';
        if (!window.__qrActivo) { ocultarQR(); }
        window.__qrVisible = false;

        await actualizarListaAlumnos();
        if(window.syncCards) syncCards();
      }catch(e){ console.error('Error al cargar evento o alumnos', e); }
    }

    async function actualizarListaAlumnos(){
      const res = await fetch(`${API_BASE}/eventos/${evento_id}/alumnos`, { credentials:'same-origin' });
      if(!res.ok){ console.error('No se pudieron cargar alumnos'); return; }
      const alumnos = await res.json();

      const lista = alumnos.map(a => {
        const delay = Number.isFinite(a.minutos_perdidos) && a.minutos_perdidos > 0 ? `<span class="count-badge">+${a.minutos_perdidos} min</span>` : '';
        return `
          <div class="item-firma">
            <div class="firma-check"><input type="checkbox" name="alumno_id" value="${a.id}" ${a.asistio ? 'checked' : ''} /></div>
            <div class="firma-nombre">${a.nombre} ${a.apellidos}${delay}</div>
          </div>`;
      }).join('');
      document.getElementById('lista-alumnos').innerHTML = `
        <div class="firma-header">
          <div class="firma-check"><strong>Firma</strong></div>
          <div class="firma-nombre"><strong>Nombre</strong></div>
        </div>${lista}`;

      estadoInicial.clear();
      document.querySelectorAll('#lista-alumnos input[type=checkbox][name="alumno_id"]').forEach(ch => {
        estadoInicial.set(ch.value, ch.checked);
      });

      const badge = document.getElementById('badge-alumnos-card');
      if (badge) { badge.textContent = String(alumnos.length); badge.style.display = 'inline-block'; }

      applyToggleState();
    }

    // === Mostrar/Ocultar QR en el SLOT ===
    function ocultarQR(){
      const slot = document.getElementById('qr-slot');
      slot.style.display = 'none';
      slot.innerHTML = '';
      window.__qrVisible = false;
    }
    function mostrarQR() {
      const slot = document.getElementById('qr-slot');
      if (slot.style.display === 'block') { ocultarQR(); }
      else {
        slot.innerHTML = '';
        const datosQR = { evento_id: evento_id, token: tokenQR };
        QRCode.toCanvas(JSON.stringify(datosQR), { width: 200 }, function (err, canvas) {
          if (!err) slot.appendChild(canvas); else slot.textContent = 'Error generando QR';
        });
        slot.style.display = 'block';
        window.__qrVisible = true;
        slot.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }
      if(window.syncCards) syncCards();
    }
    async function toggleQR() {
      window.__qrActivo = !window.__qrActivo;
      document.getElementById('qr-estado').innerText = window.__qrActivo ? 'QR activo' : 'QR desactivado';
      if (!window.__qrActivo) { ocultarQR(); }
      if(window.syncCards) syncCards();
    }

    async function updateAusenciaAsignacion(alumnoId, ausenciaTipoId){
      const payload = { ausencia_tipo_id: ausenciaTipoId };
      const opts = { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify(payload) };
      const urls = [
        `${API_BASE}/eventos/${evento_id}/asignaciones/${alumnoId}`,
        `${API_BASE}/asignaciones/${alumnoId}`,
        `${API_BASE}/evento-asignaciones/${alumnoId}`
      ];
      for (const u of urls){ try { const r = await fetch(u, opts); if (r.ok) return true; } catch(_) {} }
      return false;
    }

    async function guardarAsistencias(e) {
      e.preventDefault();
      const mensaje = document.getElementById('mensaje'); mensaje.innerText = ''; mensaje.className = '';

      const checks = document.querySelectorAll('#lista-alumnos input[type=checkbox][name="alumno_id"]');
      const registros = []; const tareasAusencia = [];
      checks.forEach(ch => {
        const id = ch.value; const antes = estadoInicial.get(id); const ahora = ch.checked;
        if (antes !== ahora) {
          const rec = { alumno_id: id, evento_id: evento_id, asistio: ahora, observaciones: '', ausencia_tipo_id: null };
          if (ahora === false) { tareasAusencia.push(updateAusenciaAsignacion(id, null)); }
          registros.push(rec);
        }
      });

      try{
        if (registros.length) {
          const res = await fetch(`${API_BASE}/firmar-alumnos`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials:'same-origin', body: JSON.stringify({ registros })
          });
          const data = await res.json();
          if (!data?.success) throw new Error(data?.error || 'Error al guardar firmas.');
        }
        if (tareasAusencia.length) await Promise.allSettled(tareasAusencia);

        const observacionesGenerales = document.getElementById('observaciones_generales').value;
        await fetch(`${API_BASE}/eventos/${evento_id}/observaciones-generales`, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          credentials:'same-origin', body: JSON.stringify({ observaciones: observacionesGenerales })
        });

        checks.forEach(ch => estadoInicial.set(ch.value, ch.checked));
        mensaje.className = 'success'; mensaje.innerText = 'Firmas actualizadas.';
        setTimeout(() => window.location.reload(), 650);
      }catch(e){
        mensaje.className = 'error'; mensaje.innerText = e.message || 'Error al guardar firmas.';
      }
    }

    function normalizarFecha(val){
      if(!val) return '';
      try{
        if(typeof val === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(val)){
          const [y,m,d] = val.split('-'); return `${d}/${m}/${y}`;
        }
        const d = new Date(val); if(isNaN(d)) return ''; return d.toLocaleDateString('es-ES');
      }catch(_){ return ''; }
    }
    function normalizarHora(val){
      if(!val) return '';
      try{
        if(typeof val === 'string' && /^\d{2}:\d{2}(:\d{2})?$/.test(val)){
          const [h,m] = val.split(':'); return `${h.padStart(2,'0')}:${m.padStart(2,'0')}`;
        }
        const d = new Date(val); if(isNaN(d)) return ''; return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      }catch(_){ return ''; }
    }
    function mapsHrefFrom(rawUbic,fallbackName){
      const raw=(rawUbic||'').trim();
      if (raw) return /^https?:\/\//i.test(raw) ? raw : `https://www.google.com/maps?q=${encodeURIComponent(raw)}`;
      if ((fallbackName||'').trim()) return `https://www.google.com/maps?q=${encodeURIComponent(fallbackName.trim())}`;
      return '';
    }
  </script>

  <!-- Motivos musicales tamaño pequeño -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 30, SIZE_MAX = 40;  /* solicitado */
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p','.grid-actions','#qr-slot','#form-asistencias','.panel .actions'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
