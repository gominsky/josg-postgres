<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOSG Maestro</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
</head>
<body>
  <div class="container">
    <div class="logo-bar">
      <img src="/../imagenes/logoOEG.jpg" alt="Logo OEG" class="logo logo-grande">
      <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG" class="logo logo-grande logo-right">
      
    </div>
    
    <h2>JOSG Maestro</h2>

    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Contraseña" required />
    
    <button onclick="login()">Entrar</button>
    <p id="mensaje"></p>
  </div>
  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
  
      const msg = document.getElementById('mensaje');
      msg.textContent = '';
  
      if (!email || !password) {
        msg.textContent = 'Introduce email y contraseña.';
        return;
      }
  
      const btn = document.querySelector('button[onclick="login()"]');
      if (btn) { btn.disabled = true; btn.textContent = 'Entrando…'; }
  
      try {
        const res = await fetch('/josgmaestro/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
  
          const raw = await res.text();
          let data = {};
          try { data = JSON.parse(raw); } catch {}
          if (res.ok && data.success && data.usuario?.id) {
          localStorage.setItem('usuario_id', String(data.usuario.id));
          localStorage.setItem('usuario_nombre', data.usuario.nombre || '');
          if (data.usuario.rol) localStorage.setItem('rol', data.usuario.rol);
          location.href = 'portal_maestro.html';
        } else if (res.status === 401) {
          msg.textContent = data.error || 'Credenciales incorrectas';
        } else if (res.status === 400) {
          msg.textContent = data.error || 'Faltan credenciales';
        } else {
          msg.textContent = data.error || `Error del servidor (HTTP ${res.status})`;
        }
      } catch (e) {
        console.error('[login] net err', e);
        msg.textContent = 'No se pudo conectar con el servidor.';
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Entrar'; }
      }
    }
  </script>
  
  
</body>
</html>
