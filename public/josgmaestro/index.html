<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOSG Maestro</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    .btn {
      display:inline-block; padding:0.6rem 1.4rem; border-radius:12px;
      font-weight:600; color:#fff; border:none; cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      transition:transform .12s ease, box-shadow .12s ease;
      text-decoration:none; text-align:center; min-width:110px;
    }
    .btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .btn:active { transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }
  
    /* NARANJA igual que “Eventos” del portal */
    .btn-accent {
      background: linear-gradient(180deg,#ffb24a,#f59e0b);
      border:1px solid #f59e0b;
    }
  </style>
  
</head>
<body>
  <div class="container">
    <div class="logo-bar">
      <img src="/../imagenes/logoOEG.jpg" alt="Logo OEG" class="logo logo-grande">
      <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG" class="logo logo-grande logo-right">
    </div>

    <h2>JOSG Maestro</h2>

    <form id="loginForm" style="display:flex; flex-direction:column; gap:8px;">
      <input type="email" id="email" placeholder="Email" required autocomplete="username" />
      <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password" />
      <button class="btn btn-accent" id="btnLogin" type="submit">Entrar</button>
    </form>
    <p id="mensaje"></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const msg  = document.getElementById('mensaje');
    const btn  = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();   // ← Enter dispara submit y venimos aquí
      await login();
    });

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      msg.textContent = '';
      if (!email || !password) { msg.textContent = 'Introduce email y contraseña.'; return; }

      btn.disabled = true; btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/josgmaestro/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          credentials: 'include', // sesión por cookie (web)
          body: JSON.stringify({ email, password })
        });

        const raw = await res.text();
        let data = {}; try { data = JSON.parse(raw); } catch {}

        if (res.ok && data.success && data.usuario?.id) {
          localStorage.setItem('usuario_id', String(data.usuario.id));
          localStorage.setItem('usuario_nombre', data.usuario.nombre || '');
          if (data.usuario.rol) localStorage.setItem('rol', data.usuario.rol);
          // Si algún día devolvéis token en el login web:
          if (data.token) localStorage.setItem('token', data.token);

          location.href = 'portal_maestro.html';
        } else if (res.status === 401) {
          msg.textContent = data.error || 'Credenciales incorrectas';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        } else if (res.status === 400) {
          msg.textContent = data.error || 'Faltan credenciales';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        } else {
          msg.textContent = data.error || `Error del servidor (HTTP ${res.status})`;
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (e) {
        console.error('[login] net err', e);
        msg.textContent = 'No se pudo conectar con el servidor.';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      } finally {
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
