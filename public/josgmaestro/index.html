<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡En tu mano! -  Acceso</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    .btn {
      display:inline-block; padding:0.6rem 1.4rem; border-radius:12px;
      font-weight:600; color:#fff; border:none; cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      transition:transform .12s ease, box-shadow .12s ease;
      text-decoration:none; text-align:center; min-width:110px;
    }
    .btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .btn:active { transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .btn-accent { background: linear-gradient(180deg,#ffb24a,#f59e0b); border:1px solid #f59e0b; }
    .logos{ display:flex; justify-content:center; gap:12px; align-items:center; margin-bottom:6px; }
    .logos img{ max-height:60px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Topbar (pill + logout oculto si no hay sesión) -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión" style="display:none;">⎋</button>
    </div>

    <!-- Hero con pentagrama y login dentro -->
    <div class="hero" aria-label="Acceso">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Inicia sesión para continuar</p>

      <div class="panel">
        <div class="logos">
          <img src="/../imagenes/logoOEG.jpg" alt="Logo OEG">
          <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG">
        </div>

        <form id="loginForm" style="display:flex; flex-direction:column; gap:8px;">
          <input type="email" id="email" placeholder="Email" required autocomplete="username" />
          <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password" />
          <button class="btn btn-accent" id="btnLogin" type="submit">Entrar</button>
        </form>
        <p id="mensaje" class="subtitulo" role="status" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <!-- Login -->
  <script>
    const form = document.getElementById('loginForm');
    const msg  = document.getElementById('mensaje');
    const btn  = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => { e.preventDefault(); await login(); });

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      msg.textContent = '';
      if (!email || !password) { msg.textContent = 'Introduce email y contraseña.'; return; }

      btn.disabled = true; btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/josgmaestro/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const raw = await res.text(); let data = {}; try { data = JSON.parse(raw); } catch {}
        if (res.ok && data.success && data.usuario?.id) {
          localStorage.setItem('usuario_id', String(data.usuario.id));
          localStorage.setItem('usuario_nombre', data.usuario.nombre || '');
          if (data.usuario.rol) localStorage.setItem('rol', data.usuario.rol);
          if (data.token) localStorage.setItem('token', data.token);
          location.href = 'portal_maestro.html';
        } else if (res.status === 401) {
          msg.textContent = data.error || 'Credenciales incorrectas'; password.value = ''; password.focus();
        } else if (res.status === 400) {
          msg.textContent = data.error || 'Faltan credenciales'; password.value = ''; password.focus();
        } else {
          msg.textContent = data.error || `Error del servidor (HTTP ${res.status})`; password.value = ''; password.focus();
        }
      } catch (e) {
        console.error('[login] net err', e);
        msg.textContent = 'No se pudo conectar con el servidor.'; password.value = ''; password.focus();
      } finally { btn.disabled = false; btn.textContent = 'Entrar'; }
    }
  </script>

  <!-- Pill + logout -->
  <script>
    (function(){
      async function cargarUsuarioPill(){
        const pill = document.getElementById('user-pill'); if(!pill) return;
        let nombre = localStorage.getItem('usuario_nombre') || '';
        try{
          const r = await fetch('/josgmaestro/api/yo', { credentials:'same-origin' });
          if (r.ok) { const me = await r.json(); if (me?.nombre) nombre = me.nombre; }
        }catch(e){}
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre.trim()[0]||'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
        const btn = document.getElementById('btn-logout'); if (btn) btn.style.display='flex';
      }
      function bindLogout(){
        const btn = document.getElementById('btn-logout'); if(!btn) return;
        btn.addEventListener('click', ()=>{
          fetch('/josgmaestro/logout', { method:'POST', credentials:'include' })
            .finally(()=>{ localStorage.clear(); location.href='index.html'; });
        });
      }
      document.addEventListener('DOMContentLoaded', cargarUsuarioPill);
      document.addEventListener('DOMContentLoaded', bindLogout);
    })();
  </script>

  <!-- Motivos musicales tamaño pequeño -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 30, SIZE_MAX = 40;  /* solicitado */
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p','form','.logos'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
