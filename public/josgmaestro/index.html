<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOSG Maestro</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
</head>
<body>
  <div class="container">
    <div class="logo-bar">
      <img src="/../imagenes/logoOEG.jpg" alt="Logo OEG" class="logo logo-grande">
      <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG" class="logo logo-grande logo-right">
      
    </div>
    
    <h2>JOSG Maestro</h2>

    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Contraseña" required />
    
    <button onclick="login()">Entrar</button>
    <p id="mensaje"></p>
  </div>

  <script>
     const API_BASE = location.pathname.startsWith('/josgmaestro/')
      ? '/josgmaestro/api'
      : '/control_firmas/api'; // compat
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('usuario_id', String(data.usuario?.id ?? ''));
        if (data.usuario?.nombre) localStorage.setItem('usuario_nombre', data.usuario.nombre);
        if (data.usuario?.rol)    localStorage.setItem('rol', data.usuario.rol);
        location.href = 'portal_maestro.html';
      } else {
        document.getElementById('mensaje').innerText = data.error || 'Credenciales incorrectas';
      }
    }
  </script>
</body>
</html>
