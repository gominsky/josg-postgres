<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOSG Maestro - Eventos</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />

  <!-- ✅ Añade el CSS de FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" />

  <!-- JS de FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

  <!-- ✅ Estilo compacto para que no se solapen título y botones -->
  <style>
    .calendar-container{ min-height:60vh; }
    /* Cabecera más compacta y botones pequeños (como agenda.html) */
    .fc .fc-toolbar { flex-wrap: wrap; gap: 6px; }
    .fc .fc-toolbar-title { font-size: 1rem; line-height: 1.2; }
    .fc .fc-button { padding: .28rem .55rem; font-size: .9rem; border-radius: 8px; }
    .fc .fc-today-button { padding: .24rem .5rem; font-size: .85rem; }
    .fc .fc-button-group > .fc-button { padding: .24rem .5rem; }
    .fc .fc-header-toolbar { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Agenda de eventos</h2>
    <div id="user-box" class="muted" style="margin:4px 0 10px; font-weight:600;"></div>
    <div id="calendar" class="calendar-container"></div>
    <button onclick="location.href='portal_maestro.html'">&larr; Inicio</button>
  </div>
  <script>
    const API_BASE   = location.pathname.startsWith('/josgmaestro/') ? '/josgmaestro/api' : '/control_firmas/api';
    const usuario_id = localStorage.getItem('usuario_id');
    if (!usuario_id) location.href = 'index.html';

    function logout() {
      localStorage.clear();
      location.href = 'index.html';
    }
    (function(){
      const nombre = localStorage.getItem('usuario_nombre');
      const box = document.getElementById('user-box');
      if (box) box.textContent = nombre ? `Usuario: ${nombre}` : `Usuario #${usuario_id}`;
    })();
    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'es',
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listMonth'
        },
        buttonText: {
          today: 'Hoy',
          month: 'Mes',
          list: 'Lista'
        },
        firstDay: 1, 
        eventSources: [{
        url: `${API_BASE}/eventos?usuario_id=${usuario_id}`,
        failure: (error) => {
          console.error('No se pudieron cargar eventos', error);
          alert('No se pudieron cargar los eventos. Revisa la ruta de la API.');
        }
      }],
        eventClick: function (info) {
          const id = info.event.id;
          location.href = `evento_detalle.html?id=${id}`;
        },
        displayEventTime: false, // ← quita el "9" u hora
        eventTimeFormat: false   // ← adicional para prevenir formatos
      });
      calendar.render();
    });
  </script>
</body>
</html>
