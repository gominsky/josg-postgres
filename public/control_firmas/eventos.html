<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eventos</title>
  <link rel="stylesheet" href="../estilos_app.css" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>
</head>
<body>
  <div class="container">
    <h2>Agenda de eventos</h2>
    <div id="calendar" class="calendar-container"></div>
    <button onclick="logout()" class="button-negro">Cerrar sesión</button>
  </div>

  <script>
    const usuario_id = localStorage.getItem('usuario_id');
    if (!usuario_id) location.href = 'index.html';

    function logout() {
      localStorage.removeItem('usuario_id');
      location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'es',
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listMonth'
        },
        buttonText: {
          today: 'Hoy',
          month: 'Mes',
          list: 'Lista'
        },
        events: `/control_firmas/api/eventos?usuario_id=${usuario_id}`,
        eventClick: function (info) {
          const id = info.event.id;
          location.href = `evento_detalle.html?id=${id}`;
        },
        displayEventTime: false, // ← quita el "9" u hora
        eventTimeFormat: false   // ← adicional para prevenir formatos
      });
      calendar.render();
    });
  </script>
</body>
</html>
