<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asistencias del Evento</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    .asistencia-item {
      padding: 1rem;
      border-bottom: 1px solid #ccc;
    }
    .asistencia-nombre {
      font-weight: bold;
      font-size: 1.1rem;
    }
    .asistencia-detalle {
      margin-top: 0.3rem;
      color: #444;
      font-size: 0.95rem;
    }
    .asistencia-detalle span {
      display: inline-block;
      margin-right: 1rem;
    }
    .asistencia-detalle a {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Asistencias del Evento</h2>
    <div id="info-evento"></div>
    <div id="lista-asistencias">
      <!-- Asistencias se cargan aquí -->
    </div>
    <button onclick="window.history.back()">&larr; Volver</button>
  </div>

  <script>
    const evento_id = new URLSearchParams(location.search).get("id");

    function formatearFecha(fechaStr) {
      const [anio, mes, dia] = fechaStr.split('-');
      return `${dia}/${mes}/${anio}`;
    }

    function formatearHora(horaStr) {
      const partes = horaStr.split(":");
      if (partes.length >= 2) {
        return `${partes[0].padStart(2, '0')}:${partes[1].padStart(2, '0')}`;
      }
      return horaStr;
    }

    async function cargarAsistencias() {
      const res = await fetch(`/control_firmas/api/eventos/${evento_id}/asistencias`);
      const asistencias = await res.json();

      const lista = asistencias.map(a => `
        <div class="asistencia-item">
          <div class="asistencia-nombre">${a.nombre} ${a.apellidos}</div>
          <div class="asistencia-detalle">
            <span>📅 ${formatearFecha(a.fecha)} · ${formatearHora(a.hora)}</span>
            <span>| Tipo: ${a.tipo}</span>
            <span>| 📍 ${a.ubicacion ? `<a href='https://www.google.com/maps?q=${a.ubicacion}' target='_blank'>Ver</a>` : 'Sin datos'}</span>
          </div>
        </div>
      `).join("");

      document.getElementById("lista-asistencias").innerHTML = lista;
    }

    cargarAsistencias();
  </script>
</body>
</html>
