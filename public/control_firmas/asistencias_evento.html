<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asistencias del Evento</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
</head>
<body>
  <div class="container">
    <h2>Asistencias del Evento</h2>
    <div id="info-evento"></div>
    <table class="tabla">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Tipo</th>
          <th>Ubicación</th>
        </tr>
      </thead>
      <tbody id="tabla-asistencias">
        <!-- Asistencias se cargan aquí -->
      </tbody>
    </table>
    <button onclick="window.history.back()">&larr; Volver</button>
  </div>

  <script>
    const evento_id = new URLSearchParams(location.search).get("id");

    async function cargarAsistencias() {
      const res = await fetch(`/control_firmas/api/eventos/${evento_id}/asistencias`);
      const asistencias = await res.json();

      const cuerpo = asistencias.map(a => `
        <tr>
          <td>${a.nombre} ${a.apellidos}</td>
          <td>${a.fecha}</td>
          <td>${a.hora}</td>
          <td>${a.tipo}</td>
          <td>
            ${a.ubicacion ? `<a href="https://www.google.com/maps?q=${a.ubicacion}" target="_blank">Ver</a>` : 'Sin datos'}
          </td>
        </tr>
      `).join("");

      document.getElementById("tabla-asistencias").innerHTML = cuerpo;
    }

    cargarAsistencias();
  </script>
</body>
</html>
