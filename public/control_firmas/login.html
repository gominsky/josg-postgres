<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Profesores - JOSG</title>
  <link rel="stylesheet" href="/estilos/main.css">
  <style>
    body {
      background-image:
    linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7)),
    url('https://static.wixstatic.com/media/adfd29_416db1241c784666ba638d06e05c5676~mv2.jpg');
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-container {
      background: #fff;
      padding: 2rem 3rem;
      border-radius: 1rem;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .login-container img {
      width: 120px;
      margin-bottom: 1rem;
    }
    .login-container h2 {
      margin-bottom: 1.5rem;
      background-color: white;
    }
    .form-control {
      width: 100%;
      padding: 0.7rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
    }
    .btn-login {
      background-color: #000206;
      color: white;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 0.5rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG">
    <h2>Acceso</h2>
    <form action="/profesores/login" method="POST">
      <input type="email" name="email" placeholder="Cuenta de correo" class="form-control" required>
      <input type="password" name="password" placeholder="Contraseña" class="form-control" required>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>

</body>
</html>
