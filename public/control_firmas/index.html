<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control de firmas</title>
  <link rel="stylesheet" href="../estilos_app.css" />
</head>
<body>
  <div class="container">
    <div class="logo-bar">
      <img src="/../imagenes/logoOEG.jpg" alt="Logo OEG" class="logo">
      <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG" class="logo logo-right">
      
    </div>
    
    <h2>Control de firmas</h2>

    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Contraseña" required />
    
    <button onclick="login()">Entrar</button>
    <p id="mensaje"></p>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch('/control_firmas/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('usuario_id', data.usuario_id);
        location.href = 'eventos.html';
      } else {
        document.getElementById('mensaje').innerText = data.error || 'Credenciales incorrectas';
      }
    }
  </script>
</body>
</html>
