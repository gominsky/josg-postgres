<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control de asistencia JOSG</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
</head>
<body data-page="index">
  <div class="container" id="contenedor">
    <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG">
    <h2>Bienvenido</h2>

    <div id="desconectado">
      <p>¿Eres alumno?</p>
      <button onclick="location.href='login.html'">Iniciar sesión</button>
      <button onclick="location.href='registro.html'">Registrarse</button>
    </div>

    <div id="conectado" style="display:none;">
      <p>Sesión iniciada. Elige una opción:</p>
      <button onclick="location.href='firma.html'">Ir a firmar</button>
      <button onclick="location.href='agenda.html'">Mi agenda</button>
      <button onclick="location.href='partituras.html'">Partituras</button>
      <button onclick="location.href='mensajes.html'">Mensajes</button>
      <button onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <script src="app_alumno.js"></script>
  <!-- si usas push para notificaciones en el móvil -->
  <script src="push-init.js"></script>
</body>
</html>
