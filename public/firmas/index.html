<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control de asitencia JOSG</title>
  <link rel="stylesheet" href="../estilos_app.css" /></head>
<body>
  <div class="container" id="contenedor">
      <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG">
    <h2>Bienvenido</h2>
    <div id="desconectado">
      <p>¿Eres alumno?</p>
      <button onclick="location.href='login.html'">Iniciar sesión</button>
      <button onclick="location.href='registro.html'">Registrarse</button>
    </div>
    <div id="conectado" style="display: none;">
      <p>Sesión iniciada. Puedes firmar tu asistencia.</p>
      <button onclick="location.href='firma.html'">Ir a firmar</button>
      <button onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <script>
    const alumno_id = localStorage.getItem('alumno_id');
    if (alumno_id) {
      document.getElementById('desconectado').style.display = 'none';
      document.getElementById('conectado').style.display = 'block';
    }

    function logout() {
      localStorage.removeItem('alumno_id');
      location.reload();
    }
  </script>
</body>
</html>
