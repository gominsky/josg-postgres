<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de Alumno</title>
  <link rel="stylesheet" href="../estilos_app.css" />
</head>
<body>
  <div class="container">
    <h2>Registro</h2>
    <h2 class="subtitulo">Introduce tu email, DNI y elige una contraseña para acceder.</h2>
    
    <input type="email" id="email" placeholder="Email" required />
    <input type="text" id="dni" placeholder="DNI" required />
    <input type="password" id="password" placeholder="Contraseña" required />

    <button onclick="registrar()">Registrarme</button>
    <p id="mensaje"></p>
    <button onclick="location.href='index.html'">← Volver</button>
  </div>

  <script>
    async function registrar() {
      const email = document.getElementById('email').value.trim();
      const dni = document.getElementById('dni').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/firmas/registro-app', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, dni, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem('alumno_id', data.alumno_id);
        window.location.href = 'firma.html';
      } else {
        document.getElementById('mensaje').innerText = data.error || 'Error al registrar';
      }
    }
  </script>
</body>
</html>
