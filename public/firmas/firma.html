<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Firmar Asistencia</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
</head>
<body>
  <div class="container">
    <h2>Firmar Asistencia</h2>
    <div id="reader"></div>
    <p id="mensaje" class=""></p>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const mensaje = document.getElementById("mensaje");
    
      async function enviarFirma(datos) {
        try {
          const res = await fetch("/firmas/firmar-qr", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
          });
          const data = await res.json();
    
          if (data.success) {
            mensaje.className = "subtitulo";
            mensaje.style.color = "green";
            mensaje.innerText = "✅ Asistencia registrada correctamente";
          } else {
            mensaje.className = "subtitulo";
            mensaje.style.color = "red";
            mensaje.innerText = `❌ Error: ${data.error || "No se pudo registrar la asistencia"}`;
          }
        } catch (err) {
          mensaje.className = "subtitulo";
          mensaje.style.color = "red";
          mensaje.innerText = "❌ Error de red al registrar asistencia";
        }
      }
    
      async function firmarConPosibleUbicacion({ evento_id, token, alumno_id }) {
        if (!navigator.geolocation) {
          return enviarFirma({ evento_id, token, alumno_id });
        }
    
        try {
          if (navigator.permissions && navigator.permissions.query) {
            const st = await navigator.permissions.query({ name: "geolocation" });
            if (st.state === "denied") {
              return enviarFirma({ evento_id, token, alumno_id });
            }
          }
        } catch {}
    
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const ubicacion = `${pos.coords.latitude},${pos.coords.longitude}`;
            enviarFirma({ evento_id, token, alumno_id, ubicacion });
          },
          () => {
            // Falla: firmar en silencio
            enviarFirma({ evento_id, token, alumno_id });
          },
          { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
        );
      }
    
      // Aquí integras tu lector QR
      function onScanSuccess(decodedText) {
        try {
          const payload = JSON.parse(decodedText);
          const { evento_id, token, alumno_id } = payload;
          firmarConPosibleUbicacion({ evento_id, token, alumno_id });
        } catch (err) {
          mensaje.className = "subtitulo";
          mensaje.style.color = "red";
          mensaje.innerText = "❌ QR inválido";
        }
      }
    
      // Inicializar escáner...
      // const html5QrcodeScanner = new Html5QrcodeScanner(...);
      // html5QrcodeScanner.render(onScanSuccess);
    });
    </script>    
</body>
</html>
