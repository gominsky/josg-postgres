<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mensajes</title>
<link rel="stylesheet" href="../styles/estilos_app.css"/>
<style>
.card{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}
.card .fecha{font-size:.85rem;opacity:.75}
.card.leido{opacity:.75}
.actions{display:flex;gap:.5rem;flex-wrap:wrap}
</style>
</head>
<body>
<div class="container">
  <h2>Mensajes</h2>
  <div id="lista"></div>
  <button onclick="location.href='index.html'">← Inicio</button>
</div>
<script>
const alumno_id = Number(localStorage.getItem('alumno_id')||0);
if(!alumno_id){ alert('Inicia sesión'); location.href='index.html'; }

let ultimoId = 0;

async function cargar() {
  const res = await fetch(`/mensajes/app/mensajes?alumno_id=${alumno_id}&desde_id=0`);
  const data = await res.json();
  const cont = document.getElementById('lista');
  cont.innerHTML = '';
  data.forEach(m=>{
    ultimoId = Math.max(ultimoId, m.id);
    const div = document.createElement('div');
    div.className = 'card ' + (m.leido_at ? 'leido':'');
    div.innerHTML = `
      <h3>${m.titulo}</h3>
      <div class="fecha">${new Date(m.created_at).toLocaleString('es-ES')}</div>
      <p>${m.cuerpo}</p>
      <div class="actions">
        ${m.url ? `<a href="${m.url}" target="_blank" class="btn-main-blanco">Abrir</a>` : ''}
        ${m.leido_at ? '' : `<button class="btn-main-blanco" data-id="${m.id}">Marcar leído</button>`}
      </div>
    `;
    div.querySelector('button[data-id]')?.addEventListener('click', ()=> marcarLeido(m.id, div));
    cont.appendChild(div);
  });
}

async function marcarLeido(id, card) {
  await fetch(`/mensajes/app/mensajes/${id}/leer`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ alumno_id })
  });
  card.classList.add('leido');
  card.querySelector('button[data-id]')?.remove();
}

window.addEventListener('message', (ev)=>{
  if(ev.data?.tipo==='abrir-mensaje'){
    cargar();
    if(ev.data.url) window.open(ev.data.url, '_blank');
  }
});

cargar();
</script>
</body>
</html>
