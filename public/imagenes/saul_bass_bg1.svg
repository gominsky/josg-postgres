<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- Fondo -->
  <rect width="100%" height="100%" fill="#fff3dc"></rect>

  <!-- Violín único (posición intermedia en el lado izquierdo) -->
  <polygon points="80,340 160,320 140,480 100,560 60,520" fill="#ff8a00"></polygon>
  <rect x="90" y="400" width="120" height="18" fill="#111827"></rect>

  <!-- Piano claro a la derecha -->
  <rect x="1380" y="400" width="140" height="180" fill="#1f3a8a"></rect>
  <rect x="1520" y="450" width="50" height="80" fill="#111827"></rect>

  <!-- Trompeta tubular concéntrica abajo derecha -->
  <rect x="1220" y="700" width="210" height="20" fill="#ffb020"></rect>
  <circle cx="1440" cy="710" r="26" fill="#ff8a00"></circle>
  <circle cx="1440" cy="710" r="16" fill="#ffb020"></circle>

  <!-- Pentagrama curvo -->
  <path d="M0 700 C420 740,1180 660,1600 720" stroke="#111827" stroke-width="5" fill="none"></path>
  <path d="M0 740 C440 780,1160 700,1600 760" stroke="#111827" stroke-width="5" fill="none"></path>
  <path d="M0 780 C400 820,1200 740,1600 800" stroke="#111827" stroke-width="5" fill="none"></path>
  <path d="M0 820 C420 860,1180 780,1600 840" stroke="#111827" stroke-width="5" fill="none"></path>
  <path d="M0 860 C440 900,1160 820,1600 880" stroke="#111827" stroke-width="5" fill="none"></path>

  <!-- Notas expresivas -->
  <ellipse cx="480" cy="740" rx="34" ry="24" fill="#ff8a00"></ellipse><rect x="504" y="706" width="7" height="46" fill="#111827"></rect>
  <ellipse cx="780" cy="790" rx="32" ry="22" fill="#1f3a8a"></ellipse><rect x="802" y="756" width="7" height="46" fill="#111827"></rect>
  <ellipse cx="1080" cy="730" rx="30" ry="22" fill="#c8472c"></ellipse><rect x="1102" y="696" width="7" height="46" fill="#111827"></rect>
</svg>
