<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <style><![CDATA[
      .cream { fill:#fff3dc; }
      .black { fill:#111827; }
      .orange { fill:#ff8a00; }
      .yellow { fill:#ffb020; }
      .rust { fill:#c8472c; }
      .blue { fill:#1f3a8a; }
      .shadow { fill:#111827; opacity:.08; }
      .thin-stroke { fill:none; stroke:#111827; stroke-width:12; stroke-linecap:round; }
      .hair { fill:none; stroke:#111827; stroke-width:5; stroke-linecap:round; opacity:.35; }
      .fhole { fill:none; stroke:#111827; stroke-width:14; stroke-linecap:round; stroke-linejoin:round; }
    ]]></style>
    <!-- Rough edge mask for Saul Bass cut-paper vibe -->
    <filter id="roughen" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="tilt">
      <polygon points="-50,0 1920,0 1920,980 -50,1080"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" class="cream"/>

  <!-- Big torn blocks -->
  <g filter="url(#roughen)">
    <polygon class="orange" points="-120,-40 1320,0 1180,380 -80,260" />
    <polygon class="rust"   points="620,740 2100,660 2100,1200 480,1180" />
  </g>

  <!-- Subtle blue ellipse (tinted) -->
  <ellipse cx="1520" cy="220" rx="420" ry="260" class="blue" opacity=".12"/>

  <!-- Staff lines (angled) -->
  <g class="hair" transform="rotate(-12 960 540) translate(0, -120)">
    <line x1="160" x2="1760" y1="280" y2="280"/>
    <line x1="160" x2="1760" y1="330" y2="330"/>
    <line x1="160" x2="1760" y1="380" y2="380"/>
    <line x1="160" x2="1760" y1="430" y2="430"/>
    <line x1="160" x2="1760" y1="480" y2="480"/>
  </g>

  <!-- Abstract baton -->
  <g transform="rotate(14 960 540) translate(200, -60)">
    <line x1="200" y1="160" x2="980" y2="160" class="thin-stroke"/>
    <circle cx="990" cy="160" r="26" class="black"/>
  </g>

  <!-- Violin f-holes (stylized mirrored) -->
  <g transform="translate(640,420) scale(1.05)">
    <path class="fhole" d="M0,0 C80,-10 80,80 30,90 C-10,98 -8,46 42,44" />
  </g>
  <g transform="translate(1240,420) scale(-1.05,1.05)">
    <path class="fhole" d="M0,0 C80,-10 80,80 30,90 C-10,98 -8,46 42,44" />
  </g>

  <!-- Trumpet bell (abstract) -->
  <g transform="translate(1140,740) rotate(-6)">
    <path class="yellow" d="M0,0 L180,-38 L180,38 Z" />
    <rect x="-220" y="-10" width="220" height="20" class="black"/>
  </g>

  <!-- Paper speckles -->
  <g opacity=".35">
    <circle cx="220" cy="160" r="6" class="black"/>
    <circle cx="340" cy="940" r="5" class="black"/>
    <circle cx="1780" cy="560" r="4" class="black"/>
    <rect x="1480" y="880" width="10" height="10" class="black" transform="rotate(12 1485 885)"/>
    <rect x="360" y="520" width="12" height="12" class="black" transform="rotate(-18 366 526)"/>
  </g>

  <!-- Clipped soft shadow along bottom to anchor -->
  <rect width="1920" height="240" y="840" class="shadow" clip-path="url(#tilt)"/>
</svg>
