<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Firmar asistencia</title>

  <!-- Librería del lector QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- Tus estilos globales (incluyen .topbar y .hero que acabas de añadir) -->
  <link rel="stylesheet" href="../styles/estilos_app.css" />

  <style>
    /* Estilos específicos de esta página (mínimos) */
    .container{ max-width:760px; margin:0 auto; padding:16px; }
    #reader { max-width: 520px; margin: 0 auto; }
    #mensaje { margin-top: 12px; font-weight: 600; }

    /* Botón Inicio (por si quieres volver rápido a la portada) */
    .back{ margin:16px 0 6px; text-align:center; }
    .btn-home{
      display:inline-block; padding:.6rem 1.2rem; min-width:110px;
      border-radius:12px; font-weight:600; color:#fff; text-decoration:none; border:0;
      background: linear-gradient(180deg,#f28d63,#ea6b38); border:1px solid #cc5c2f;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      cursor:pointer; text-align:center;
    }
    .btn-home:hover{ transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .btn-home:active{ transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }
  </style>
</head>
<body class="page-firma">
  <div class="container">

    <!-- Cabecera tipo index (solo nombre, sin logo) -->
    <div class="topbar">
      <div id="user-name"></div>
    </div>

    <!-- Hero musical (usa tus estilos globales .hero, .motifs-layer, etc.) -->
    <div class="hero" aria-label="Bienvenida">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Escanear QR para confirmar asistencia.</p>
    </div>
    <div id="reader"></div>
    <p id="mensaje"></p>

    <div class="back">
      <button class="btn-home" onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <script>
    // --- Autenticación mínima ---
    const alumno_id = localStorage.getItem('alumno_id');
    const tokenAuth = localStorage.getItem('token');
    if (!alumno_id || !tokenAuth) {
      alert("No has iniciado sesión.");
      location.href = "index.html";
    }

    // Pinta el nombre del usuario en la cabecera
    (function(){
      const slot = document.getElementById('user-name');
      const nombre = localStorage.getItem('alumno_nombre') || '';
      if (slot) slot.textContent = nombre;
    })();

    // --- UI de mensajes ---
    const $mensaje = document.getElementById("mensaje");
    function pintarMensaje(texto, ok = true) {
      $mensaje.style.color = ok ? "#0f172a" : "#b71c1c";
      $mensaje.textContent = texto;
    }

    // --- Envío de firma al backend (JWT en Authorization) ---
    async function enviarFirma(payload) {
      try {
        const res = await fetch("/firmas/firmar-qr", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + tokenAuth
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status} ${res.statusText} ${txt}`);
        }

        const data = await res.json();

        if (data.success) {
          const msg = data.mensaje
            || (data.yaFirmado
                ? "✅ Ya estaba registrada la asistencia para este evento"
                : "✅ Asistencia registrada correctamente");
          pintarMensaje(msg, true);
          try { await qrScanner.stop(); } catch(e){}
          try { qrScanner?.clear?.(); } catch(e){}
        } else {
          pintarMensaje(`❌ ${data.error || "No se pudo registrar la asistencia"}`, false);
          sending = false;
        }
      } catch (err) {
        console.error("Firma QR ->", err);
        pintarMensaje("❌ Error de red al registrar la asistencia", false);
        sending = false;
      }
    }

    // --- Geolocalización opcional ---
    async function firmarConPosibleUbicacion({ evento_id, token }) {
      const base = {
        evento_id: Number(evento_id),
        token: String(token)
      };

      if (!navigator.geolocation) return enviarFirma(base);

      try {
        if (navigator.permissions?.query) {
          const st = await navigator.permissions.query({ name: "geolocation" });
          if (st.state === "denied") return enviarFirma(base);
        }
      } catch {}

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const ubicacion = `${pos.coords.latitude},${pos.coords.longitude}`;
          enviarFirma({ ...base, ubicacion });
        },
        () => enviarFirma(base),
        { enableHighAccuracy:false, timeout:8000, maximumAge:60000 }
      );
    }

    // --- Lector QR ---
    let sending = false;
    let qrScanner;

    function onScanSuccess(decodedText) {
      if (sending) return;
      let datos;
      try {
        datos = JSON.parse(decodedText);
      } catch {
        pintarMensaje("❌ QR inválido", false);
        return;
      }
      const { evento_id, token } = datos || {};
      if (!evento_id || !token) {
        pintarMensaje("❌ QR inválido", false);
        return;
      }
      sending = true;
      pintarMensaje("Enviando firma…", true);
      firmarConPosibleUbicacion({ evento_id, token });
    }

    (function initScanner() {
      try{
        qrScanner = new Html5Qrcode("reader");
        qrScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          onScanSuccess,
          () => { /* sin logs */ }
        );
      }catch(e){
        console.error(e);
        pintarMensaje("❌ No se pudo iniciar la cámara. Revisa permisos.", false);
      }
    })();
  </script>

  <!-- JS común de tu app (sin push-init aquí) -->
  <script src="app_alumno.js"></script>
</body>
</html>
