<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Josg en tu mano -Firmar asistencia</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    #reader { max-width: 480px; margin: 0 auto; }
    #mensaje { margin-top: 12px; font-weight: 600; }
     .btn{
  display:inline-block; padding:.6rem 1.4rem; border-radius:12px;
  font-weight:600; color:#fff; border:none; cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .12s ease, box-shadow .12s ease;
  text-decoration:none; text-align:center; min-width:110px;
}
.btn:hover{ transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
.btn:active{ transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }

  .btn-accent{
  background: linear-gradient(180deg,#f28d63,#ea6b38);
  border:1px solid #cc5c2f;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="brand" style="display:flex;align-items:center;gap:10px;">
        <img src="../imagenes/logoJOSG.png" alt="JOSG" style="max-height:44px;">
        <div id="user-name" class="muted" style="font-weight:600;"></div>
      </div>
    </div>
    
    <h2>Firmar Asistencia</h2>
    <div id="user-name" class="muted"></div>
    <div id="reader"></div>
    <p id="mensaje"></p>
    <div style="margin-top:1rem;">
      <button class="btn btn-tertiary" onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <script>
    const alumno_id = localStorage.getItem('alumno_id');
    if (!alumno_id) {
      alert("No has iniciado sesión.");
      location.href = "index.html";
    }

    const mensaje = document.getElementById("mensaje");
    let sending = false; // evita dobles envíos por escaneos repetidos
    let qrScanner;

    function pintarMensaje(texto, ok = true) {
      mensaje.className = "subtitulo";
      mensaje.style.color = ok ? "black" : "red";
      mensaje.innerText = texto;
    }

    async function enviarFirma(payload) {
      try {
        const res = await fetch("/firmas/firmar-qr", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status} ${res.statusText} ${txt}`);
        }

        const data = await res.json();

        if (data.success) {
          const msg = data.mensaje
            || (data.yaFirmado
                ? "✅ Ya estaba registrada las asistencia para este evento"
                : "✅ Asistencia registrada correctamente");
          pintarMensaje(msg, true);
          try { await qrScanner.stop(); } catch {}
          try { qrScanner.clear(); } catch {}
        } else {
          pintarMensaje(`❌ ${data.error || "No se pudo registrar la asistencia"}`, false);
          sending = false;
        }
      } catch (err) {
        console.error("Firma QR ->", err);
        pintarMensaje("❌ Error de red al registrar la asistencia", false);
        sending = false;
      }
    }

    async function firmarConPosibleUbicacion({ evento_id, token }) {
      const base = {
        alumno_id: Number(alumno_id),
        evento_id: Number(evento_id),
        token: String(token)
      };

      if (!navigator.geolocation) return enviarFirma(base);

      try {
        if (navigator.permissions && navigator.permissions.query) {
          const st = await navigator.permissions.query({ name: "geolocation" });
          if (st.state === "denied") {
            return enviarFirma(base);
          }
        }
      } catch {}

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const ubicacion = `${pos.coords.latitude},${pos.coords.longitude}`;
          enviarFirma({ ...base, ubicacion });
        },
        () => enviarFirma(base),
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
      );
    }

    function onScanSuccess(decodedText) {
      if (sending) return;
      let datos;
      try {
        datos = JSON.parse(decodedText);
      } catch {
        pintarMensaje("❌ QR inválido", false);
        return;
      }
      const { evento_id, token } = datos || {};
      if (!evento_id || !token) {
        pintarMensaje("❌ QR inválido", false);
        return;
      }
      sending = true;
      firmarConPosibleUbicacion({ evento_id, token });
    }

    (function initScanner() {
      qrScanner = new Html5Qrcode("reader");
      qrScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess,
        () => { /* silencioso */ }
      );
    })();
  </script>
  <script src="push-init.js"></script>
  <script src="app_alumno.js"></script>
</body>
</html>
