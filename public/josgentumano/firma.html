<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Firmar asistencia</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    /* Específico mínimo */
    #reader { max-width: 520px; margin: 0 auto; }
    #mensaje { margin-top: 12px; font-weight: 600; }
  </style>
</head>
<body data-page="firma" class="page-firma">
  <div class="container">
    <!-- Topbar unificada -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- Hero musical que ENVUELVE el escáner y acciones -->
    <div class="hero" aria-label="Firmar asistencia">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Escanea el QR para confirmar asistencia</p>

      <div class="panel">
        <div id="reader"></div>
        <p id="mensaje" class="subtitulo" role="status" aria-live="polite"></p>
        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-primary" onclick="location.href='index.html'">&larr; Inicio</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    /* Logout universal: muestra el botón si hay token y limpia sesión al pulsar */
    (function () {
      const btn = document.getElementById('btn-logout');
    
      function doLogout() {
        try {
          localStorage.removeItem('token');
          localStorage.removeItem('alumno_id');
          localStorage.removeItem('alumno_nombre');
        } catch(e) {}
        // Redirige al inicio de sesión (ajusta si prefieres ir a index)
        location.href = 'login.html';
      }
    
      if (btn) {
        btn.addEventListener('click', doLogout);
        // mostrar/ocultar según haya sesión
        if (localStorage.getItem('token')) {
          btn.style.display = 'flex';
        } else {
          btn.style.display = 'none';
        }
      }
    })();
    </script>
    
  <!-- Pill + botón -->
  <script>
    (function(){
      function mostrarPill(){
        const pill = document.getElementById('user-pill');
        if(!pill) return;
        const nombre = (localStorage.getItem('alumno_nombre') || '').trim();
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre[0] || 'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
        const btn = document.getElementById('btn-logout');
        if (btn && localStorage.getItem('token')) btn.style.display = 'flex';
      }
      document.addEventListener('DOMContentLoaded', mostrarPill);
      window.addEventListener('pageshow', mostrarPill);
    })();
  </script>

  <!-- Lógica de escaneo y envío -->
  <script>
    const alumno_id = localStorage.getItem('alumno_id');
    const tokenAuth = localStorage.getItem('token');
    if (!alumno_id || !tokenAuth) {
      alert("No has iniciado sesión.");
      location.href = "index.html";
    }

    const $mensaje = document.getElementById("mensaje");
    function pintarMensaje(texto, ok = true) {
      $mensaje.style.color = ok ? "#0f172a" : "#b71c1c";
      $mensaje.textContent = texto;
    }

    async function enviarFirma(payload) {
      try {
        const res = await fetch("/firmas/firmar-qr", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + tokenAuth
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          // Errores controlados del servidor (no convocado, QR expirado, etc.)
          pintarMensaje(`❌ ${data.mensaje || 'No se pudo registrar la asistencia'}`, false);
          sending = false;
          return;
        }

        if (data.success) {
          const minutos = data.minutos_perdidos;
          let msg = data.mensaje || '✅ Asistencia registrada';

          // Estilo visual según si hay retraso
          if (minutos && minutos > 0) {
            $mensaje.style.color = '#b45309'; // ámbar — tarde pero registrado
          } else {
            $mensaje.style.color = '#166534'; // verde — puntual
          }
          $mensaje.textContent = msg;

          try { await qrScanner.stop(); } catch(e){}
          try { qrScanner?.clear?.(); } catch(e){}
        } else {
          pintarMensaje(`❌ ${data.mensaje || 'No se pudo registrar la asistencia'}`, false);
          sending = false;
        }
      } catch (err) {
        console.error("Firma QR ->", err);
        pintarMensaje("❌ Error de red al registrar la asistencia", false);
        sending = false;
      }
    }

    async function firmarConPosibleUbicacion({ evento_id, token }) {
      const base = { evento_id: Number(evento_id), token: String(token) };
      if (!navigator.geolocation) return enviarFirma(base);
      try {
        if (navigator.permissions?.query) {
          const st = await navigator.permissions.query({ name: "geolocation" });
          if (st.state === "denied") return enviarFirma(base);
        }
      } catch {}
      navigator.geolocation.getCurrentPosition(
        (pos) => enviarFirma({ ...base, ubicacion: `${pos.coords.latitude},${pos.coords.longitude}` }),
        () => enviarFirma(base),
        { enableHighAccuracy:false, timeout:8000, maximumAge:60000 }
      );
    }

    let sending = false;
    let qrScanner;
    function onScanSuccess(decodedText) {
      if (sending) return;
      let datos;
      try { datos = JSON.parse(decodedText); } catch { pintarMensaje("❌ QR inválido", false); return; }
      const { evento_id, token } = datos || {};
      if (!evento_id || !token) { pintarMensaje("❌ QR inválido", false); return; }
      sending = true;
      pintarMensaje("Enviando firma…", true);
      firmarConPosibleUbicacion({ evento_id, token });
    }

  </script>
  <script>
    function calcQrbox(w, h) {
      const side = Math.max(220, Math.min(360, Math.floor(Math.min(w, h) * 0.8)));
      return { width: side, height: side };
    }
  
    async function startScanner() {
      const host = document.getElementById('reader');
      // Espera a que tenga tamaño real (>260 px de ancho)
      let attempts = 0;
      while (host && host.offsetWidth < 260 && attempts++ < 40) {
        await new Promise(r => setTimeout(r, 75));
      }
      const w = host?.offsetWidth || 320;
      const h = host?.offsetHeight || w;
  
      qrScanner = new Html5Qrcode("reader");
      try {
        await qrScanner.start(
          { facingMode: "environment" },
          { fps: 12, qrbox: calcQrbox(w, h) },
          onScanSuccess,
          () => {} // onScanFailure opcional
        );
      } catch (e) {
        console.error(e);
        pintarMensaje("❌ No se pudo iniciar la cámara", false);
      }
    }
  
    (function initScanner(){ startScanner(); })();
  </script>
  
  <!-- Motivos musicales -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 30, SIZE_MAX = 40;
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
