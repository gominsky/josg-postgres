<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Registro</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
</head>
<body>
  <div class="container">
    <div class="hero" aria-label="Bienvenida">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Regístrate, introduce tu email, DNI y crea tu contraseña.</p>

      <div class="panel" role="region" aria-labelledby="tit-reg">
        <div class="field">
          <input type="email" id="email" placeholder="Email" required autocomplete="username" />
        </div>
        <div class="field">
          <input type="text" id="dni" placeholder="DNI" required />
        </div>
        <div class="field">
          <input type="password" id="password" placeholder="Elegir contraseña" required autocomplete="new-password" />
        </div>
        <div class="field">
          <input type="password" id="password2" placeholder="Repite la contraseña" required autocomplete="new-password" />
        </div>

        <div class="actions">
          <button id="btn-registrar" class="btn btn-primary" onclick="registrar()">Registrarme</button>
          <button class="btn btn-secondary" onclick="location.href='login.html'">Ya tengo cuenta</button>
        </div>

        <p id="mensaje" class="notice" role="status" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/firmas';

    function showMsg(text, ok){
      const msg = document.getElementById('mensaje');
      msg.textContent = text || '';
      msg.className = 'notice ' + (ok ? 'ok' : 'err');
    }

    async function registrar(){
      const email = document.getElementById('email').value.trim();
      const dni = document.getElementById('dni').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const btn = document.getElementById('btn-registrar');

      showMsg('', true);

      if (!email || !dni || !password || !password2){
        showMsg('Por favor completa todos los campos.', false);
        return;
      }
      if (password !== password2){
        showMsg('Las contraseñas no coinciden.', false);
        document.getElementById('password').value = '';
        document.getElementById('password2').value = '';
        document.getElementById('password').focus();
        return;
      }

      btn.disabled = true;
      try {
        const res = await fetch(`${API_BASE}/registro-app`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, dni, password })
        });

        let data = {};
        try { data = await res.json(); } catch(_) {}

        if (res.ok && (data.success ?? true)) {
          if (data.token) {
            localStorage.setItem('token', data.token);
            const alumnoId =
              data.alumno_id ??
              data.id ??
              (data.alumno && (data.alumno.id || data.alumno.alumno_id)) ?? '';
            if (alumnoId) localStorage.setItem('alumno_id', String(alumnoId));

            const nombre =
              data.nombre ??
              (data.alumno && data.alumno.nombre) ?? '';
            localStorage.setItem('alumno_nombre', nombre || '');

            showMsg('✅ Registro correcto. Entrando…', true);
            setTimeout(()=> window.location.href = 'index.html', 300);
          } else {
            showMsg('✅ Registro correcto. Inicia sesión para continuar.', true);
            setTimeout(()=> window.location.href = 'login.html', 600);
          }
        } else {
          showMsg(data.error || 'Error al registrar', false);
          document.getElementById('password').value = '';
          document.getElementById('password2').value = '';
          document.getElementById('password').focus();
        }
      } catch (e) {
        showMsg('No se pudo conectar con el servidor. Inténtalo de nuevo.', false);
        document.getElementById('password').value = '';
        document.getElementById('password2').value = '';
        document.getElementById('password').focus();
      } finally {
        btn.disabled = false;
      }
    }
  </script>

  <!-- Motivos musicales -->
  <script>
  (function(){
    const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
    const COUNT_MIN = 7, COUNT_MAX = 10;
    const SIZE_MIN = 36, SIZE_MAX = 50;
    const ROT_MIN  = -16, ROT_MAX  = 16;
    const PADDING  = 10;
    const EDGE_PAD = 6;
    const MAX_TRIES_PER_NOTE = 80;

    const randInt = (a,b)=> Math.floor(Math.random()*(b-a+1))+a;
    const pick = (arr)=> arr[Math.floor(Math.random()*arr.length)];
    const getRectRelative = (el, parent)=>{
      const r = el.getBoundingClientRect(), p = parent.getBoundingClientRect();
      return { x:r.left-p.left, y:r.top-p.top, w:r.width, h:r.height };
    };
    const intersects = (a,b,p)=> !(a.x+a.w+p<=b.x || b.x+b.w+p<=a.x || a.y+a.h+p<=b.y || b.y+b.h+p<=a.y);

    function place(){
      const hero = document.querySelector('.hero');
      const layer = document.querySelector('.motifs-layer');
      if (!hero || !layer) return;
      layer.innerHTML = '';
      const heroRect = hero.getBoundingClientRect();

      const avoid = [];
      ['.hero-logo','h1','p'].forEach(sel=>{
        const el = hero.querySelector(sel); if (!el) return;
        const r = getRectRelative(el, hero);
        avoid.push({ x:r.x-10, y:r.y-10, w:r.w+20, h:r.h+20 });
      });

      const count = randInt(COUNT_MIN, COUNT_MAX);
      const placed = [];

      for (let i=0;i<count;i++){
        const s = document.createElement('span');
        s.className = 'motif';
        s.textContent = pick(SYMBOLS);
        s.style.opacity = '0';
        layer.appendChild(s);

        let ok=false;
        for (let t=0;t<MAX_TRIES_PER_NOTE;t++){
          const size = randInt(SIZE_MIN, SIZE_MAX);
          const rot = randInt(ROT_MIN, ROT_MAX);
          s.style.fontSize = size+'px';
          s.style.transform = `rotate(${rot}deg)`;
          const left = randInt(EDGE_PAD, Math.max(EDGE_PAD, heroRect.width - size - EDGE_PAD));
          const top  = randInt(EDGE_PAD, Math.max(EDGE_PAD, heroRect.height - size - EDGE_PAD));
          s.style.left = left+'px'; s.style.top = top+'px';

          const r = getRectRelative(s, hero);
          if (r.x<EDGE_PAD || r.y<EDGE_PAD || r.x+r.w>heroRect.width-EDGE_PAD || r.y+r.h>heroRect.height-EDGE_PAD) continue;
          if (avoid.some(av=>intersects(r,av,PADDING))) continue;
          if (placed.some(pr=>intersects(r,pr,PADDING))) continue;

          placed.push(r); s.style.opacity = ''; ok = true; break;
        }
        if (!ok) layer.removeChild(s);
      }
    }

    window.addEventListener('load', place);
    window.addEventListener('pageshow', (e)=>{ if (e.persisted) setTimeout(place,0); });
    let tm=null; window.addEventListener('resize', ()=>{ clearTimeout(tm); tm=setTimeout(place,120); });
  })();
  </script>
</body>
</html>
