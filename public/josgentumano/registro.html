<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Josg en tu mano - Registro</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />

  <style>
    .notice { display:none; margin-top:.75rem; padding:.6rem .8rem; border-radius:.6rem; font-weight:700; }
    .notice.ok  { display:block; background:#e9f7ef; color:#186a3b; border:1px solid #c8e6d1; }
    .notice.err { display:block; background:#fdecea; color:#b71c1c; border:1px solid #f5c6cb; }
    button[disabled]{ opacity:.7; cursor:not-allowed; }
    .container{ max-width:420px; margin:0 auto; padding:16px; }
    img.logo{ max-width:140px; margin-bottom:10px; }
    input{ width:100%; margin:.4rem 0; padding:.6rem .8rem; }
    button{ padding:.6rem .9rem; margin-top:.6rem; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/../imagenes/logoJOSG.png" class="logo" alt="Logo JOSG">
    <h2>Registro</h2>
    <h2 class="subtitulo">Introduce tu email, DNI y elige una contraseña para acceder.</h2>

    <input type="email" id="email" placeholder="Email" required />
    <input type="text" id="dni" placeholder="DNI" required />
    <input type="password" id="password" placeholder="Elegir contraseña" required />
    <input type="password" id="password2" placeholder="Repite la contraseña" required />

    <button id="btn-registrar" onclick="registrar()">Registrarme</button>

    <p id="mensaje" class="notice" role="status" aria-live="polite"></p>

    <button onclick="location.href='index.html'">← Volver</button>
  </div>

  <script>
    const API_BASE = '/firmas';

    function showMsg(text, ok){
      const msg = document.getElementById('mensaje');
      msg.textContent = text || '';
      msg.className = 'notice ' + (ok ? 'ok' : 'err');
    }
  
    async function registrar(){
      const email = document.getElementById('email').value.trim();
      const dni = document.getElementById('dni').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const btn = document.getElementById('btn-registrar');
  
      showMsg('', true);
  
      if (!email || !dni || !password || !password2){
        showMsg('Por favor completa todos los campos.', false);
        return;
      }
      if (password !== password2){
        showMsg('Las contraseñas no coinciden.', false);
        document.getElementById('password').value = '';
        document.getElementById('password2').value = '';
        document.getElementById('password').focus();
        return;
      }
  
      btn.disabled = true;
      try {
        const res = await fetch(`${API_BASE}/registro-app`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, dni, password })
        });
  
        let data = {};
        try { data = await res.json(); } catch(_) {}
  
        if (res.ok && (data.success ?? true)) {
          if (data.token) {
            localStorage.setItem('token', data.token);
  
            const alumnoId =
              data.alumno_id ??
              data.id ??
              (data.alumno && (data.alumno.id || data.alumno.alumno_id)) ?? '';
            if (alumnoId) localStorage.setItem('alumno_id', String(alumnoId));
  
            const nombre =
              data.nombre ??
              (data.alumno && data.alumno.nombre) ?? '';
            localStorage.setItem('alumno_nombre', nombre || '');
  
            showMsg('✅ Registro correcto. Entrando…', true);
            setTimeout(()=> window.location.href = 'index.html', 300);
          } else {
            showMsg('✅ Registro correcto. Inicia sesión para continuar.', true);
            setTimeout(()=> window.location.href = 'login.html', 600);
          }
        } else {
          showMsg(data.error || 'Error al registrar', false);
          document.getElementById('password').value = '';
          document.getElementById('password2').value = '';
          document.getElementById('password').focus();
        }
      } catch (e) {
        showMsg('No se pudo conectar con el servidor. Inténtalo de nuevo.', false);
        document.getElementById('password').value = '';
        document.getElementById('password2').value = '';
        document.getElementById('password').focus();
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
