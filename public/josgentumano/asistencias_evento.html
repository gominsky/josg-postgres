<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡En tu mano! - Registro de asistencia</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    .btn {
      display:inline-block; padding:0.6rem 1.4rem; border-radius:12px;
      font-weight:600; color:#fff; border:none; cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      transition:transform .12s ease, box-shadow .12s ease;
      text-decoration:none; text-align:center; min-width:110px;
    }
    .btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .btn:active { transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .btn-accent { background: linear-gradient(180deg,#f28d63,#ea6b38); border: 1px solid #cc5c2f; }

    .asistencia-item{ padding:.5rem 0; border-bottom:1px dashed #eee; }
    .asistencia-nombre{ font-weight:800; }
    .asistencia-detalle{ color:#6b7280; font-size:.92rem; display:flex; gap:.5rem; flex-wrap:wrap; }
  </style>
  <style>
    :root {
      --naranja: #FF9501;
      --crema: #fff8f0;
      --negro: #111827;
      --muted-color: #6b7280;
      --border-color: #e5e7eb;
      --shadow-sm: 0 2px 10px rgba(0,0,0,.07);
      --shadow-md: 0 4px 18px rgba(0,0,0,.11);
      --shadow-lg: 0 8px 28px rgba(0,0,0,.14);
      --radius: 14px;
      --radius-pill: 999px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .65rem 1.5rem; border-radius: var(--radius);
      font-weight: 700; font-size: .95rem; border: none; cursor: pointer;
      box-shadow: var(--shadow-sm); text-decoration: none;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }
    .btn:hover  { transform: translateY(-1px); box-shadow: var(--shadow-md); filter: brightness(1.06); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: linear-gradient(180deg,#ffb24a,#f59e0b); color:#fff; border:1px solid #e8900a; }
    .btn-accent  { background: linear-gradient(180deg,#f28d63,#ea6b38); color:#fff; border:1px solid #cc5c2f; }
    .btn-ghost   { background:#fff; color:var(--negro); border:1.5px solid var(--border-color); }
    .btn-ghost:hover { border-color:var(--naranja); color:var(--naranja); }
    .info-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border-color);
      font-size: .92rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--muted-color); font-size: .8rem; min-width: 60px; }
    .badge {
      display: inline-flex; align-items: center; gap:.3rem;
      padding:.2rem .65rem; border-radius:var(--radius-pill);
      font-size:.78rem; font-weight:700;
    }
    .badge-green  { background:#e9f7ef; color:#186a3b; border:1px solid #c8e6d1; }
    .badge-orange { background:#fff3e0; color:#7a3f00; border:1px solid #f5c27a; }
    .badge-gray   { background:#f3f4f6; color:#374151; border:1px solid #e5e7eb; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Topbar unificada -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- Hero con pentagrama envolviendo el contenido -->
    <div class="hero" aria-label="Asistencias del evento">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Registro de firmas</p>

      <div class="panel">
        <div id="info-evento" class="subtitulo" style="margin:.25rem 0 .35rem;"></div>
        <div id="lista-asistencias"></div>

        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-accent" onclick="window.history.back()">&larr; Volver</button>
        </div>
      </div>
    </div>
  </div>

  

  <!-- Lógica asistencias -->
  <script>
    const evento_id = new URLSearchParams(location.search).get("id");
    const API_BASE = '/josgmaestro/api';

    function formatearFecha(fechaStr) {
      if (!fechaStr) return '';
      const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(fechaStr);
      if (m) return `${m[3]}/${m[2]}/${m[1]}`;
      const d = new Date(fechaStr);
      if (!isNaN(d)) {
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const yy = d.getFullYear();
        return `${dd}/${mm}/${yy}`;
      }
      return fechaStr;
    }
    function formatearHora(horaStr) {
      if (!horaStr) return '';
      const hm = /^(\d{1,2}):(\d{2})(?::\d{2})?$/.exec(horaStr);
      if (hm) return `${String(hm[1]).padStart(2,'0')}:${hm[2]}`;
      const d = new Date(horaStr);
      return isNaN(d) ? horaStr : `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    async function cargarAsistencias() {
      try {
        const url = `${API_BASE}/eventos/${evento_id}/asistencias?ts=${Date.now()}`;
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const asistencias = await res.json();

        const lista = asistencias.map(a => `
          <div class="asistencia-item">
            <div class="asistencia-nombre">${a.nombre} ${a.apellidos}</div>
            <div class="asistencia-detalle">
              <span>📅 ${formatearFecha(a.fecha)} · ${formatearHora(a.hora)}</span>
              <span>| Tipo: ${a.tipo}</span>
              <span>| 📍 ${a.ubicacion ? `<a href='https://www.google.com/maps?q=${a.ubicacion}' target='_blank'>Ver</a>` : 'Sin datos'}</span>
            </div>
          </div>
        `).join("");

        document.getElementById("lista-asistencias").innerHTML = lista || '<p class="muted">Sin registros.</p>';
      } catch (error) {
        console.error("Error cargando asistencias:", error);
        document.getElementById("lista-asistencias").innerHTML = "<p class='error'>Error al cargar las asistencias</p>";
      }
    }
    document.addEventListener('DOMContentLoaded', cargarAsistencias);
  </script>

  <!-- Motivos musicales (maestro: tamaño pequeño) -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 30, SIZE_MAX = 40;  /* solicitado */
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p','.panel .actions'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>

  <!-- Auth unificado: sesión maestro + JWT -->
  <script>
  (function(){
    const TOKEN  = localStorage.getItem('token');
    const ROL    = (localStorage.getItem('rol') || '').toLowerCase();
    const NOMBRE = localStorage.getItem('usuario_nombre') || localStorage.getItem('alumno_nombre') || '';

    // Guardia de sesión: necesita token JWT o cookie de sesión
    // (no redirigimos aquí; cada página decide si necesita auth)

    // Helper fetch autenticado global
    window.authFetch = function(url, opts) {
      opts = opts || {};
      const headers = Object.assign({}, opts.headers || {});
      if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
      return fetch(url, Object.assign({}, opts, { headers: headers }));
    };

    // Pill de usuario
    function mostrarPill(nombre) {
      const pill = document.getElementById('user-pill');
      if (!pill || !nombre) return;
      pill.querySelector('.avatar').textContent = nombre.trim()[0].toUpperCase();
      pill.querySelector('.name').textContent   = nombre.trim();
      pill.style.display = 'inline-flex';
    }

    if (NOMBRE) {
      mostrarPill(NOMBRE);
    } else {
      window.authFetch('/josgmaestro/api/yo')
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(me){
          if (!me || !me.nombre) return;
          localStorage.setItem('usuario_nombre', me.nombre);
          mostrarPill(me.nombre);
        }).catch(function(){});
    }

    // Logout
    const btn = document.getElementById('btn-logout');
    if (btn) {
      btn.style.display = 'flex';
      btn.addEventListener('click', function() {
        fetch('/josgmaestro/logout', { method:'POST' })
          .finally(function(){ localStorage.clear(); location.href = '/josgentumano/login.html'; });
      });
    }
  })();
  </script>
</body>
</html>
