<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    :root{
      --ink:#0f172a; --muted:#6b7280; --brd:#e5e7eb;
    }
    body{ color:var(--ink); background:#fff; }
    .container{ max-width:720px; margin:0 auto; padding:16px; }

    /* Topbar minimal: solo el nombre, a la derecha */
    .topbar{ display:flex; justify-content:flex-end; align-items:center; min-height:48px; }
    #user-name{ color:var(--muted); font-weight:600; }

    /* ========= HERO con pentagrama + figuras “marca de agua” ========= */
    .hero{
      position:relative; margin:12px 0 14px; padding:28px 16px 24px;
      border:1px solid #f3e7da; border-radius:22px; text-align:center; overflow:hidden;
      background-image:
        radial-gradient(1400px 380px at -10% -10%, rgba(255,229,209,.85) 0%, rgba(255,229,209,0) 60%),
        radial-gradient(1200px 360px at 110% 0%, rgba(255,241,201,.85) 0%, rgba(255,241,201,0) 55%),
        linear-gradient(to bottom, rgba(0,0,0,.055) 0, rgba(0,0,0,.055) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,.055) 0, rgba(0,0,0,.055) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,.055) 0, rgba(0,0,0,.055) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,.055) 0, rgba(0,0,0,.055) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,.055) 0, rgba(0,0,0,.055) 1px, transparent 1px),
        linear-gradient(180deg,#ffffff,#fff9f2 72%);
      background-size:auto,auto,100% 60px,100% 60px,100% 60px,100% 60px,100% 60px,auto;
      background-position:center,center,0 0,0 8px,0 16px,0 24px,0 32px,center;
      background-repeat:no-repeat,no-repeat,repeat-y,repeat-y,repeat-y,repeat-y,repeat-y,no-repeat;
      box-shadow:0 12px 36px rgba(0,0,0,.08);
    }
    .hero::after{ content:none; }
    .hero::before{
      content:""; position:absolute; right:-28px; bottom:-28px; width:300px; height:180px; opacity:.055;
      background:url("../imagenes/logoJOSG.png") no-repeat right bottom / contain; pointer-events:none;
    }
    .motifs-layer{ position:absolute; inset:0; z-index:1; pointer-events:none; user-select:none; }
    .motif{ position:absolute; line-height:1; color:#000; opacity:.035; filter:blur(.15px); mix-blend-mode:multiply; transform-origin:center; will-change:transform,left,top; }
    .hero .hero-logo, .hero h1, .hero p{ position:relative; z-index:2; }
    .hero .hero-logo{ display:block; margin:0 auto 10px; max-height:112px; width:auto; filter:drop-shadow(0 4px 14px rgba(0,0,0,.10)); }
    .hero h1{
      margin:0; font-weight:900; letter-spacing:.2px; font-size:clamp(28px, 6.2vw, 44px); line-height:1.02;
      background:linear-gradient(180deg,#111,#744b00); -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .hero p{ margin:6px 0 0; color:var(--muted); }

    /* ===== Tu estilo de mensajes (sin cambios visuales de tarjetas) ===== */
    .muted{ color:var(--muted); }
    .list{ display:grid; gap:12px; }
    .card{ border:1px solid var(--brd); border-radius:14px; padding:12px; background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.04); }
    .card h3{ margin:.1rem 0 .25rem; font-size:1.05rem; }
    .card p{ margin:.25rem 0; }
    .meta{ font-size:.85rem; color:var(--muted); }
    .msg-body{ white-space:pre-wrap; word-break:break-word; }
    .chips{ display:flex; justify-content:center; gap:.5rem; flex-wrap:wrap; margin-top:.4rem; }
    .chip{ display:inline-block; padding:.38rem .7rem; border:1px solid var(--brd); border-radius:999px; background:#fff; font-weight:700; font-size:.9rem; color:#ea6b38; text-decoration:none; white-space:nowrap; }
    .chip:active{ transform:translateY(1px); }
    .mark-wrap{ margin-top:.35rem; }
    .btn-ghost{ padding:.4rem .6rem; font-size:.85rem; background:#fff; border:1px solid var(--brd); border-radius:999px; color:#374151; }
    .btn-ghost:hover{ background:#f9fafb; }
    .btn-ghost:active{ transform:translateY(1px); }
    .pager{ display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; margin:14px 0 4px; }
    .pager-btn{ display:inline-flex; align-items:center; justify-content:center; min-width:2.25rem; padding:.35rem .65rem; border:1px solid var(--brd); background:#fff; border-radius:8px; font-size:.9rem; line-height:1; white-space:nowrap; color:#212529; font-weight:500; }
    .pager-btn.active{ font-weight:700; border-color:#ffb554; box-shadow:0 0 0 3px #fff6e8; color:#ea6b38; }
    .pager-btn[disabled]{ opacity:.5; cursor:default; }
    .pager span{ padding:0 .25rem; color:#6c757d; align-self:center; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Topbar solo con el nombre -->
    <div class="topbar"><div id="user-name"></div></div>

    <!-- HERO -->
    <div class="hero" aria-label="Bienvenida">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Tus mensajes y avisos.</p>
    </div>

    <h2>Mensajes</h2>
    <div id="empty" class="muted" style="display:none;">No tienes mensajes aún.</div>
    <div id="list" class="list"></div>
    <div id="pager" class="pager"></div>
  </div>

<script>
(function(){
  const alumno_id = localStorage.getItem('alumno_id');
  if (!alumno_id) { location.href = 'index.html'; return; }

  const $list  = document.getElementById('list');
  const $empty = document.getElementById('empty');
  const $pager = document.getElementById('pager');

  const PAGE_SIZE = 5;
  let DATA = [];
  let currentPage = 1;
  let totalPages  = 1;

  function fmtFecha(iso){
    if (!iso) return '';
    const d = new Date(iso);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const aa = String(d.getFullYear()).slice(-2);
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${dd}/${mm}/${aa} ${hh}:${mi}`;
  }
  const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");

  function safeHref(u){
    if (!u) return '';
    let s = String(u).trim();
    s = s.replace(/^https?\/\//i, m => m.includes('://') ? m : m.replace('//', '://'));
    if (/^[a-zA-Z][\w.+-]*:/.test(s)) return s;
    if (s.startsWith('//') || s.startsWith('/')) return s;
    return 'https://' + s;
  }

  function extraLinksFromMsg(m){
    const out = [], seen = new Set();
    let arr = null;
    if (Array.isArray(m.urls)) arr = m.urls;
    else if (typeof m.urls === 'string' && m.urls.trim() !== '') { try { arr = JSON.parse(m.urls); } catch {} }

    function pushRaw(raw){
      if (!raw) return;
      raw = String(raw).trim().replace(/[).,;:!?]+$/,'');
      const href = safeHref(raw);
      const key  = href.toLowerCase();
      if (!seen.has(key)) { seen.add(key); out.push(href); }
    }

    if (Array.isArray(arr)) for (const raw of arr) pushRaw(raw);
    if (!out.length && m.url) for (const part of String(m.url).split(/[\s,;|]+/)) pushRaw(part);
    return out.slice(0, 10);
  }

  function tpl(m){
    const chips = extraLinksFromMsg(m).map((href, i) =>
      `<a class="chip" href="${href}" target="_blank" rel="noopener">Enlace ${i+1}</a>`
    ).join('');
    return `
      <article class="card" data-id="${m.id}">
        <h3>${esc(m.titulo || 'Aviso')}</h3>
        <div class="msg-body">${esc(m.cuerpo || '')}</div>
        ${chips ? `<div class="chips">${chips}</div>` : ''}
        <p class="meta">${fmtFecha(m.created_at)}${m.autor ? ' · ' + esc(m.autor) : ''}${m.leido_at ? ' · leído' : ''}</p>
        ${m.leido_at ? '' : `<div class="mark-wrap"><button class="btn-ghost" data-mark="${m.id}">Marcar como leído</button></div>`}
      </article>
    `;
  }

  function renderPage(page=1){
    currentPage = Math.max(1, Math.min(page, totalPages));
    const start = (currentPage - 1) * PAGE_SIZE;
    const items = DATA.slice(start, start + PAGE_SIZE);

    $list.innerHTML = '';
    if (!items.length){ $empty.style.display = 'block'; }
    else { $empty.style.display = 'none'; $list.insertAdjacentHTML('beforeend', items.map(tpl).join('')); }
    renderPager();
  }

  function renderPager(){
    $pager.innerHTML = '';
    if (totalPages <= 1) return;

    const addBtn = (label, page, {disabled=false, active=false}={})=>{
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'pager-btn' + (active ? ' active' : '');
      b.textContent = label;
      if (disabled) b.disabled = true;
      b.addEventListener('click', ()=>{
        if (disabled || page === currentPage) return;
        renderPage(page);
        const top = document.querySelector('.container').offsetTop + document.querySelector('h2').offsetTop;
        window.scrollTo({ top, behavior:'smooth' });
      });
      $pager.appendChild(b);
    };

    addBtn('‹', Math.max(1, currentPage - 1), { disabled: currentPage === 1 });

    const win = 1;
    let start = Math.max(1, currentPage - win);
    let end   = Math.min(totalPages, currentPage + win);

    if (start > 1){
      addBtn('1', 1, { active: currentPage === 1 });
      if (start > 2) addEllipsis();
    }
    for (let p = start; p <= end; p++) addBtn(String(p), p, { active: p === currentPage });
    if (end < totalPages){
      if (end < totalPages - 1) addEllipsis();
      addBtn(String(totalPages), totalPages, { active: currentPage === totalPages });
    }

    addBtn('›', Math.min(totalPages, currentPage + 1), { disabled: currentPage === totalPages });

    function addEllipsis(){
      const s = document.createElement('span');
      s.textContent = '…';
      s.style.cssText = 'padding:0 .25rem; color:#6c757d; align-self:center;';
      $pager.appendChild(s);
    }
  }

  async function cargar(){
    try{
      const url = `/firmas/api/alumno/${encodeURIComponent(alumno_id)}/mensajes?_ts=${Date.now()}`;
      const token = localStorage.getItem('token');
      const r = await fetch(url, { headers: token ? { 'Authorization': 'Bearer ' + token } : {} });
      if (!r.ok) throw new Error('No se pudieron cargar los mensajes');
      const j = await r.json();
      if (!Array.isArray(j)) throw new Error('Formato inesperado');

      DATA = j.slice().sort((a,b)=> Number(b.id||0) - Number(a.id||0));
      totalPages  = Math.max(1, Math.ceil(DATA.length / PAGE_SIZE));
      renderPage(1);
    }catch(e){
      console.error(e);
      $list.innerHTML = '';
      $pager.innerHTML = '';
      $empty.textContent = 'No se pudieron cargar los mensajes.';
      $empty.style.display = 'block';
    }
  }

  $list.addEventListener('click', async (ev)=>{
    const btn = ev.target.closest('button[data-mark]');
    if (!btn) return;
    const id = Number(btn.getAttribute('data-mark'));
    try{
      const token = localStorage.getItem('token');
      const r = await fetch(`/firmas/api/alumno/${encodeURIComponent(alumno_id)}/mensajes/${id}/leer`, {
        method:'POST',
        headers: Object.assign({ 'Content-Type':'application/json' }, token ? { 'Authorization': 'Bearer ' + token } : {})
      });
      if (!r.ok) throw new Error('No se pudo marcar como leído');
      btn.remove();
      const meta = btn.closest('.card').querySelector('.meta');
      if (meta && !/· leído/.test(meta.textContent)) meta.textContent += ' · leído';
    }catch(e){ console.error(e); }
  });

  document.addEventListener('DOMContentLoaded', cargar);
  window.addEventListener('pageshow', cargar);
  document.addEventListener('visibilitychange', ()=>{ if (document.visibilityState === 'visible') cargar(); });
})();
</script>

<!-- Hero: notas aleatorias sin solapes -->
<script>
(function(){
  const SYMBOLS=['♩','♪','♫','♬'];
  const COUNT_MIN=7, COUNT_MAX=10, SIZE_MIN=72, SIZE_MAX=160, ROT_MIN=-16, ROT_MAX=16;
  const PADDING=10, EDGE_PAD=6, MAX_TRIES=80;
  const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const rel=(el,par)=>{const r=el.getBoundingClientRect(),p=par.getBoundingClientRect();return {x:r.left-p.left,y:r.top-p.top,w:r.width,h:r.height}};
  const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);
  function place(){
    const hero=document.querySelector('.hero'); const layer=document.querySelector('.motifs-layer'); if(!hero||!layer) return;
    layer.innerHTML=''; const hr=hero.getBoundingClientRect();
    const avoid=[]; ['.hero-logo','h1','p'].forEach(sel=>{const el=hero.querySelector(sel); if(!el) return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
    const placed=[]; const count=ri(COUNT_MIN,COUNT_MAX);
    for(let i=0;i<count;i++){
      const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
      let ok=false;
      for(let t=0;t<MAX_TRIES;t++){
        const size=ri(SIZE_MIN,SIZE_MAX), rot=ri(ROT_MIN,ROT_MAX);
        s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
        const left=ri(EDGE_PAD,Math.max(EDGE_PAD,hr.width-size-EDGE_PAD)), top=ri(EDGE_PAD,Math.max(EDGE_PAD,hr.height-size-EDGE_PAD));
        s.style.left=left+'px'; s.style.top=top+'px';
        const r=rel(s,hero);
        if(r.x<EDGE_PAD||r.y<EDGE_PAD||r.x+r.w>hr.width-EDGE_PAD||r.y+r.h>hr.height-EDGE_PAD) continue;
        if(avoid.some(av=>hit(r,av,PADDING))) continue;
        if(placed.some(pr=>hit(r,pr,PADDING))) continue;
        placed.push(r); s.style.opacity=''; ok=true; break;
      }
      if(!ok) layer.removeChild(s);
    }
  }
  window.addEventListener('load',place);
  window.addEventListener('pageshow',e=>{ if(e.persisted) setTimeout(place,0); });
  let tm=null; window.addEventListener('resize', ()=>{ clearTimeout(tm); tm=setTimeout(place,120); });
})();
</script>

<script src="app_alumno.js"></script>
</body>
</html>
