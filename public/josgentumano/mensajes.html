<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
  /* === Layout general === */
.list{ display:grid; gap:12px; }

/* Panel centrado (como mensajes_movil) */
.hero .panel{
  box-sizing:border-box;
  background:#fff;
  border:1px solid rgba(0,0,0,.08);
  border-radius:16px;
  padding:16px 18px;
  margin-left:auto; margin-right:auto;
  width:100%;
}
@media (max-width: 480px){
  .hero .panel{ max-width: min(96%, 540px); }
}
@media (min-width: 481px){
  .hero .panel{ max-width: min(96%, 560px); }
}

/* === Card: fondo naranja suave, sin banda lateral intensa === */
.card{
  border:1px solid rgba(0,0,0,.08);
  border-left:0;
  border-radius:16px;
  padding:14px 16px;
  background: linear-gradient(180deg, #fffdf8, #fff6ec); /* naranja muy suave */
  box-shadow:0 6px 16px rgba(0,0,0,.06);
}
.card h3{ margin:.15rem 0 .35rem; font-size:1.06rem; }
.meta{ font-size:.85rem; color:#6b7280; }

/* Cuerpo del mensaje */
.msg-body{
  background:#fff;
  border:1px solid #f0f0f0;
  border-radius:12px;
  padding:.7rem .8rem;
  white-space:pre-wrap;
  word-break:break-word;
  margin:.35rem 0 .2rem;
}

/* Chips de enlaces */
.chips{ display:flex; justify-content:center; gap:.5rem; flex-wrap:wrap; margin-top:.4rem; }
.chip{
  display:inline-block; padding:.38rem .7rem;
  border:1px solid #eee; border-radius:999px; background:#ffffff;
  font-weight:700; font-size:.9rem; color:#ea6b38; text-decoration:none; white-space:nowrap;
}

/* Barra de acciones (zona de botones) */
.mark-wrap{ margin-top:.35rem; display:flex; gap:.4rem; flex-wrap:wrap; }
.btn-ghost{
  padding:.4rem .6rem; font-size:.85rem; background:#fff;
  border:1px solid #e5e7eb; border-radius:999px; color:#ea6b38; cursor:pointer; user-select:none;
}
.btn-ghost:hover{ background:#fffaf3; }

/* Paginador */
.pager{ display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; margin:14px 0 4px; }
.pager-btn{
  all: unset; display:inline-flex; align-items:center; justify-content:center;
  padding:.35rem .6rem; min-width:2.2rem; text-align:center;
  border:1px solid #e5e7eb; border-radius:8px; background:#fff; font-size:.9rem; line-height:1; cursor:pointer; user-select:none;
}
.pager-btn.active{ font-weight:700; border-color:#ea6b38; box-shadow:0 0 0 4px rgba(234,107,56,.20); color:#ea6b38; }

/* === Adjuntos (clip) — UNA sola definición, sin duplicados === */
.clip-btn{
  padding:.35rem .6rem; font-size:.85rem; background:#fff;
  border:1px solid #e5e7eb; border-radius:999px; color:#374151;
  cursor:pointer; user-select:none; display:inline-flex; align-items:center; gap:.4rem;
}
.clip-btn:hover{ background:#fffaf3; }
.att-list{ list-style:none; margin:.35rem 0 0; padding:0; display:none; }
.att-list li{
  display:flex; align-items:center; justify-content:space-between; gap:.5rem;
  border:1px solid #eee; border-radius:10px; padding:.45rem .6rem; background:#fff; margin-top:.4rem;
}
.att-list a{ text-decoration:none; color:#ea6b38; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.att-count{ font-weight:700; color:#ea6b38; }

/* Por si algún tema añade pseudo-elementos naranjas */
.orange-cards .card::before,
.orange-cards .card::after{ content:none !important; }
.orange-cards .card{ border-left:0 !important; }
/* === Estilos robustos para acciones por data-* === */
:root{
  --action-text: #111827;      /* “Ver más…” */
  --mark-bg:    #fff7e6;       /* chip dorado/marrón */
  --mark-bdr:   #e0bf86;
  --mark-text:  #7a4a00;
}

.mark-wrap [data-toggle],
.mark-wrap [data-mark]{
  font: inherit !important;
  line-height: 1.2 !important;
}

/* “Ver más…” como enlace en negrita */
.mark-wrap [data-toggle]{
  all: unset !important;
  display: inline !important;
  font-weight: 700 !important;
  color: var(--action-text) !important;
  cursor: pointer !important;
}
.mark-wrap [data-toggle]:hover{ text-decoration: underline !important; }

/* “Marcar como leído” como chip dorado/marrón */
.mark-wrap [data-mark]{
  all: unset !important;
  display: inline-flex !important;
  align-items: center !important;
  gap: .35rem !important;
  padding: .35rem .7rem !important;
  border: 1px dashed var(--mark-bdr) !important;
  border-radius: 999px !important;
  background: var(--mark-bg) !important;
  color: var(--mark-text) !important;
  cursor: pointer !important;
}
.mark-wrap [data-mark]:hover{ background: #ffedd5 !important; }

</style>
</head>
<body data-page="mensajes" class="orange-cards">
  <div class="container">
    <!-- Topbar unificada: pill + logout a la derecha -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- HERO con pentagrama que ENVUELVE el contenido -->
    <div class="hero" aria-label="Avisos y notificaciones">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Avisos y notificaciones.</p>

      <div class="panel">
        <div id="empty" class="muted" style="display:none;">No tienes mensajes aún.</div>
        <div id="list" class="list"></div>
        <div id="pager" class="pager"></div>

        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-primary" onclick="location.href='index.html'">&larr; Inicio</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Pill + botón -->
  <script>
    (function(){
      function mostrarPill(){
        const pill = document.getElementById('user-pill');
        if(!pill) return;
        const nombre = (localStorage.getItem('alumno_nombre') || localStorage.getItem('usuario_nombre') || '').trim();
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre[0] || 'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
        const btn = document.getElementById('btn-logout');
        if (btn && localStorage.getItem('token')) btn.style.display = 'flex';
      }
      document.addEventListener('DOMContentLoaded', mostrarPill);
      window.addEventListener('pageshow', mostrarPill);
    })();
  </script>

  <!-- Logout universal (activo en esta página) -->
  <script>
    (function () {
      const btn = document.getElementById('btn-logout');
      function doLogout(){
        try{
          localStorage.removeItem('token');
          localStorage.removeItem('alumno_id');
          localStorage.removeItem('alumno_nombre');
        }catch(e){}
        location.href = 'login.html';
      }
      if (btn){
        btn.addEventListener('click', doLogout);
        btn.style.display = localStorage.getItem('token') ? 'flex' : 'none';
      }
    })();
  </script>

  <!-- Lógica de mensajes (lista, pager, marcar leído) -->
  <script>
  (function(){
    const alumno_id = localStorage.getItem('alumno_id');
    if (!alumno_id) { location.href = 'index.html'; return; }

    const $list  = document.getElementById('list');
    const $empty = document.getElementById('empty');
    const $pager = document.getElementById('pager');

    const PAGE_SIZE = 5;
    const MAX_CHARS = 320;  // umbral “Ver más”
    let DATA = [];
    let currentPage = 1;
    let totalPages  = 1;

    const LS_KEY = `mensajes_leidos_${alumno_id}`;
    const getReadSet = () => new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));
    const saveReadSet = (set) => localStorage.setItem(LS_KEY, JSON.stringify([...set]));
    const isRead = (m, readSet) => (
      !!(m.leido || m.leído || m.read || m.read_at || m.fecha_leido || m.f_leido || m.visto || m.visto_el)
      || readSet.has(String(m.id))
    );

    const esc = s => String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");

    const safeHref = (u)=>{
      if (!u) return '';
      const s = String(u).trim();
      if (/^[a-zA-Z][\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
      return 'https://' + s;
    };
    function normalizePublicURL(u){
      const s = safeHref(u || '');
      if (/^https?:\/\//i.test(s) || s.startsWith('//')) return s; // absoluta
      const base =
        location.pathname.startsWith('/josgmaestro/') ? '/josgmaestro' :
        location.pathname.startsWith('/firmas/')      ? '/firmas'      : '';
      if (s.startsWith('/mensajes/')) return base + s;
      return s;
    }
    function normalizePublicURL(u){
      const s = safeHref(u || '');
      if (/^https?:\/\//i.test(s) || s.startsWith('//')) return s; // absoluta
      const base =
        location.pathname.startsWith('/josgmaestro/') ? '/josgmaestro' :
        location.pathname.startsWith('/firmas/')      ? '/firmas'      : '';
      if (s.startsWith('/mensajes/')) return base + s;
      return s;
    }
    function isAttachmentUrl(raw){
      const s = String(raw||'');
      if (/^https?:\/\//i.test(s)) return false; // externas -> enlaces, no adjuntos
      const base =
        location.pathname.startsWith('/josgmaestro/') ? '/josgmaestro' :
        location.pathname.startsWith('/firmas/')      ? '/firmas'      : '';
      return s.startsWith('/mensajes/') || s.startsWith(base + '/mensajes/');
    }
    function domainLabel(href){
      try{ const u = new URL(href, location.origin);
          return u.hostname.replace(/^www\./,''); }
      catch{ return 'Enlace'; }
    }

    function fmtFecha(iso){
      if (!iso) return '';
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2,'0');
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const aa = String(d.getFullYear()).slice(-2);
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return `${dd}/${mm}/${aa} ${hh}:${mi}`;
    }

    // Une en un único array los enlaces (strings u objetos) y los adjuntos {filename, original_name...}
function collectLinksAndFiles(m){
  const arr = [];

  // 1) urls/enlaces/links como strings u objetos {url|href|link}
  const rawUrls =
    (Array.isArray(m.urls)    ? m.urls    :
     Array.isArray(m.links)   ? m.links   :
     Array.isArray(m.enlaces) ? m.enlaces : []);
  for (const u of rawUrls){
    const href = typeof u === 'string' ? u : (u?.url ?? u?.href ?? u?.link ?? '');
    if (!href) continue;
    const safe = safeHref(href);
    const label = decodeURIComponent(String(href).split('/').pop() || href).replace(/\?.*$/,'');
    arr.push({ href: safe, label });
  }

  // 2) adjuntos de BD (mensaje_adjuntos): filename suele venir como "/mensajes/xxxx.ext"
  if (Array.isArray(m.adjuntos)){
    for (const a of m.adjuntos){
      const href = a?.filename || a?.url || a?.href || '';
      if (!href) continue;
      const safe = safeHref(href);
      const label = a?.original_name ||
                    decodeURIComponent(String(href).split('/').pop() || 'archivo').replace(/\?.*$/,'');
      arr.push({ href: safe, label });
    }
  }

  return arr;
}

function domainLabel(href){
  try { return new URL(href, location.origin).hostname.replace(/^www\./,''); }
  catch { return 'Enlace'; }
}
function cardHTML(m, readSet){
  const idStr  = String(m.id ?? '');
  const titulo = esc(m.titulo || m.title || 'Aviso');
  const cuerpo = String(m.cuerpo || m.mensaje || m.body || '').trim();
  const fecha  = m.fecha || m.created_at || m.fecha_envio || m.sent_at || m.createdAt || '';
  const when   = fmtFecha(fecha);

  const truncated = cuerpo.length > MAX_CHARS;
  const shortHTML = esc(cuerpo.slice(0, MAX_CHARS)) + (truncated ? '…' : '');
  const fullHTML  = esc(cuerpo);

  const read = isRead(m, readSet);
  const meta = [when, read ? 'leído' : 'no leído'].filter(Boolean).join(' · ');

  // --- Recolecta URLs (enlaces) y adjuntos BD ---
  const urlsRaw =
    (Array.isArray(m.urls)    ? m.urls :
     Array.isArray(m.links)   ? m.links :
     Array.isArray(m.enlaces) ? m.enlaces :
     (m.links ? [m.links] : (m.urls ? [m.urls] : [])));

  const adjuntosRaw = Array.isArray(m.adjuntos) ? m.adjuntos : [];

  const attachments = [];  // para el 📎
  const links = [];        // chips separados

  // Helper para prefijo de montaje (p. ej., /josgmaestro o /firmas)
  const baseMount =
    location.pathname.startsWith('/josgmaestro/') ? '/josgmaestro' :
    location.pathname.startsWith('/firmas/')      ? '/firmas'      : '';

  const isAttachmentPath = (p) => {
    const s = String(p||'');
    return s.startsWith('/mensajes/') || s.startsWith(baseMount + '/mensajes/');
  };

  // 1) URLs (string u objeto {url|href|link})
  for (const u of urlsRaw){
    const raw  = typeof u === 'string' ? u : (u?.url ?? u?.href ?? u?.link ?? '');
    if (!raw) continue;

    if (isAttachmentPath(raw)){
      // Trátalo como adjunto
      const path = raw.startsWith('/mensajes/') ? baseMount + raw : raw;
      const href  = safeHref(path);
      const label = decodeURIComponent(String(raw).split('/').pop() || 'archivo').replace(/\?.*$/,'');
      attachments.push({ href, label });
    } else {
      // Trátalo como enlace externo/interno que no es adjunto
      const href  = safeHref(raw);
      const label = domainLabel(href); // solo dominio para no desbordar
      links.push({ href, label, title: raw });
    }
  }

  // 2) Adjuntos desde BD (mensaje_adjuntos)
  for (const a of adjuntosRaw){
    const raw = a?.filename || a?.url || a?.href || '';
    if (!raw) continue;
    const path = raw.startsWith('/mensajes/') ? baseMount + raw : raw;
    const href  = safeHref(path);
    const label = a?.original_name ||
                  decodeURIComponent(String(raw).split('/').pop() || 'archivo').replace(/\?.*$/,'');
    attachments.push({ href, label });
  }

  // --- Chips de enlaces (solo “links”, nunca adjuntos) ---
  const linksHTML = links.length ? `
    <div class="chips">
      ${links.map(l =>
        `<a class="chip" href="${l.href}" target="_blank" rel="noopener" title="${esc(l.title)}">${esc(l.label)} ↗</a>`
      ).join('')}
    </div>
  ` : '';

  // --- Bloque del clip (solo adjuntos) ---
  const clipHTML = attachments.length ? `
    <div class="mark-wrap">
      <button class="clip-btn" data-clip="${idStr}">📎 <span class="att-count">${attachments.length}</span> adjunto${attachments.length>1?'s':''}</button>
    </div>
    <ul class="att-list" id="att-${idStr}">
      ${attachments.map(it => `<li><a href="${it.href}" target="_blank" rel="noopener">${esc(it.label)}</a></li>`).join('')}
    </ul>
  ` : '';

  return `
  <article class="card">
    <h3>${titulo}</h3>
    <div class="meta">${meta}</div>
    <div class="msg-body" data-expanded="false" data-short="${shortHTML}" data-full="${fullHTML}">${shortHTML}</div>

    <!-- Botones primero (ahora con estilo action-chip) -->
    <div class="mark-wrap">
  ${truncated ? `<a href="#" data-toggle="${idStr}">Ver más…</a>` : ``}
  ${!read ? `<button type="button" data-mark="${idStr}"><span aria-hidden="true">✓</span> Marcar como leído</button>` : ``}
</div>

    <!-- Enlaces/adjuntos después, como ya lo tienes -->
    ${linksHTML || '' /* si usas chips para enlaces */}
    ${clipHTML  || '' /* clip de adjuntos */}
  </article>
`;
}

  function renderPager(){
      $pager.innerHTML = '';
      if (totalPages <= 1) return;

      const addBtn = (label, page, opts={})=>{
        const b = document.createElement('button');
        b.className = 'pager-btn' + (opts.active ? ' active' : '');
        b.textContent = label;
        if (!opts.disabled){ b.addEventListener('click', ()=>renderPage(page)); }
        else { b.setAttribute('disabled',''); }
        $pager.appendChild(b);
      };

      const addEllipsis = ()=>{ const s = document.createElement('span'); s.textContent = '…'; $pager.appendChild(s); };

      addBtn('‹', Math.max(1, currentPage-1), { disabled: currentPage === 1 });

      const win = 1;
      let start = Math.max(1, currentPage - win);
      let end   = Math.min(totalPages, currentPage + win);

      if (start > 1){
        addBtn('1', 1, { active: currentPage === 1 });
        if (start > 2) addEllipsis();
      }
      for (let p = start; p <= end; p++) addBtn(String(p), p, { active: p === currentPage });
      if (end < totalPages){
        if (end < totalPages - 1) addEllipsis();
        addBtn(String(totalPages), totalPages, { active: currentPage === totalPages });
      }

      addBtn('›', Math.min(totalPages, currentPage + 1), { disabled: currentPage === totalPages });
    }

    function renderPage(page=1){
      const READ = getReadSet();
      currentPage = Math.min(Math.max(1,page), totalPages);
      if (DATA.length === 0){
        $list.innerHTML = '';
        $pager.innerHTML = '';
        $empty.style.display = 'block';
        return;
      }
      $empty.style.display = 'none';
      const start = (currentPage-1)*PAGE_SIZE;
      const slice = DATA.slice(start, start+PAGE_SIZE);
      $list.innerHTML = slice.map(m => cardHTML(m, READ)).join('');
      renderPager();
    }

    async function cargar(){
      try{
        const url = `/firmas/api/alumno/${encodeURIComponent(alumno_id)}/mensajes?_ts=${Date.now()}`;
        const token = localStorage.getItem('token');
        const r = await fetch(url, { headers: token ? { 'Authorization': 'Bearer ' + token } : {} });
        if (!r.ok) throw new Error('No se pudieron cargar los mensajes');
        const j = await r.json();
        if (!Array.isArray(j)) throw new Error('Formato inesperado');

        DATA = j.slice().sort((a,b)=> Number(b.id||0) - Number(a.id||0));  // recientes primero
        totalPages = Math.max(1, Math.ceil(DATA.length / PAGE_SIZE));
        renderPage(1);

        if ('Notification' in window && Notification.permission === 'default'){
          try{ Notification.requestPermission(); }catch{}
        }
      }catch(e){
        console.error(e);
        $list.innerHTML = '';
        $pager.innerHTML = '';
        $empty.textContent = 'No se pudieron cargar los mensajes.';
        $empty.style.display = 'block';
      }
    }
// Delegación: Clip / Ver más / Marcar leído
$list.addEventListener('click', async (ev) => {
  const chipLink = ev.target.closest('.chips a[href]');
if (chipLink){
  ev.preventDefault(); ev.stopPropagation(); ev.stopImmediatePropagation();
  try {
    const w = window.open(chipLink.href, '_blank', 'noopener');
    if (!w) location.assign(chipLink.href);
  } catch {
    location.assign(chipLink.href);
  }
  return;
}
  const attLink = ev.target.closest('.att-list a[href]');
if (attLink){
  const url = attLink.href;
  ev.preventDefault();
  ev.stopPropagation();
  ev.stopImmediatePropagation();
  try {
    const w = window.open(url, '_blank', 'noopener');
    if (!w) location.assign(url); // fallback si bloquea popups
  } catch {
    location.assign(url);
  }
  return;
}
  // 1) Clip: mostrar/ocultar adjuntos
  const clipBtn = ev.target.closest('button[data-clip]');
  if (clipBtn){
    const id = String(clipBtn.getAttribute('data-clip'));
    const ul = document.getElementById('att-' + id);
    if (ul){
      ul.style.display = (ul.style.display === 'none' || !ul.style.display) ? 'block' : 'none';
    }
    return;
  }

// 2) Ver más / Ver menos
const moreEl = ev.target.closest('[data-toggle]');
if (moreEl){
  ev.preventDefault();
  ev.stopPropagation();

  const card = moreEl.closest('.card');
  const body = card && card.querySelector('.msg-body');
  if (!body) return;

  const expanded = body.getAttribute('data-expanded') === 'true';
  if (expanded){
    body.textContent = body.getAttribute('data-short') || '';
    body.setAttribute('data-expanded', 'false');
    moreEl.textContent = 'Ver más…';
    moreEl.setAttribute('aria-expanded', 'false');
  } else {
    body.textContent = body.getAttribute('data-full') || '';
    body.setAttribute('data-expanded', 'true');
    moreEl.textContent = 'Ver menos';
    moreEl.setAttribute('aria-expanded', 'true');
  }
  return;
}

  // 3) Marcar como leído
  const markBtn = ev.target.closest('button[data-mark]');
  if (markBtn){
    const id = String(markBtn.getAttribute('data-mark'));
    try{
      const token = localStorage.getItem('token');
      const r = await fetch(`/firmas/api/alumno/${encodeURIComponent(alumno_id)}/mensajes/${id}/leer`, {
        method: 'POST',
        headers: Object.assign(
          { 'Content-Type': 'application/json' },
          token ? { 'Authorization': 'Bearer ' + token } : {}
        )
      });
      if (!r.ok) throw new Error('No se pudo marcar como leído');

      // Actualiza estado local y UI
      const set = getReadSet(); set.add(id); saveReadSet(set);
      markBtn.remove();
      const card = markBtn.closest('.card');
      const meta = card && card.querySelector('.meta');
      if (meta && !/leído/.test(meta.textContent)) {
        meta.textContent = (meta.textContent ? meta.textContent + ' · ' : '') + 'leído';
      }
    }catch(e){ console.error(e); }
    return;
  }
});
// Lanza la carga inicial y refrescos
document.addEventListener('DOMContentLoaded', cargar);
window.addEventListener('pageshow', cargar);
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') cargar();
});

// Cierra la IIFE
})();
  </script>

  <!-- Motivos musicales (símbolos compatibles + tamaño reducido) -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 30, SIZE_MAX = 40;
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p','.panel .actions'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD || rr.y<EDGE_PAD || rr.x+rr.w>hero.clientWidth-EDGE_PAD || rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
