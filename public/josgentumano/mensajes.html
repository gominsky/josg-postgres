<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mis mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    .muted{ color:#6c757d; }
    .list{ display:grid; gap:12px; }

    .card{
      position:relative;
      border:1px solid #e5e7eb; border-radius:14px; padding:12px;
      background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    /* Resalte muy sutil de no leído */
    .card.unread{ border-color:#f1c27d; }

    .card h3{ margin:0 0 .35rem 0; font-size:1.08rem; color:#111; }
    .card p{ margin:.35rem 0; color:#111; }
    .meta{ font-size:.9rem; color:#475569; }

    /* Botón discreto, blanco, pequeño */
    .row-actions{ margin-top:.35rem; }
    .btn-quiet{
      background:#fff; color:#6c757d;
      border:1px solid #dedede; border-radius:8px;
      padding:.32rem .55rem; font-size:.85rem; font-weight:600;
      cursor:pointer;
    }
    .btn-quiet:hover{ background:#f8f9fa; }
    .btn-quiet:focus{ outline:2px solid #e5e7eb; outline-offset:2px; }
    .btn-quiet:active{ transform: translateY(1px); }
    .btn-quiet:disabled{ opacity:.6; cursor:not-allowed; }

    .cta a{ display:inline-block; margin-top:.35rem; color:#0d6efd; text-decoration:underline; }

    .more-wrap{ display:flex; justify-content:center; margin:14px 0 4px; }
    .btn{ padding:.5rem .8rem; border:1px solid #ddd; border-radius:10px; background:#fafafa; }
    .btn:active{ transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="container">
    <h2>Mensajes</h2>

    <div id="empty" class="muted" style="display:none;">No tienes mensajes aún.</div>
    <div id="list" class="list"></div>

    <div class="more-wrap" id="more-wrap" style="display:none;">
      <button id="btn-more" class="btn">Ver más</button>
    </div>

    <div style="margin-top:1rem;">
      <button onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <script>
    const alumno_id = localStorage.getItem('alumno_id');
    if (!alumno_id) location.href = 'index.html';

    const $list = document.getElementById('list');
    const $empty = document.getElementById('empty');
    const $moreWrap = document.getElementById('more-wrap');
    const $btnMore = document.getElementById('btn-more');

    let DATA = [];     // mensajes cargados del servidor (máx 50 por la API actual)
    let cursor = 0;    // cuántos ya mostramos
    const PAGE = 10;   // tamaño de página

    function ensureProto(u){
      if (!u) return '';
      return /^[a-zA-Z][\w+.-]*:\/\//.test(u) ? u : 'https://' + u;
    }
    function fmtFecha(iso){
      if (!iso) return '';
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2,'0');
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const aa = String(d.getFullYear()).slice(-2);
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return `${dd}/${mm}/${aa} ${hh}:${mi}`;
    }

    async function marcarLeido(id){
      try{
        const r = await fetch(`/mensajes/app/mensajes/${encodeURIComponent(id)}/leer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ alumno_id })
        });
        if (!r.ok) throw new Error('No se pudo marcar como leído');

        // actualiza memoria
        const it = DATA.find(m => m.id === id);
        if (it) it.leido_at = new Date().toISOString();

        // actualiza DOM
        const card = $list.querySelector(`.card[data-id="${id}"]`);
        if (card){
          card.classList.remove('unread');
          const meta = card.querySelector('.meta');
          if (meta && !/leído/i.test(meta.textContent)) {
            meta.textContent = meta.textContent + ' · leído';
          }
          const btn = card.querySelector('[data-action="read"]');
          if (btn) btn.remove();
        }
      }catch(e){
        console.error(e);
        alert('No se pudo marcar como leído.');
      }
    }

    function tpl(m){
      const url = ensureProto((m.url || '').trim());
      const unread = !m.leido_at;
      return `
        <article class="card ${unread ? 'unread':''}" data-id="${m.id}">
          <h3>${m.titulo || 'Aviso'}</h3>
          <p>${(m.cuerpo || '').replace(/\n/g,'<br>')}</p>
          ${url ? `<p class="cta"><a href="${url}" target="_blank" rel="noopener" data-cta="link">Abrir enlace</a></p>` : ''}

          <p class="meta">${fmtFecha(m.created_at)}${m.leido_at ? ' · leído' : ''}</p>

          ${unread ? `<div class="row-actions"><button class="btn-quiet" data-action="read">Marcar como leído</button></div>` : ``}
        </article>
      `;
    }

    function renderNext(){
      const next = DATA.slice(cursor, cursor + PAGE);
      if (!next.length && cursor === 0){
        $empty.style.display = 'block';
        $moreWrap.style.display = 'none';
        return;
      }
      $empty.style.display = 'none';
      $list.insertAdjacentHTML('beforeend', next.map(tpl).join(''));
      cursor += next.length;
      $moreWrap.style.display = (cursor < DATA.length) ? 'flex' : 'none';
    }

    async function cargar(){
      try{
        const r = await fetch(`/mensajes/app/mensajes?alumno_id=${encodeURIComponent(alumno_id)}`);
        const j = await r.json();
        if (!r.ok || !Array.isArray(j)) throw new Error('No se pudieron cargar los mensajes');
        DATA = j; // ya vienen ordenados DESC por id
        cursor = 0;
        $list.innerHTML = '';
        renderNext();
      }catch(e){
        console.error(e);
        $empty.textContent = 'No se pudieron cargar los mensajes.';
        $empty.style.display = 'block';
      }
    }

    // Delegación de eventos
    $list.addEventListener('click', (ev) => {
      const card = ev.target.closest('.card');
      if (!card) return;
      const id = Number(card.dataset.id);

      // Botón "Marcar como leído"
      const btn = ev.target.closest('[data-action="read"]');
      if (btn) {
        btn.disabled = true;
        marcarLeido(id).finally(() => { btn.disabled = false; });
        return;
      }

      // Clic en "Abrir enlace" => marca leído en segundo plano
      const a = ev.target.closest('a[data-cta="link"]');
      if (a && card.classList.contains('unread')) {
        marcarLeido(id); // no bloquea la navegación
      }
    });

    $btnMore.addEventListener('click', renderNext);

    // carga inicial
    cargar();
  </script>
</body>
</html>
