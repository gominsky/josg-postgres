<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mis mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    :root{
      --accent:#ea6b38;
      --muted:#6b7280;
      --border:#e5e7eb;
    }
    .muted{ color:var(--muted); }
    .list{ display:grid; gap:12px; }
    .card{
      border:1px solid var(--border); border-radius:14px; padding:12px;
      background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .card h3{ margin:.1rem 0 .25rem; font-size:1.05rem; }
    .card p{ margin:.25rem 0; }
    .meta{ font-size:.85rem; color:var(--muted); }

    /* Enlaces corporativos */
    .msg-body a,
    .extra-list a{
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Anti-desbordamiento de URLs largas */
    .msg-body, .msg-body p, .msg-body a,
    .extra-list, .extra-list a{
      overflow-wrap:anywhere;
      word-break:break-word;
      min-width:0;
    }

    /* Lista de enlaces extra */
    .extra-list{ list-style:none; margin:.35rem 0 0; padding:0; }
    .extra-list li{ margin:.1rem 0; }

    .more-wrap{ display:flex; justify-content:center; margin:14px 0 4px; }
    .btn{ padding:.55rem .8rem; border:1px solid #ddd; border-radius:10px; background:#fafafa; }
    .btn:active{ transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="container">
    <h2>Mensajes</h2>

    <div id="empty" class="muted" style="display:none;">No tienes mensajes aún.</div>
    <div id="list" class="list"></div>

    <div class="more-wrap" id="more-wrap" style="display:none;">
      <button id="btn-more" class="btn">Ver más</button>
    </div>

    <div style="margin-top:1rem;">
      <button onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <script>
  (function(){
    const alumno_id = localStorage.getItem('alumno_id');
    if (!alumno_id) { location.href = 'index.html'; return; }

    const $list = document.getElementById('list');
    const $empty = document.getElementById('empty');
    const $moreWrap = document.getElementById('more-wrap');
    const $btnMore = document.getElementById('btn-more');

    let DATA = [];
    let cursor = 0;
    const PAGE = 10;

    function fmtFecha(iso){
      if (!iso) return '';
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2,'0');
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const aa = String(d.getFullYear()).slice(-2);
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return `${dd}/${mm}/${aa} ${hh}:${mi}`;
    }
    function esc(s){
      return String(s)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }
    function ensureProto(u){
      if (!u) return '';
      const s = String(u).trim();
      if (!s) return '';
      if (/^[a-zA-Z][\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
      return 'https://' + s;
    }
    // Linkify del cuerpo (soporta múltiples enlaces)
    function linkify(text){
      const URL_RE = /(https?:\/\/[^\s<>"']+|www\.[^\s<>"']+)/gi;
      let out = '', last = 0, m;
      while ((m = URL_RE.exec(text)) !== null) {
        const raw = m[0];
        out += esc(text.slice(last, m.index));
        let url = raw.replace(/[).,;:!?]+$/,''); // recorta puntuación final
        const trailing = raw.slice(url.length);
        const href = ensureProto(url);
        out += `<a href="${href}" target="_blank" rel="noopener">${esc(url)}</a>${esc(trailing)}`;
        last = URL_RE.lastIndex;
      }
      out += esc(text.slice(last));
      return out.replace(/\n/g,'<br>');
    }
    // Extrae enlaces de m.urls (array/JSON string) o, si no hay, de m.url (separado por comas/espacios/;|)
    function extraLinksFromMsg(m){
      const out = [];
      const seen = new Set();

      let arr = null;
      if (Array.isArray(m.urls)) {
        arr = m.urls;
      } else if (typeof m.urls === 'string' && m.urls.trim() !== '') {
        try { arr = JSON.parse(m.urls); } catch { arr = null; }
      }
      if (Array.isArray(arr)) {
        for (let raw of arr) {
          if (!raw) continue;
          raw = String(raw).trim().replace(/[).,;:!?]+$/,'');
          const href = ensureProto(raw);
          const key = href.toLowerCase();
          if (!seen.has(key)) { seen.add(key); out.push({ href, label: raw }); }
        }
      }
      if (!out.length && m.url) {
        const parts = String(m.url).split(/[\s,;|]+/).map(s => s.trim()).filter(Boolean);
        for (let raw of parts) {
          raw = raw.replace(/[).,;:!?]+$/,'');
          const href = ensureProto(raw);
          const key = href.toLowerCase();
          if (!seen.has(key)) { seen.add(key); out.push({ href, label: raw }); }
        }
      }
      return out;
    }

    function tpl(m){
      const cuerpoHTML = `<div class="msg-body">${linkify(m.cuerpo || '')}</div>`;
      const extras = extraLinksFromMsg(m);
      const extrasHTML = extras.length
        ? `<ul class="extra-list">` +
            extras.map(x => `<li><a href="${x.href}" target="_blank" rel="noopener" title="${esc(x.label)}">${esc(x.label)}</a></li>`).join('') +
          `</ul>`
        : '';
      return `
        <article class="card" data-id="${m.id}">
          <h3>${esc(m.titulo || 'Aviso')}</h3>
          ${cuerpoHTML}
          ${extrasHTML}
          <p class="meta">${fmtFecha(m.created_at)}${m.leido_at ? ' · leído' : ''}</p>
        </article>
      `;
    }

    function renderNext(){
      const next = DATA.slice(cursor, cursor + PAGE);
      if (!next.length && cursor === 0){
        $empty.style.display = 'block';
        $moreWrap.style.display = 'none';
        return;
      }
      $empty.style.display = 'none';
      $list.insertAdjacentHTML('beforeend', next.map(tpl).join(''));
      cursor += next.length;
      $moreWrap.style.display = (cursor < DATA.length) ? 'flex' : 'none';
    }

    async function cargar(){
      try{
        const r = await fetch(`/mensajes/app/mensajes?alumno_id=${encodeURIComponent(alumno_id)}`);
        const j = await r.json();
        if (!r.ok || !Array.isArray(j)) throw new Error('No se pudieron cargar los mensajes');
        DATA = j;
        cursor = 0;
        $list.innerHTML = '';
        renderNext();
      }catch(e){
        console.error('[mensajes] fallo cargando', e);
        $empty.textContent = 'No se pudieron cargar los mensajes.';
        $empty.style.display = 'block';
        $moreWrap.style.display = 'none';
      }
    }

    $btnMore.addEventListener('click', renderNext);
    cargar();
  })();
  </script>
</body>
</html>
