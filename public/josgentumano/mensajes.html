<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOSG en tu mano - Mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    :root{
      --accent:#ea6b38;
      --muted:#6b7280;
      --border:#e5e7eb;
    }
    body{ color:#0f172a; background:#fff; }
    h2{ margin:6px 0 10px; }

    .muted{ color:var(--muted); }
    .list{ display:grid; gap:12px; }
    .card{
      border:1px solid var(--border); border-radius:14px; padding:12px;
      background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .card h3{ margin:.1rem 0 .25rem; font-size:1.05rem; }
    .card p{ margin:.25rem 0; }
    .meta{ font-size:.85rem; color:var(--muted); }
    .msg-body{ white-space:pre-wrap; word-break:break-word; }

    /* Chips de enlaces */
    .chips{
      display:flex; justify-content:center; gap:.5rem; flex-wrap:wrap;
      margin-top:.4rem;
    }
    .chip{
      display:inline-block; padding:.38rem .7rem; border:1px solid var(--border);
      border-radius:999px; background:#fff;
      font-weight:700; font-size:.9rem; color:var(--accent); text-decoration:none;
      white-space:nowrap;
    }
    .chip:active{ transform: translateY(1px); }

    /* “Marcar leído” */
    .mark-wrap{ margin-top:.35rem; }
    .btn-ghost{
      padding:.4rem .6rem; font-size:.85rem; background:#fff;
      border:1px solid var(--border); border-radius:999px; color:#374151;
    }
    .btn-ghost:hover{ background:#f9fafb; }
    .btn-ghost:active{ transform: translateY(1px); }

    /* Paginación tipo Google, compacta */
    .pager{
      display:flex; align-items:center; justify-content:center;
      gap:6px; flex-wrap:wrap; margin:14px 0 4px;
    }
    .pager-btn{
      all: unset;                    /* <- limpia estilos globales de botones */
      display:inline-flex; align-items:center; justify-content:center;
      padding:.35rem .6rem; min-width:2.2rem; text-align:center;
      border:1px solid var(--border); border-radius:8px; background:#fff;
      font-size:.9rem; line-height:1; cursor:pointer; user-select:none;
    }
    .pager-btn:hover{ background:#fafafa; }
    .pager-btn:active{ transform: translateY(1px); }
    .pager-btn[disabled]{ opacity:.5; cursor:default; }
    .pager-btn.active{ font-weight:700; border-color:#ffb554; box-shadow:0 0 0 3px #fff6e8; color:#ea6b38; }
    .pager span{ padding:0 .25rem; color:#6c757d; align-self:center; }

    /* Botón Inicio (naranja) – aislado para no chocar con la paginación */
    .back{ margin:16px 0 6px; }
    .btn-home{
      display:inline-block; padding:.6rem 1.2rem; min-width:110px;
      border-radius:12px; font-weight:600; color:#fff; text-decoration:none; border:0;
      background: linear-gradient(180deg,#f28d63,#ea6b38); border:1px solid #cc5c2f;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      cursor:pointer; text-align:center;
    }
    .btn-home:hover{ transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .btn-home:active{ transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }
  </style>
</head>
<body>
  
  
  <div class="container">
    <div class="topbar">
      <div id="user-name"></div>
    </div>
    
    <div class="hero" aria-label="Bienvenida">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Avisios y notificaciones.</p>
    </div>
    <div class="topbar">
      <div id="user-name"></div>
    </div>
    <div id="empty" class="muted" style="display:none;">No tienes mensajes aún.</div>
    <div id="list" class="list"></div>
    <div id="pager" class="pager"></div>

    <div class="back">
      <button class="btn-home" onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

<script>
(function(){
  const alumno_id = localStorage.getItem('alumno_id');
  if (!alumno_id) { location.href = 'index.html'; return; }

  // pinta nombre si está guardado
  const nombre = localStorage.getItem('alumno_nombre') || localStorage.getItem('usuario_nombre') || '';
  if (nombre) document.getElementById('user-name').textContent = `Hola, ${nombre}`;

  const $list  = document.getElementById('list');
  const $empty = document.getElementById('empty');
  const $pager = document.getElementById('pager');

  const PAGE_SIZE = 5;
  let DATA = [];
  let currentPage = 1;
  let totalPages  = 1;

  const esc = s => String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
  const safeHref = (u)=>{
    if (!u) return '';
    let s = String(u).trim();
    s = s.replace(/^https?\/\//i, m => m.includes('://') ? m : m.replace('//', '://'));
    if (/^[a-zA-Z][\w.+-]*:/.test(s)) return s;
    if (s.startsWith('//') || s.startsWith('/')) return s;
    return 'https://' + s;
  };

  function fmtFecha(iso){
    if (!iso) return '';
    const d = new Date(iso);
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const aa = String(d.getFullYear()).slice(-2);
    const hh = String(d.getHours()).padStart(2,'0');
    const mi = String(d.getMinutes()).padStart(2,'0');
    return `${dd}/${mm}/${aa} ${hh}:${mi}`;
  }

  function linksDe(m){
    const out = [];
    const seen = new Set();
    let arr = null;

    // m.urls puede ser array o JSON en string
    if (Array.isArray(m.urls)) arr = m.urls;
    else if (typeof m.urls === 'string'){
      try{ const j = JSON.parse(m.urls); if (Array.isArray(j)) arr = j; }catch{}
    }

    if (!arr && m.url){
      const parts = String(m.url).split(/[,;\s]+/).filter(Boolean);
      arr = parts;
    }

    (arr||[]).forEach(raw=>{
      const href = safeHref(raw);
      if (!href || seen.has(href)) return;
      seen.add(href);
      out.push(href);
    });
    return out;
  }

  function cardHTML(m){
    const titulo = esc(m.titulo || 'Mensaje');
    const cuerpo = esc(m.mensaje || m.texto || '');
    const fecha  = fmtFecha(m.fecha || m.created_at || m.f_creacion);

    const links = linksDe(m);
    const chips = links.map((href,i)=>`<a class="chip" href="${href}" target="_blank" rel="noopener">Enlace ${i+1}</a>`).join('');

    return `
      <article class="card">
        <h3>${titulo}</h3>
        <p class="meta">${fecha}${m.leido ? ' · leído':''}</p>
        <p class="msg-body">${cuerpo}</p>
        ${chips ? `<div class="chips">${chips}</div>`:''}
        ${!m.leido ? `<div class="mark-wrap"><button class="btn-ghost" data-mark="${Number(m.id||0)}">Marcar leído</button></div>`:''}
      </article>
    `;
  }

  function renderPage(page=1){
    currentPage = Math.min(Math.max(1,page), totalPages);
    if (DATA.length === 0){
      $list.innerHTML = '';
      $pager.innerHTML = '';
      $empty.style.display = 'block';
      return;
    }
    $empty.style.display = 'none';
    const start = (currentPage-1)*PAGE_SIZE;
    const slice = DATA.slice(start, start+PAGE_SIZE);
    $list.innerHTML = slice.map(cardHTML).join('');
    renderPager();
  }

  function renderPager(){
    $pager.innerHTML = '';
    if (totalPages <= 1) return;

    const addBtn = (label, page, opts={})=>{
      const b = document.createElement('button');
      b.className = 'pager-btn' + (opts.active ? ' active' : '');
      b.textContent = label;
      if (!opts.disabled){
        b.addEventListener('click', ()=>renderPage(page));
      } else {
        b.setAttribute('disabled','');
      }
      $pager.appendChild(b);
    };

    // anterior
    addBtn('‹', Math.max(1, currentPage-1), { disabled: currentPage === 1 });

    // ventana compacta (1 a cada lado)
    const win = 1;
    let start = Math.max(1, currentPage - win);
    let end   = Math.min(totalPages, currentPage + win);

    if (start > 1){
      addBtn('1', 1, { active: currentPage === 1 });
      if (start > 2) addEllipsis();
    }
    for (let p = start; p <= end; p++) addBtn(String(p), p, { active: p === currentPage });
    if (end < totalPages){
      if (end < totalPages - 1) addEllipsis();
      addBtn(String(totalPages), totalPages, { active: currentPage === totalPages });
    }

    // siguiente
    addBtn('›', Math.min(totalPages, currentPage + 1), { disabled: currentPage === totalPages });

    function addEllipsis(){
      const s = document.createElement('span');
      s.textContent = '…';
      $pager.appendChild(s);
    }
  }

  async function cargar(){
    try{
      const url = `/firmas/api/alumno/${encodeURIComponent(alumno_id)}/mensajes?_ts=${Date.now()}`;
      const token = localStorage.getItem('token');
      const r = await fetch(url, { headers: token ? { 'Authorization': 'Bearer ' + token } : {} });
      if (!r.ok) throw new Error('No se pudieron cargar los mensajes');
      const j = await r.json();
      if (!Array.isArray(j)) throw new Error('Formato inesperado');

      // Orden más reciente primero
      DATA = j.slice().sort((a,b)=> Number(b.id||0) - Number(a.id||0));
      totalPages = Math.max(1, Math.ceil(DATA.length / PAGE_SIZE));
      renderPage(1);

      // Si el sitio no pidió permisos aún, dispara el prompt sutilmente
      if ('Notification' in window && Notification.permission === 'default'){
        try{ Notification.requestPermission(); }catch{}
      }
    }catch(e){
      console.error(e);
      $list.innerHTML = '';
      $pager.innerHTML = '';
      $empty.textContent = 'No se pudieron cargar los mensajes.';
      $empty.style.display = 'block';
    }
  }

  // marcar como leído (delegación)
  $list.addEventListener('click', async (ev)=>{
    const btn = ev.target.closest('button[data-mark]');
    if (!btn) return;
    const id = Number(btn.getAttribute('data-mark'));
    try{
      const token = localStorage.getItem('token');
      const r = await fetch(`/firmas/api/alumno/${encodeURIComponent(alumno_id)}/mensajes/${id}/leer`, {
        method:'POST',
        headers: Object.assign(
          { 'Content-Type':'application/json' },
          token ? { 'Authorization': 'Bearer ' + token } : {}
        )
      });
      if (!r.ok) throw new Error('No se pudo marcar como leído');
      btn.remove();
      const meta = btn.closest('.card').querySelector('.meta');
      if (meta && !/· leído/.test(meta.textContent)) {
        meta.textContent = meta.textContent + ' · leído';
      }
    }catch(e){ console.error(e); }
  });

  document.addEventListener('DOMContentLoaded', cargar);
  window.addEventListener('pageshow', cargar);
  document.addEventListener('visibilitychange', ()=>{ if (document.visibilityState === 'visible') cargar(); });
})();
</script>
<script>
  // Nombre del usuario en la cabecera
  (function(){
    const n = localStorage.getItem('alumno_nombre') || '';
    const slot = document.getElementById('user-name');
    if (slot) slot.textContent = n;
  })();
</script>

<script>
  // Figuras musicales (marca de agua)
  (function(){
    const SYMBOLS=['♩','♪','♫','♬']; const COUNT_MIN=7,COUNT_MAX=10,SIZE_MIN=72,SIZE_MAX=160,ROT_MIN=-16,ROT_MAX=16;
    const PADDING=10, EDGE_PAD=6, MAX_TRIES=80;
    const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a, pick=a=>a[Math.floor(Math.random()*a.length)];
    const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
    const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);
    function place(){
      const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
      layer.innerHTML='';
      const avoid=[]; ['.hero-logo','h1','p'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
      const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
      for(let i=0;i<count;i++){
        const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
        let ok=false;
        for(let t=0;t<MAX_TRIES;t++){
          const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
          s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
          const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
          const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
          s.style.left=left+'px'; s.style.top=top+'px';
          const rr=rel(s,hero);
          if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
          if (avoid.some(av=>hit(rr,av,PADDING))) continue;
          if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
          placed.push(rr); s.style.opacity=''; ok=true; break;
        }
        if(!ok) layer.removeChild(s);
      }
    }
    window.addEventListener('load', place);
    window.addEventListener('pageshow', e=>{ if(e.persisted) setTimeout(place,0); });
    let tm; window.addEventListener('resize', ()=>{ clearTimeout(tm); tm=setTimeout(place,120); });
  })();
</script>

<script src="app_alumno.js"></script>
</body>
</html>
