<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Mensajes</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
/* ============================================================
   mensajes.html - estilos inline limpios
   Tokens base en estilos_app.css (--naranja, --muted, etc.)
   ============================================================ */

/* Variables locales */
:root {
  --msg-naranja:   #FF9501;
  --msg-crema:     #fff8f0;
  --msg-crema-dk:  #ffe9d4;
  --msg-border:    rgba(255,149,1,.22);
  --msg-read-bg:   #fafaf8;
  --msg-read-bdr:  rgba(0,0,0,.07);
  --msg-shadow:    0 2px 10px rgba(0,0,0,.07);
  --msg-shadow-hv: 0 4px 18px rgba(0,0,0,.11);
  --mark-bg:       #fff3e0;
  --mark-bdr:      #f5c27a;
  --mark-text:     #7a3f00;
}

/* Lista */
.list { display:grid; gap:10px; }

/* Panel contenedor: transparente, sin caja */
.hero .panel {
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 16px 0;
  width: 100%;
}

/* Card base */
.card {
  border-radius: 18px;
  padding: 14px 16px 12px;
  background: var(--msg-crema);
  border: 1.5px solid var(--msg-border);
  box-shadow: var(--msg-shadow);
  transition: box-shadow .15s ease, border-color .15s ease;
  text-align: left;
}
.card:hover { box-shadow: var(--msg-shadow-hv); }

/* Card leida: desvanecida */
.card.read {
  background: var(--msg-read-bg);
  border-color: var(--msg-read-bdr);
  box-shadow: none;
}

/* Cabecera */
.card h3 {
  margin: 0 0 2px;
  font-size: 1rem;
  font-weight: 800;
  color: #111827;
  line-height: 1.25;
}
.card.read h3 { color: #6b7280; font-weight: 600; }

/* Punto naranja en no leido */
.card.unread h3::before {
  content: "";
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--msg-naranja);
  border-radius: 50%;
  margin-right: 7px;
  vertical-align: middle;
  margin-bottom: 2px;
}

/* Meta (autor, fecha) */
.meta { font-size:.8rem; color:var(--muted,#9ca3af); margin-bottom:6px; }

/* Cuerpo del mensaje */
.msg-body {
  font-size:.95rem; line-height:1.55; color:#374151;
  white-space:pre-wrap; word-break:break-word; margin:0 0 8px;
}
.card.read .msg-body { color:#9ca3af; }

/* Barra de acciones */
.action-bar {
  display:flex; align-items:center;
  justify-content:space-between; gap:.5rem; margin-bottom:6px;
}
.action-left  { display:flex; align-items:center; }
.action-right { display:flex; align-items:center; }

/* Ver mas */
[data-toggle] {
  all:unset; font-size:.85rem; font-weight:700;
  color:#374151; cursor:pointer;
  text-decoration:underline; text-underline-offset:2px;
  text-decoration-color:rgba(0,0,0,.2);
}
[data-toggle]:hover { color:var(--msg-naranja); text-decoration-color:var(--msg-naranja); }

/* Boton Leido */
[data-mark] {
  all:unset; display:inline-flex; align-items:center; gap:.3rem;
  font-size:.78rem; font-weight:700;
  padding:.25rem .65rem; border-radius:999px;
  background:var(--mark-bg); border:1px solid var(--mark-bdr);
  color:var(--mark-text); cursor:pointer;
  transition:background .12s ease;
}
[data-mark]:hover { background:#ffe0b2; }
[data-mark]:disabled { opacity:.55; cursor:default; }

/* Chips de enlaces */
.chips { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:6px; }
.chip {
  display:inline-flex; align-items:center; gap:.3rem;
  padding:.3rem .75rem; border-radius:999px;
  background:#fff; border:1.5px solid var(--msg-naranja);
  color:var(--msg-naranja); font-size:.85rem; font-weight:700;
  text-decoration:none; transition:background .1s ease;
}
.chip:hover { background:#fff3e0; }

/* Adjuntos */
.clip-btn {
  all:unset; display:inline-flex; align-items:center; gap:.35rem;
  font-size:.85rem; font-weight:700; color:#374151; cursor:pointer; margin-bottom:4px;
}
.clip-btn:hover { color:var(--msg-naranja); }
.att-count {
  background:var(--msg-crema-dk); border-radius:999px;
  padding:0 .4rem; font-size:.78rem; color:var(--mark-text);
}
.att-list { list-style:none; margin:4px 0 0; padding:0; display:none; }
.att-list li { padding:.3rem 0; border-top:1px solid rgba(0,0,0,.05); }
.att-list a { color:var(--msg-naranja); text-decoration:none; font-size:.88rem; font-weight:600; }
.att-list a:hover { text-decoration:underline; }

/* Paginador */
.pager { display:flex; align-items:center; justify-content:center; gap:5px; flex-wrap:wrap; margin:14px 0 2px; }
.pager-btn {
  all:unset; display:inline-flex; align-items:center; justify-content:center;
  min-width:2rem; height:2rem; padding:0 .5rem;
  border-radius:9px; border:1.5px solid #e5e7eb; background:#fff;
  font-size:.9rem; cursor:pointer; transition:border-color .1s ease, color .1s ease;
}
.pager-btn:hover:not(:disabled) { border-color:var(--msg-naranja); color:var(--msg-naranja); }
.pager-btn.active { font-weight:800; border-color:var(--msg-naranja); color:var(--msg-naranja); box-shadow:0 0 0 3px rgba(255,149,1,.15); }
.pager-btn:disabled { opacity:.35; cursor:default; }

/* Flash (llegada desde push) */
@keyframes flash-push {
  0%   { box-shadow:0 0 0 0   rgba(255,149,1,0);    }
  25%  { box-shadow:0 0 0 7px rgba(255,149,1,.55);   }
  70%  { box-shadow:0 0 0 4px rgba(255,149,1,.25);   }
  100% { box-shadow:var(--msg-shadow);               }
}
.card.flash { animation:flash-push 2.2s ease-out forwards; }

/* Vacio */
#empty { padding:2rem 0; font-size:.95rem; }

/* Boton Inicio */
.hero .panel .actions { margin-top:1rem; }
.hero .panel .actions .btn { max-width:240px; margin:0 auto; }

/* ── Compositor docente ───────────────────────────────── */
.doc-field { display:flex; flex-direction:column; gap:3px; margin-bottom:8px; }
.doc-input {
  width:100%; box-sizing:border-box;
  padding:.65rem .9rem; border:1.5px solid #e5e7eb; border-radius:12px;
  font:inherit; font-size:.95rem; color:#111827; background:#fff;
  transition:border-color .15s ease, box-shadow .15s ease; margin:0;
}
.doc-input:focus { outline:none; border-color:var(--msg-naranja); box-shadow:0 0 0 3px rgba(255,149,1,.12); }
.doc-textarea { min-height:110px; resize:vertical; line-height:1.55; }
.doc-counter { font-size:.72rem; color:#9ca3af; text-align:right; }
.doc-file-label {
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.88rem; font-weight:700; color:#374151; cursor:pointer;
  padding:.4rem .8rem; border:1.5px dashed #e5e7eb; border-radius:10px;
  transition:border-color .12s ease;
}
.doc-file-label:hover { border-color:var(--msg-naranja); color:var(--msg-naranja); }
.doc-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.doc-chip {
  all:unset; padding:.3rem .75rem; border-radius:999px;
  border:1.5px solid #e5e7eb; background:#fff;
  font-size:.82rem; font-weight:600; color:#374151; cursor:pointer;
  transition:border-color .12s, background .12s, color .12s;
}
.doc-chip.active { border-color:var(--msg-naranja); background:#fff8ee; color:#7a3f00; font-weight:800; }
.doc-selector { margin-bottom:8px; }
.doc-checklist { max-height:160px; overflow-y:auto; display:grid; gap:2px; padding:4px 0; }
.doc-check-item {
  display:flex; align-items:center; gap:8px; padding:5px 8px;
  border-radius:8px; font-size:.88rem; cursor:pointer; transition:background .1s;
}
.doc-check-item:hover { background:#fff8ee; }
.doc-cb-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  flex: 0 0 auto;
}
.doc-cb-wrap input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 20px; height: 20px;
  margin: 0; padding: 0;
  cursor: pointer;
  z-index: 1;
}
.doc-cb-box {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid #9ca3af;
  border-radius: 6px;
  background: #fff;
  transition: border-color .12s ease, background .12s ease;
  position: relative;
  flex: 0 0 20px;
}
.doc-cb-wrap input[type="checkbox"]:checked + .doc-cb-box {
  background: #FF9501;
  border-color: #FF9501;
}
.doc-cb-wrap input[type="checkbox"]:checked + .doc-cb-box::after {
  content: "";
  position: absolute;
  left: 5px; top: 2px;
  width: 6px; height: 11px;
  border: 2.5px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(45deg);
}
.doc-sublabel { font-size:.78rem; font-weight:700; color:#9ca3af; margin:4px 0; }
.doc-aviso { padding:.5rem .8rem; border-radius:10px; font-size:.85rem; font-weight:700; margin-top:6px; }
.doc-aviso.ok  { background:#e9f7ef; color:#186a3b; border:1px solid #c8e6d1; }
.doc-aviso.err { background:#fdecea; color:#b71c1c; border:1px solid #f5c6cb; }
.btn-main {
  background:var(--msg-naranja,#FF9501); color:#fff; border:none;
  border-radius:10px; padding:.6rem 1.4rem;
  font-weight:800; font-size:.95rem; cursor:pointer;
  transition:filter .12s ease, transform .1s ease;
}
.btn-main:hover  { filter:brightness(1.07); }
.btn-main:active { transform:translateY(1px); }
.files-preview { list-style:none; padding:0; margin:6px 0 0; display:flex; flex-wrap:wrap; gap:6px; }
.file-chip {
  display:inline-flex; align-items:center; gap:.35rem;
  background:#fff8ee; border:1px solid #f5c27a; border-radius:999px;
  padding:.28rem .7rem; font-size:.82rem; color:#7a3f00;
}
.file-chip .rm { all:unset; cursor:pointer; color:#9ca3af; font-size:1rem; line-height:1; }
.file-chip .rm:hover { color:#e11d48; }
.sent-badge {
  display:inline-flex; align-items:center; gap:.3rem;
  font-size:.72rem; font-weight:700; padding:.2rem .5rem;
  border-radius:999px; background:#e9f7ef; border:1px solid #c8e6d1; color:#186a3b;
}
</style>

</head>
<body data-page="mensajes" class="orange-cards">
  <div class="container">
    <!-- Topbar unificada: pill + logout a la derecha -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- HERO con pentagrama que ENVUELVE el contenido -->
    <div class="hero" aria-label="Avisos y notificaciones">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p id="hero-sub">Avisos y notificaciones.</p>

      <!-- ── VISTA ALUMNO ─────────────────────────────────── -->
      <div id="vista-alumno" class="panel" style="display:none;">
        <div id="empty" class="muted" style="display:none;">No tienes mensajes aún.</div>
        <div id="list" class="list"></div>
        <div id="pager" class="pager"></div>
        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-primary" onclick="location.href='/josgentumano/portal_maestro.html'">&larr; Inicio</button>
        </div>
      </div>

      <!-- ── VISTA DOCENTE / ADMIN ────────────────────────── -->
      <div id="vista-docente" style="display:none;">

        <!-- Compositor -->
        <div class="panel" style="margin-bottom:12px;">
          <p class="section-title" style="margin:0 0 10px;">Nuevo mensaje</p>

          <!-- Título -->
          <div class="doc-field">
            <input id="d-titulo" type="text" maxlength="120" placeholder="Título del mensaje" class="doc-input" />
            <span class="doc-counter" id="d-c-titulo">0/120</span>
          </div>

          <!-- Cuerpo -->
          <div class="doc-field">
            <textarea id="d-cuerpo" maxlength="2000" rows="4" placeholder="Escribe el mensaje…" class="doc-input doc-textarea"></textarea>
            <span class="doc-counter" id="d-c-cuerpo">0/2000</span>
          </div>

          <!-- URL opcional -->
          <div class="doc-field">
            <input id="d-url" type="url" placeholder="Enlace opcional (https://…)" class="doc-input" />
          </div>

          <!-- Adjuntos -->
          <div class="doc-field">
            <label class="doc-file-label" for="d-files">📎 Adjuntar archivos</label>
            <input id="d-files" type="file" multiple
              accept=".pdf,.png,.jpg,.jpeg,.webp,.gif,.zip,.doc,.docx,.xls,.xlsx"
              style="width:100%;margin-top:4px;font-size:.85rem;" />
            <ul id="d-files-preview" class="files-preview"></ul>
          </div>

          <!-- Destinatarios -->
          <p class="section-title" style="margin:10px 0 6px;">Destinatarios</p>
          <div class="doc-chips" id="d-modo-chips">
            <button class="doc-chip active" data-modo="todos">Todos</button>
            <button class="doc-chip" data-modo="grupos">Grupos</button>
            <button class="doc-chip" data-modo="instrumentos">Instrumentos</button>
            <button class="doc-chip" data-modo="grupo_instrumento">Grupo+Instrumento</button>
          </div>

          <!-- Selector de grupos -->
          <div id="d-sel-grupos" class="doc-selector" style="display:none;">
            <input id="d-busca-grupo" type="search" placeholder="Buscar grupo…" class="doc-input" style="margin-bottom:6px;" />
            <div id="d-lista-grupos" class="doc-checklist"></div>
          </div>

          <!-- Selector de instrumentos -->
          <div id="d-sel-instrumentos" class="doc-selector" style="display:none;">
            <input id="d-busca-inst" type="search" placeholder="Buscar instrumento…" class="doc-input" style="margin-bottom:6px;" />
            <div id="d-lista-inst" class="doc-checklist"></div>
          </div>

          <!-- Selector combinado grupo+instrumento -->
          <div id="d-sel-combo" class="doc-selector" style="display:none;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <div style="flex:1;min-width:120px;">
                <p class="doc-sublabel">Grupo</p>
                <div id="d-combo-grupos" class="doc-checklist"></div>
              </div>
              <div style="flex:1;min-width:120px;">
                <p class="doc-sublabel">Instrumento</p>
                <div id="d-combo-inst" class="doc-checklist"></div>
              </div>
            </div>
          </div>

          <div id="d-aviso" class="doc-aviso" style="display:none;"></div>

          <div class="actions" style="margin-top:10px;">
            <button id="d-btn-enviar" class="btn-main">Enviar</button>
            <button id="d-btn-limpiar" class="btn-main-blanco" style="opacity:.7;">Limpiar</button>
          </div>
        </div>

        <!-- Historial enviados -->
        <div class="panel">
          <p class="section-title" style="margin:0 0 10px;">Mensajes enviados</p>
          <div id="d-empty" class="muted" style="display:none;">No hay mensajes enviados aún.</div>
          <div id="d-list" class="list"></div>
          <div id="d-pager" class="pager"></div>
        </div>

        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-primary" onclick="location.href='/josgentumano/index.html'">&larr; Inicio</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Pill + botón -->
  <script>
    (function(){
      function mostrarPill(){
        const pill = document.getElementById('user-pill');
        if(!pill) return;
        const nombre = (localStorage.getItem('alumno_nombre') || localStorage.getItem('usuario_nombre') || '').trim();
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre[0] || 'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
        const btn = document.getElementById('btn-logout');
        if (btn && localStorage.getItem('token')) btn.style.display = 'flex';
      }
      document.addEventListener('DOMContentLoaded', mostrarPill);
      window.addEventListener('pageshow', mostrarPill);
    })();
  </script>

  <!-- Logout universal (activo en esta página) -->
  <script>
    (function () {
      const btn = document.getElementById('btn-logout');
      const rol = (localStorage.getItem('rol') || '').toLowerCase();
      const esDoc = rol === 'docente' || rol === 'admin';

      function doLogout(){
        // Sesión Express (docentes)
        if (esDoc) {
          fetch('/josgmaestro/logout', { method:'POST', credentials:'include' })
            .finally(()=>{ localStorage.clear(); location.href = '/josgentumano/login.html'; });
        } else {
          try { localStorage.removeItem('token'); localStorage.removeItem('alumno_id'); localStorage.removeItem('alumno_nombre'); } catch(e){}
          location.href = '/josgentumano/login.html';
        }
      }
      if (btn){
        btn.addEventListener('click', doLogout);
        btn.style.display = localStorage.getItem('token') ? 'flex' : 'none';
      }
    })();
  </script>

  <!-- Lógica de mensajes (lista, pager, marcar leído) -->
  <script>
  (function(){
    const alumno_id = localStorage.getItem('alumno_id');
    const rol = (localStorage.getItem('rol') || '').toLowerCase();
    const esDoc = rol === 'docente' || rol === 'admin';

    // Docentes/admin: este script no aplica — el suyo se encarga
    if (esDoc) return;

    // Alumno sin sesión → login
    if (!alumno_id) { location.href = 'index.html'; return; }

    // Mostrar la vista de alumno (empieza con display:none)
    const vistaAlumno = document.getElementById('vista-alumno');
    if (vistaAlumno) vistaAlumno.style.display = 'block';

    const $list  = document.getElementById('list');
    const $empty = document.getElementById('empty');
    const $pager = document.getElementById('pager');

    const PAGE_SIZE = 5;
    const MAX_CHARS = 320;  // umbral “Ver más”
    let DATA = [];
    let currentPage = 1;
    let totalPages  = 1;

    const LS_KEY = `mensajes_leidos_${alumno_id}`;
    const getReadSet = () => new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));
    const saveReadSet = (set) => localStorage.setItem(LS_KEY, JSON.stringify([...set]));
    const isRead = (m, readSet) => (
      !!(m.leido_at ||m.leido || m.leído || m.read || m.read_at || m.fecha_leido || m.f_leido || m.visto || m.visto_el)
      || readSet.has(String(m.id))
    );

    const esc = s => String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");

    const safeHref = (u)=>{
      if (!u) return '';
      const s = String(u).trim();
      if (/^[a-zA-Z][\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
      return 'https://' + s;
    };
    function normalizePublicURL(u){
      const s = safeHref(u || '');
      // Los adjuntos en /mensajes/ se sirven directamente desde express.static
      // sin ningún prefijo de montaje — devolver tal cual
      return s;
    }
    function isAttachmentUrl(raw){
      const s = String(raw||'');
      if (/^https?:\/\//i.test(s)) return false;
      return s.startsWith('/mensajes/');
    }
    function domainLabel(href){
      try{ const u = new URL(href, location.origin);
          return u.hostname.replace(/^www\./,''); }
      catch{ return 'Enlace'; }
    }

    function fmtFecha(iso){
      if (!iso) return '';
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2,'0');
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const aa = String(d.getFullYear()).slice(-2);
      const hh = String(d.getHours()).padStart(2,'0');
      const mi = String(d.getMinutes()).padStart(2,'0');
      return `${dd}/${mm}/${aa} ${hh}:${mi}`;
    }
    function getAutor(m){
      const cand = [
        m.autor, m.autor_nombre, m.docente, m.profesor,
        m.creado_por_nombre, m.creado_por, m.usuario, m.user_name
      ];
      for (const v of cand){ if (v) return String(v); }
      return '';
    }
    // Une en un único array los enlaces (strings u objetos) y los adjuntos {filename, original_name...}
  function collectLinksAndFiles(m){
  const arr = [];

  // 1) urls/enlaces/links como strings u objetos {url|href|link}
  const rawUrls =
    (Array.isArray(m.urls)    ? m.urls    :
     Array.isArray(m.links)   ? m.links   :
     Array.isArray(m.enlaces) ? m.enlaces : []);
  for (const u of rawUrls){
    const href = typeof u === 'string' ? u : (u?.url ?? u?.href ?? u?.link ?? '');
    if (!href) continue;
    const safe = safeHref(href);
    const label = decodeURIComponent(String(href).split('/').pop() || href).replace(/\?.*$/,'');
    arr.push({ href: safe, label });
  }

  // 2) adjuntos de BD (mensaje_adjuntos): filename suele venir como "/mensajes/xxxx.ext"
  if (Array.isArray(m.adjuntos)){
    for (const a of m.adjuntos){
      const href = a?.filename || a?.url || a?.href || '';
      if (!href) continue;
      const safe = safeHref(href);
      const label = a?.original_name ||
                    decodeURIComponent(String(href).split('/').pop() || 'archivo').replace(/\?.*$/,'');
      arr.push({ href: safe, label });
    }
  }

  return arr;
}

function domainLabel(href){
  try { return new URL(href, location.origin).hostname.replace(/^www\./,''); }
  catch { return 'Enlace'; }
}
// ¿Tiene pinta de URL http(s), protocolo relativo, ruta absoluta o dominio.tld?
function isLikelyHttpUrl(u){
  if (typeof u !== 'string') return false;
  const s = u.trim();
  if (!s) return false;
  if (/^(https?:)?\/\//i.test(s)) return true; // http(s) o //host
  if (s.startsWith('/')) return true;          // ruta absoluta (adjunto público, etc.)
  if (/^[\w.-]+\.[a-z]{2,}(?::\d+)?(?:\/|$)/i.test(s)) return true; // dominio.tld[/...]
  return false;
}

function cardHTML(m, readSet){
  // --- Helpers locales (no dependen de otras funciones externas) ---
  const _esc = s => String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  const ensureProto = u => (String(u||'').startsWith('/') || /^\w+:\/\//.test(u||'')) ? String(u) : 'https://' + String(u);
  const safeHref = u => {
  if (typeof u !== 'string') return '';
  const s = u.trim();
  if (!s) return '';
  return s.startsWith('/') || /^\w+:\/\//.test(s) ? s : ensureProto(s);
};
  const domainLabel = href => { try { return new URL(ensureProto(href), location.origin).host.replace(/^www\./,''); } catch { return href; } };
  const fmtDate = v => { const d = new Date(v || m.created_at || m.fecha || m.sent_at || ''); return isNaN(d) ? '' : d.toLocaleString(); };
  const isRead = (mm, rs) =>
  !!(mm.leido_at || mm.leido || mm.read || (rs?.has && rs.has(String(mm.id))) || (rs && rs[String(mm.id)]));
  const MAX = (typeof MAX_CHARS === 'number' ? MAX_CHARS : 240);

  // --- Datos base ---
  const idStr  = String(m.id ?? '');
  const titulo = _esc(m.titulo || m.title || 'Aviso');
  const cuerpo = String(m.cuerpo || m.mensaje || m.body || '').trim();
  const when   = fmtDate(m.created_at);
  const read   = isRead(m, readSet);

  // Autor (probamos varias props comunes)
  const autor = [m.autor, m.autor_nombre, m.docente, m.profesor, m.creado_por_nombre, m.creado_por, m.usuario, m.user_name]
                .find(Boolean) || '';

  const truncated = cuerpo.length > MAX;
  const shortHTML = _esc(cuerpo.slice(0, MAX)) + (truncated ? '…' : '');
  const fullHTML  = _esc(cuerpo);

  const metaParts = [];
  if (autor) metaParts.push('Por ' + _esc(autor));
  if (when)  metaParts.push(when);
  const meta = metaParts.join(' · ');

  // --- Recogida de enlaces y adjuntos ---
  const urlsRaw =
    (Array.isArray(m.urls)    ? m.urls :
     Array.isArray(m.links)   ? m.links :
     Array.isArray(m.enlaces) ? m.enlaces :
     (m.links ? [m.links] : (m.urls ? [m.urls] : [])));

  const adjuntosRaw = Array.isArray(m.adjuntos) ? m.adjuntos : [];

  const attachments = []; // {href,label}
  const links = [];       // {href,label,title}
  let primaryHref = '';   // para chip "Abrir"

  // Los adjuntos se guardan en public/mensajes/ y express.static los sirve
  // directamente como /mensajes/archivo — sin prefijo /josgentumano ni similar.
  const isAttachmentPath = p => {
    const s = String(p||'');
    return s.startsWith('/mensajes/');
  };

  // Enlace principal por campo directo
  const rawPrimary = [m.url, m.enlace, m.link].find(v => isLikelyHttpUrl(v)) || '';
if (rawPrimary && !isAttachmentPath(rawPrimary)) {
  primaryHref = safeHref(rawPrimary);
}

  // Enlaces (urls[])
  for (const u of urlsRaw){
    const raw = typeof u === 'string' ? u : (u?.url ?? u?.href ?? u?.link ?? '');
    if (!raw) continue;
    if (isAttachmentPath(raw)){
      const href  = safeHref(raw);
      const label = decodeURIComponent(String(raw).split('/').pop() || 'archivo').replace(/\?.*$/,'');
      attachments.push({ href, label });
      continue;
    } else if (isLikelyHttpUrl(raw)) {
  const href = safeHref(raw);
  if (!href || href === primaryHref) continue;
  links.push({ href, label: domainLabel(href), title: raw });
} else {
  // ni adjunto ni url válida → se ignora
  continue;
}
  }

  // Adjuntos propiamente dichos
  for (const a of adjuntosRaw){
    const raw = a?.filename || a?.url || a?.href || '';
    if (!raw) continue;
    const href  = safeHref(raw);
    const label = a?.original_name ||
                  decodeURIComponent(String(raw).split('/').pop() || 'archivo').replace(/\?.*$/,'');
    attachments.push({ href, label });
  }

  // --- Chips: principal "Abrir" + secundarios ---
  const chipsHTML = (primaryHref || links.length) ? `
    <div class="chips">
      ${primaryHref ? `<a class="chip" href="${primaryHref}" target="_blank" rel="noopener">Abrir enlace</a>` : ``}
      ${links.map(l =>
        `<a class="chip" href="${l.href}" target="_blank" rel="noopener" title="${_esc(l.title)}">${_esc(l.label)} ↗</a>`
      ).join('')}
    </div>
  ` : '';

  // --- Bloque del clip (solo adjuntos) ---
  const clipHTML = attachments.length ? `
    <div class="mark-wrap">
      <button class="clip-btn" data-clip="${idStr}">📎 <span class="att-count">${attachments.length}</span> adjunto${attachments.length>1?'s':''}</button>
    </div>
    <ul class="att-list" id="att-${idStr}">
      ${attachments.map(it => `<li><a href="${it.href}" target="_blank" rel="noopener">${_esc(it.label)}</a></li>`).join('')}
    </ul>
  ` : '';

  // --- Acciones: izda “Ver más…”, dcha “Marcar como leído” ---
  const actionsHTML = `
    <div class="mark-wrap action-bar">
      <div class="action-left">
        ${truncated ? `<a href="#" data-toggle="${idStr}">Ver más…</a>` : ``}
      </div>
      <div class="action-right">
        ${!read ? `<button type="button" data-mark="${idStr}" aria-label="Marcar como leído">Leído</button>` : ``}

      </div>
    </div>
  `;

  // --- Plantilla final ---
  return `
    <article class="card ${read ? 'read' : 'unread'}" data-id="${idStr}">
      <h3>${titulo}</h3>
      <div class="meta">${meta}</div>
      <div class="msg-body" data-expanded="false"
           data-short="${shortHTML}" data-full="${fullHTML}">${shortHTML}</div>
      ${actionsHTML}
      ${chipsHTML}
      ${clipHTML}
    </article>
  `;
}


  function renderPager(){

        const b = document.createElement('button');

      const win = 1;
      let start = Math.max(1, currentPage - win);
      let end   = Math.min(totalPages, currentPage + win);

      if (start > 1){
        addBtn('1', 1, { active: currentPage === 1 });
        if (start > 2) addEllipsis();
      }
      for (let p = start; p <= end; p++) addBtn(String(p), p, { active: p === currentPage });
      if (end < totalPages){
        if (end < totalPages - 1) addEllipsis();
        addBtn(String(totalPages), totalPages, { active: currentPage === totalPages });
      }

      addBtn('›', Math.min(totalPages, currentPage + 1), { disabled: currentPage === totalPages });
    }

    function renderPage(page=1){

      currentPage = Math.min(Math.max(1,page), totalPages);

      $empty.style.display = 'none';
      const start = (currentPage-1)*PAGE_SIZE;
      const slice = DATA.slice(start, start+PAGE_SIZE);
      $list.innerHTML = slice.map(m => cardHTML(m, READ)).join('');

    }

    let _cargando = false;
    let _lastOk   = 0;

    async function cargar(forzar = false){
      if (!forzar && _cargando) return;
      if (!forzar && Date.now() - _lastOk < 8000) return;
      if (_cargando) return;
      _cargando = true;

      const token = localStorage.getItem('token');
      const url = `/mensajes/app/mensajes?_ts=${Date.now()}`;

      try{
        const r = await fetch(url, {
          headers: token ? { 'Authorization': 'Bearer ' + token } : {}
        });

        let body = ''; try { body = await r.text(); } catch(_){}
        let j;    try { j = JSON.parse(body); }       catch(_){ j = null; }

        if (!r.ok) throw new Error(`HTTP ${r.status} — ${body.slice(0,120)}`);
        if (!Array.isArray(j)) throw new Error('Respuesta no es array: ' + typeof j);

        DATA = j.slice().sort((a,b)=> Number(b.id||0) - Number(a.id||0));
        totalPages = Math.max(1, Math.ceil(DATA.length / PAGE_SIZE));
        _lastOk = Date.now();
        renderPage(currentPage > totalPages ? 1 : currentPage);

      } catch(e){
        console.warn('[mensajes] Error cargando:', e.message);
        if (DATA.length === 0){
          $list.innerHTML = '';
          $pager.innerHTML = '';
          $empty.textContent = 'No se pudieron cargar los mensajes.';
          $empty.style.display = 'block';
        }
      } finally {
        _cargando = false;
      }
    }

          b.className = 'pager-btn' + (i===pg?' active':'');
          b.textContent = i; b.dataset.p = i;
          b.addEventListener('click', ()=>renderEnviados(Number(b.dataset.p)));
          $pg.appendChild(b);
        }
      }
    }

    function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    // Arranque
    document.addEventListener('DOMContentLoaded', ()=>{ cargarMetadata(); cargarEnviados(); });
  })();
  </script>

  <!-- Motivos musicales (símbolos compatibles + tamaño reducido) -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 30, SIZE_MAX = 40;
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p','.panel .actions'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD || rr.y<EDGE_PAD || rr.x+rr.w>hero.clientWidth-EDGE_PAD || rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', (ev) => {
    const { tipo, mensaje_id, url } = ev.data || {};
    if (tipo !== 'abrir-mensaje') return;
    if (url) { window.open(url, '_blank', 'noopener') || (location.href = url); return; }
    const card = document.querySelector(`.card[data-id="${mensaje_id}"]`);
    if (card) {
      card.classList.add('flash');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => card.classList.remove('flash'), 2000);
    }
  });
}
</script>
