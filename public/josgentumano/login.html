<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Iniciar sesión</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
</head>
<body>
  <div class="container">
    <div class="hero" aria-label="Bienvenida">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Inicia sesión para continuar.</p>

      <div class="panel" role="region" aria-labelledby="tit-login">
        <div class="field">
          <input type="email" id="email" placeholder="Email" required autocomplete="username" />
        </div>
        <div class="field">
          <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password" />
        </div>

        <div class="actions">
          <button id="btn-login" class="btn btn-primary">Entrar</button>
          <button class="btn btn-secondary" onclick="location.href='registro.html'">Crear cuenta</button>
        </div>

        <p id="mensaje" class="notice" role="status" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <!-- Login unificado -->
  <script>
    (function(){
      const emailEl = document.getElementById('email');
      const passEl  = document.getElementById('password');
      const btn     = document.getElementById('btn-login');
      const msg     = document.getElementById('mensaje');

      const show = (t, ok)=>{ 
        msg.textContent = t||''; 
        msg.className = 'notice ' + (ok ? 'ok':'err'); 
      };

      // alumno en la MISMA carpeta que este login
      const toAlumno = ()=> {
        const base = location.pathname.replace(/[^\/]+$/, '');
        return base + 'index.html';
      };
      // portal Docencia/Admin (ruta ABSOLUTA correcta)
      const toDocente = ()=> '/josgmaestro/portal_maestro.html';

      // puente de sesión para Docencia/Admin: crea req.session en /josgmaestro
      async function ensureMaestroSession(email, password){
        try{
          const r = await fetch('/josgmaestro/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password })
          });
          // si responde 200 con success:true ya hay sesión; ignoramos el body
          return r.ok;
        }catch(_){ return false; }
      }

      async function doLogin(){
        const email = (emailEl.value || '').trim();
        const password = passEl.value || '';
        if (!email || !password){ show('Completa email y contraseña.', false); return; }

        btn.disabled = true; show('', true);
        try{
          const res = await fetch('/auth/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password })
          });
          let data = {}; try{ data = await res.json(); }catch(_){}

          if (!res.ok || !data.success){
            show(data.error || 'Credenciales incorrectas', false);
            passEl.value = ''; passEl.focus();
            return;
          }

          // --- Caso 1: backend ya decidió rol
          if (data.role) {
            localStorage.setItem('token', data.token);
            if (data.role === 'alumno') {
              localStorage.setItem('rol', 'alumno');
              if (data.usuario?.alumno_id)     localStorage.setItem('alumno_id', data.usuario.alumno_id);
              if (data.usuario?.alumno_nombre) localStorage.setItem('alumno_nombre', data.usuario.alumno_nombre);
              window.location.href = toAlumno();
            } else {
              localStorage.setItem('rol', 'docente');
              if (data.usuario?.usuario_id)     localStorage.setItem('usuario_id', data.usuario.usuario_id);
              if (data.usuario?.usuario_nombre) localStorage.setItem('usuario_nombre', data.usuario.usuario_nombre);

              // *** puente de sesión maestro ***
              const ok = await ensureMaestroSession(email, password);
              if (!ok){ show('No se pudo abrir sesión de Docencia. Inténtalo de nuevo.', false); btn.disabled = false; return; }

              window.location.href = toDocente();
            }
            return;
          }

          // --- Caso 2: multirol → pedir elección
          const picked = (window.prompt('Tienes dos roles. Escribe "alumno" o "docente":', 'alumno') || '').toLowerCase().trim();
          if (!picked) { btn.disabled = false; return; }
          if (picked !== 'alumno' && picked !== 'docente'){
            show('Opción inválida. Escribe "alumno" o "docente".', false);
            btn.disabled = false; return;
          }

          const sw = await fetch('/auth/switch-role', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ role: picked, email })
          });
          let d = {}; try{ d = await sw.json(); }catch(_){}
          if (!sw.ok || !d.success){
            show(d.error || 'No se pudo activar el rol seleccionado.', false);
            btn.disabled = false; return;
          }

          localStorage.setItem('token', d.token);
          if (picked === 'alumno') {
            localStorage.setItem('rol','alumno');
            if (d.usuario?.alumno_id)     localStorage.setItem('alumno_id', d.usuario.alumno_id);
            if (d.usuario?.alumno_nombre) localStorage.setItem('alumno_nombre', d.usuario.alumno_nombre);
            window.location.href = toAlumno();
          } else {
            localStorage.setItem('rol','docente');
            if (d.usuario?.usuario_id)     localStorage.setItem('usuario_id', d.usuario.usuario_id);
            if (d.usuario?.usuario_nombre) localStorage.setItem('usuario_nombre', d.usuario.usuario_nombre);

            // *** puente de sesión maestro ***
            const ok = await ensureMaestroSession(email, password);
            if (!ok){ show('No se pudo abrir sesión de Docencia. Inténtalo de nuevo.', false); btn.disabled = false; return; }

            window.location.href = toDocente();
          }

        }catch(e){
          show('No se pudo conectar con el servidor. Inténtalo de nuevo.', false);
        }finally{
          btn.disabled = false;
        }
      }

      btn.addEventListener('click', doLogin);
      document.addEventListener('keydown', (e)=>{ if (e.key === 'Enter') doLogin(); });
    })();
  </script>

  <!-- Motivos musicales aleatorios sin solaparse -->
  <script>
  (function(){
    const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
    const COUNT_MIN = 7, COUNT_MAX = 10;
    const SIZE_MIN = 36, SIZE_MAX = 50;
    const ROT_MIN  = -16, ROT_MAX  = 16;
    const PADDING  = 10;
    const EDGE_PAD = 6;
    const MAX_TRIES_PER_NOTE = 80;

    const randInt = (a,b)=> Math.floor(Math.random()*(b-a+1))+a;
    const pick = (arr)=> arr[Math.floor(Math.random()*arr.length)];

    const getRectRelative = (el, parent)=>{
      const r = el.getBoundingClientRect(), p = parent.getBoundingClientRect();
      return { x:r.left-p.left, y:r.top-p.top, w:r.width, h:r.height };
    };
    const intersects = (a,b,p)=> !(a.x+a.w+p<=b.x || b.x+b.w+p<=a.x || a.y+a.h+p<=b.y || b.y+b.h<=a.y);

    function place(){
      const hero = document.querySelector('.hero');
      const layer = document.querySelector('.motifs-layer');
      if (!hero || !layer) return;
      layer.innerHTML = '';
      const heroRect = hero.getBoundingClientRect();

      const avoid = [];
      ['.hero-logo','h1','p'].forEach(sel=>{
        const el = hero.querySelector(sel); if (!el) return;
        const r = getRectRelative(el, hero);
        avoid.push({ x:r.x-10, y:r.y-10, w:r.w+20, h:r.h+20 });
      });

      const count = randInt(COUNT_MIN, COUNT_MAX);
      const placed = [];

      for (let i=0;i<count;i++){
        const s = document.createElement('span');
        s.className = 'motif';
        s.textContent = pick(SYMBOLS);
        s.style.opacity = '0';
        layer.appendChild(s);

        let ok=false;
        for (let t=0;t<MAX_TRIES_PER_NOTE;t++){
          const size = randInt(SIZE_MIN, SIZE_MAX);
          const rot = randInt(ROT_MIN, ROT_MAX);
          s.style.fontSize = size+'px';
          s.style.transform = `rotate(${rot}deg)`;
          const left = randInt(EDGE_PAD, Math.max(EDGE_PAD, heroRect.width - size - EDGE_PAD));
          const top  = randInt(EDGE_PAD, Math.max(EDGE_PAD, heroRect.height - size - EDGE_PAD));
          s.style.left = left+'px'; s.style.top = top+'px';

          const r = getRectRelative(s, hero);
          if (r.x<EDGE_PAD || r.y<EDGE_PAD || r.x+r.w>heroRect.width-EDGE_PAD || r.y+r.h>heroRect.height-EDGE_PAD) continue;
          if (avoid.some(av=>intersects(r,av,PADDING))) continue;
          if (placed.some(pr=>intersects(r,pr,PADDING))) continue;

          placed.push(r); s.style.opacity = ''; ok = true; break;
        }
        if (!ok) layer.removeChild(s);
      }
    }

    window.addEventListener('load', place);
    window.addEventListener('pageshow', (e)=>{ if (e.persisted) setTimeout(place,0); });
    let tm=null; window.addEventListener('resize', ()=>{ clearTimeout(tm); tm=setTimeout(place,120); });
  })();
  </script>
</body>
</html>
