<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Josg en tu mano -</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" /></head>
<body>
  <div class="container">
    <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG">
    <h2>Iniciar Sesión</h2>
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Contraseña" required />
    <button onclick="login()">Entrar</button>
    <p id="mensaje"></p>
    <button onclick="location.href='index.html'">← Volver</button>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/firmas/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem('alumno_id', data.alumno_id);
        window.location.href = 'index.html';
      } else {
        document.getElementById('mensaje').innerText = data.error || 'Credenciales incorrectas';
      }
    }
  </script>
</body>
</html>
