<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! - Agenda</title>

  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <!-- FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

  <style>
    /* Específico mínimo */
    .calendar-container{ min-height:60vh; }
  </style>
</head>
<body data-page="agenda" class="page-agenda">
  <div class="container">
    <!-- Topbar unificada -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- Hero musical que ENVUELVE la agenda -->
    <div class="hero" aria-label="Cabecera agenda">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Agenda</p>

      <div class="panel">
        <h2 style="margin:.2rem 0 .6rem;">Agenda</h2>
        <div id="calendar" class="calendar-container"></div>

        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-primary" onclick="location.href='index.html'">&larr; Inicio</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    /* Logout universal: muestra el botón si hay token y limpia sesión al pulsar */
    (function () {
      const btn = document.getElementById('btn-logout');
    
      function doLogout() {
        try {
          localStorage.removeItem('token');
          localStorage.removeItem('alumno_id');
          localStorage.removeItem('alumno_nombre');
        } catch(e) {}
        // Redirige al inicio de sesión (ajusta si prefieres ir a index)
        location.href = 'login.html';
      }
    
      if (btn) {
        btn.addEventListener('click', doLogout);
        // mostrar/ocultar según haya sesión
        if (localStorage.getItem('token')) {
          btn.style.display = 'flex';
        } else {
          btn.style.display = 'none';
        }
      }
    })();
    </script>
    
  <!-- Pill + botón -->
  <script>
    (function(){
      function mostrarPill(){
        const pill = document.getElementById('user-pill');
        if(!pill) return;
        const nombre = (localStorage.getItem('alumno_nombre') || '').trim();
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre[0] || 'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
        const btn = document.getElementById('btn-logout');
        if (btn && localStorage.getItem('token')) btn.style.display = 'flex';
      }
      document.addEventListener('DOMContentLoaded', mostrarPill);
      window.addEventListener('pageshow', mostrarPill);
    })();
  </script>

  <!-- FullCalendar -->
  <script>
    const alumno_id = localStorage.getItem('alumno_id');
    if (!alumno_id) location.href = 'index.html';

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'es',
        firstDay: 1,
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
        buttonText: { today: 'Hoy', month: 'Mes', list: 'Lista' },
        displayEventTime: false,
        events: async (info, success, failure) => {
          try {
            const token = localStorage.getItem('token');
            const r = await fetch(`/firmas/api/alumno/${alumno_id}/eventos`, {
              headers: token ? { 'Authorization': 'Bearer ' + token } : {}
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const data = await r.json();
            success(data);
          } catch (e) { failure(e); }
        },
        eventClick: function (info) {
          const id = info.event.id;
          location.href = `evento_alumno.html?id=${id}`;
        }
      });
      calendar.render();
    });
  </script>

  <!-- Motivos musicales -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 36, SIZE_MAX = 80;
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
