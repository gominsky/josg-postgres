<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Josg en tu mano - Agenda</title>

  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <!-- CSS de FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" />
  <!-- JS de FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

  <style>
    .calendar-container{ min-height:60vh; }
  </style>
</head>
<style>
  /* Cabecera más compacta y botones pequeños */
  .fc .fc-toolbar { flex-wrap: wrap; gap: 6px; }
  .fc .fc-toolbar-title { font-size: 1rem; line-height: 1.2; }

  .fc .fc-button {
    padding: .28rem .55rem;      /* reduce tamaño general de botones */
    font-size: .9rem;
    border-radius: 8px;
  }
  .fc .fc-today-button {
    padding: .24rem .5rem;       /* aún más compacto para "Hoy" */
    font-size: .85rem;
  }

  .fc .fc-button-group > .fc-button { padding: .24rem .5rem; }
  .fc .fc-header-toolbar { margin-bottom: 8px; }
  .btn{
  display:inline-block; padding:.6rem 1.4rem; border-radius:12px;
  font-weight:600; color:#fff; border:none; cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
  transition:transform .12s ease, box-shadow .12s ease;
  text-decoration:none; text-align:center; min-width:110px;
}
.btn:hover{ transform:translateY(-1px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
.btn:active{ transform:translateY(0); box-shadow:0 2px 8px rgba(0,0,0,.1); }

  .btn-accent{
  background: linear-gradient(180deg,#f28d63,#ea6b38);
  border:1px solid #cc5c2f;
}
</style>

<body>
  <div class="container">
    <div class="topbar" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="brand" style="display:flex;align-items:center;gap:10px;">
        <img src="../imagenes/logoJOSG.png" alt="JOSG" style="max-height:44px;">
        <div id="user-name" class="muted" style="font-weight:600;"></div>
      </div>
    </div>
    
    <h2>Agenda</h2>
    <div id="calendar" class="calendar-container"></div>
    <div style="margin-top:1rem;">
      <button class="btn btn-accent" onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <script>
    const alumno_id = localStorage.getItem('alumno_id');
    if (!alumno_id) location.href = 'index.html';

    document.addEventListener('DOMContentLoaded', function () {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'es',
        firstDay: 1,                 // 👈 Semana empieza en lunes
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listMonth'
        },
        buttonText: { today: 'Hoy', month: 'Mes', list: 'Lista' },
        displayEventTime: false,
        events: async (info, success, failure) => {
          try {
            const token = localStorage.getItem('token');
            const r = await fetch(`/firmas/api/alumno/${alumno_id}/eventos`, {
              headers: token ? { 'Authorization': 'Bearer ' + token } : {}
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const data = await r.json();
            success(data);
          } catch (e) { failure(e); }
        },
        eventClick: function (info) {
          const id = info.event.id;
          location.href = `evento_alumno.html?id=${id}`;
        }
      });
      calendar.render();
    });
  </script>
  <script src="app_alumno.js"></script>
</body>
</html>
