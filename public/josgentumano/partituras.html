<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>┬κJOSG en tu mano! ┬╖ Partituras</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    /* έΦΑέΦΑ Buscador έΦΑέΦΑ */
    .search {
      display: flex; gap: .6rem; margin: 6px 0 14px;
    }
    .input {
      flex: 1; padding: .7rem .9rem;
      border: 1px solid #e5e7eb; border-radius: 12px;
      outline: 0; background: #fff; color: #111827; font-size: 1rem;
      transition: border-color .12s, box-shadow .12s;
    }
    .input:focus { border-color: #f59e0b; box-shadow: 0 0 0 4px rgba(245,158,11,.15); }

    /* έΦΑέΦΑ Lista de partituras έΦΑέΦΑ */
    .partitura-list {
      display: flex; flex-direction: column; gap: 0;
    }
    .partitura-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .5rem;
      border-bottom: 1px solid rgba(0,0,0,.07);
      text-decoration: none; color: inherit;
    }
    .partitura-item:first-child { border-top: 1px solid rgba(0,0,0,.07); }
    .partitura-item:active { background: rgba(0,0,0,.04); }

    /* Texto principal */
    .partitura-info { flex: 1; min-width: 0; }
    .partitura-titulo {
      font-weight: 700; font-size: .95rem; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #111;
    }
    .partitura-autor {
      font-size: .8rem; color: #6b7280; margin-top: .1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .partitura-dur {
      font-size: .75rem; color: #9ca3af;
    }

    /* Botones de acci├│n */
    .partitura-btns {
      display: flex; gap: .35rem; flex-shrink: 0;
    }
    .btn-partitura {
      display: inline-flex; align-items: center; justify-content: center;
      padding: .35rem .65rem; border-radius: 8px;
      font-size: .78rem; font-weight: 700; text-decoration: none;
      border: 1.5px solid; line-height: 1;
      transition: background .12s, transform .1s;
      white-space: nowrap;
    }
    .btn-partitura:active { transform: scale(.96); }
    .btn-pdf   { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-audio { background: transparent; color: #374151; border-color: #d1d5db; }

    /* Vac├φo / sin resultados */
    .empty {
      text-align: center; color: #9ca3af;
      padding: 2rem 1rem; font-size: .9rem;
    }
  </style>
</head>
<body data-page="partituras" class="page-partituras">
  <div class="container">

    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesi├│n" aria-label="Cerrar sesi├│n">έΟΜ</button>
    </div>

    <div class="hero" aria-label="Bienvenida">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="/imagenes/logoJOSG.png" alt="JOSG">
      <h1>┬κEn tu mano!</h1>
      <p>Partituras</p>

      <div class="panel">
        <div class="search">
          <input id="q" class="input" placeholder="Buscar por t├φtulo o autorέΑο" autocomplete="off">
        </div>

        <div id="list" class="partitura-list"></div>

        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-primary" onclick="location.href='/josgentumano/index.html'">
            έΗΡ Inicio
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Pill -->
  <script>
  (function(){
    function mostrarPill(){
      const pill = document.getElementById('user-pill');
      if (!pill) return;
      const nombre = (localStorage.getItem('alumno_nombre') || '').trim();
      if (!nombre) { pill.style.display = 'none'; return; }
      pill.querySelector('.avatar').textContent = (nombre[0] || 'U').toUpperCase();
      pill.querySelector('.name').textContent   = nombre;
      pill.style.display = 'inline-flex';
      const btn = document.getElementById('btn-logout');
      if (btn && localStorage.getItem('token')) btn.style.display = 'flex';
    }
    document.addEventListener('DOMContentLoaded', mostrarPill);
    window.addEventListener('pageshow', mostrarPill);
  })();
  </script>

  <!-- Logout -->
  <script>
  (function(){
    const btn = document.getElementById('btn-logout');
    function doLogout(){
      try {
        localStorage.removeItem('token');
        localStorage.removeItem('alumno_id');
        localStorage.removeItem('alumno_nombre');
      } catch(e){}
      location.href = '/josgentumano/login.html';
    }
    if (btn){
      btn.addEventListener('click', doLogout);
      btn.style.display = localStorage.getItem('token') ? 'flex' : 'none';
    }
  })();
  </script>

  <!-- L├│gica partituras -->
  <script>
  const API_BASE  = '/firmas';
  const alumno_id = localStorage.getItem('alumno_id');
  const token     = localStorage.getItem('token');
  if (!alumno_id || !token) { location.href = 'index.html'; }

  const $list = document.getElementById('list');
  const $q    = document.getElementById('q');
  let ALL = [];

  /* έΦΑέΦΑ Normaliza URL de partitura έΦΑέΦΑ */
  function normalizePublicURL(raw) {
    if (!raw) return '';
    let s = String(raw).trim();

    // URL absoluta: usar tal cual
    if (/^[a-zA-Z][\w.+-]*:\/\//.test(s)) return s;

    // Quitar prefijos de app autenticada
    s = s.replace(/^\/?(?:josgmaestro|firmas)\//i, '/')
         .replace(/^\/?public\//i, '/');

    // Asegurar barra inicial (caso partituren/ sin barra)
    if (!s.startsWith('/')) s = '/' + s;

    // Solo /partituren/... es ruta p├║blica v├κlida
    if (/^\/partituren\//i.test(s)) return s;

    // Cualquier otra έΗΤ fallback firmado
    return '';
  }

  const ensureProto = u => {
    if (!u) return '';
    const s = String(u).trim();
    if (!s) return '';
    if (/^[a-zA-Z][\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
    return 'https://' + s;
  };

  /* έΦΑέΦΑ Renderiza la lista έΦΑέΦΑ */
  function itemHTML(p, idx) {
    const titulo = (p.titulo || 'Sin t├φtulo').trim();
    const autor  = (p.autor  || '').trim();
    const dur    = (p.duracion || '').trim();

    // URL partitura
    const raw = (p.enlace_partitura || '').toString().trim();
    let hrefPart = '';
    if (raw) {
      const pub = normalizePublicURL(raw);
      if (pub) {
        hrefPart = pub;
      } else {
        const base = `${API_BASE}/api/alumno/${encodeURIComponent(alumno_id)}/partituras/${encodeURIComponent(p.id)}/archivo`;
        hrefPart = `${base}?tipo=partitura&jwt=${encodeURIComponent(token)}`;
      }
    }

    // URL audio
    const audioRaw = (p.enlace_audio || '').toString().trim();
    const hrefAudio = audioRaw ? ensureProto(audioRaw) : '';

    const btnPDF = hrefPart
      ? `<a class="btn-partitura btn-pdf" href="${hrefPart}" target="_blank" rel="noopener noreferrer">ΏθΥΕ PDF</a>`
      : '';
    const btnAudio = hrefAudio
      ? `<a class="btn-partitura btn-audio" href="${hrefAudio}" target="_blank" rel="noopener noreferrer">έΨ╢ Escuchar/Ver</a>`
      : '';

    const meta = [autor, dur].filter(Boolean).join(' ┬╖ ');

    return `
      <div class="partitura-item">
        <div class="partitura-info">
          <div class="partitura-titulo">${titulo}</div>
          ${meta ? `<div class="partitura-autor">${meta}</div>` : ''}
        </div>
        <div class="partitura-btns">
          ${btnPDF}
          ${btnAudio}
        </div>
      </div>`;
  }

  function render(list) {
    if (!Array.isArray(list) || !list.length) {
      $list.innerHTML = '<div class="empty">No hay partituras disponibles.</div>';
      return;
    }
    $list.innerHTML = list.map((p, i) => itemHTML(p, i)).join('');
  }

  /* έΦΑέΦΑ Filtro έΦΑέΦΑ */
  function norm(s) {
    return (s || '').toString().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
  }

  let debTimer;
  $q.addEventListener('input', () => {
    clearTimeout(debTimer);
    debTimer = setTimeout(() => {
      const q = norm($q.value);
      if (!q) { render(ALL); return; }
      render(ALL.filter(p => norm(`${p.titulo} ${p.autor}`).includes(q)));
    }, 150);
  });

  /* έΦΑέΦΑ Carga έΦΑέΦΑ */
  async function cargar() {
    try {
      const r = await fetch(
        `${API_BASE}/api/alumno/${encodeURIComponent(alumno_id)}/partituras`,
        { cache: 'no-store', headers: token ? { Authorization: 'Bearer ' + token } : {} }
      );
      if (!r.ok) throw new Error('Error ' + r.status);
      const j = await r.json();
      ALL = Array.isArray(j) ? j : (Array.isArray(j.data) ? j.data : []);
      render(ALL);
    } catch(e) {
      console.error(e);
      $list.innerHTML = '<div class="empty">Error al cargar las partituras.</div>';
    }
  }

  document.addEventListener('DOMContentLoaded', cargar);
  </script>

  <!-- Motivos musicales -->
  <script>
  (function(){
    const SYMBOLS  = ['έβσ','έβς','έβτ','έβυ','έβφ','έβψ','έβχ','ΏθΟ╡','ΏθΟ╢','ΏθΟ╝'];
    const MIN=7, MAX=10, SZ_MIN=36, SZ_MAX=80, ROT_MIN=-16, ROT_MAX=16;
    const PAD=10, EDGE=6, TRIES=80;
    const rInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
    const pick = a => a[Math.floor(Math.random()*a.length)];
    const rel  = (el,p) => { const r=el.getBoundingClientRect(),b=p.getBoundingClientRect(); return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height}; };
    const hit  = (a,b,p) => !(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

    function place(){
      const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer');
      if (!hero||!layer) return;
      layer.innerHTML='';
      const avoid=[];
      ['.hero-logo','h1','p','.panel .actions'].forEach(sel=>{
        const el=hero.querySelector(sel); if(!el) return;
        const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});
      });
      const placed=[], count=rInt(MIN,MAX);
      for(let i=0;i<count;i++){
        const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
        let ok=false;
        for(let t=0;t<TRIES;t++){
          const size=rInt(SZ_MIN,SZ_MAX), rot=rInt(ROT_MIN,ROT_MAX);
          s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
          const left=rInt(EDGE, Math.max(EDGE, hero.clientWidth-size-EDGE));
          const top =rInt(EDGE, Math.max(EDGE, hero.clientHeight-size-EDGE));
          s.style.left=left+'px'; s.style.top=top+'px';
          const rr=rel(s,hero);
          if (rr.x<EDGE||rr.y<EDGE||rr.x+rr.w>hero.clientWidth-EDGE||rr.y+rr.h>hero.clientHeight-EDGE) continue;
          if (avoid.some(av=>hit(rr,av,PAD))) continue;
          if (placed.some(pr=>hit(rr,pr,PAD))) continue;
          placed.push(rr); s.style.opacity=''; ok=true; break;
        }
        if (!ok) layer.removeChild(s);
      }
    }
    window.addEventListener('load', place);
    window.addEventListener('pageshow', e=>{ if(e.persisted) setTimeout(place,0); });
    let tm; window.addEventListener('resize', ()=>{ clearTimeout(tm); tm=setTimeout(place,120); });
  })();
  </script>
</body>
</html>
