<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Partituras</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    :root{
      --ink:#111; --muted:#6b7280; --line:#e5e7eb;
      --card-bg:#fff; --card-grad:#fafafa;
    }

    .muted{ color:var(--muted); font-size:.95rem; }

    /* Buscador */
    .search{ margin:8px 0 16px; display:flex; gap:.5rem; flex-wrap:wrap; }
    .input{
      padding:.55rem .65rem; border:1px solid var(--line); border-radius:10px;
      background:#fff; color:var(--ink); flex:1 1 280px;
    }
    .search button{
      padding:.55rem .9rem; border:1px solid var(--line); border-radius:10px;
      background:#fff; color:#111; font-weight:700; white-space:nowrap;
      box-shadow:0 1px 1px rgba(0,0,0,.02);
    }
    .search button:hover{ background:#f9fafb; }

    /* Una sola fila con scroll horizontal */
    .track{
      display:flex; gap:12px; overflow-x:auto; padding-bottom:6px;
      scrollbar-width:thin; scroll-snap-type:x proximity;
    }

    /* Tarjeta alargada y discreta */
    .card{
      scroll-snap-align:start;
      flex:0 0 480px;                        /* más anchas y uniformes */
      background:linear-gradient(180deg,var(--card-bg),var(--card-grad));
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    @media (max-width:420px){ .card{ flex-basis: 90%; } }

    .card h3{ margin:6px 0 6px; font-size:1.14rem; line-height:1.22; color:var(--ink); font-weight:800; }
    .card p{ margin:.35rem 0; color:var(--ink); }
    .meta{ font-size:.9rem; color:var(--muted); }

    /* Enlaces en píldora discretos */
    .links{ display:flex; flex-wrap:wrap; gap:.5rem; margin-top:8px; }
    .links a{
      display:inline-flex; align-items:center; gap:.4rem;
      text-decoration:none; background:#fff; color:#111;
      border:1px solid var(--line); border-radius:999px;
      padding:.38rem .65rem; font-weight:700; font-size:.9rem;
      box-shadow:0 1px 2px rgba(0,0,0,.03);
    }
    .links a:hover{ background:#fafafa; }
  
  </style>
  
</head>
<body data-page="partituras">
  <div class="container">
    <h2>Partituras</h2>

    <div class="search">
      <input id="q" class="input" placeholder="Buscar por título/autor...">
      <button onclick="filtrar()">Buscar</button>
    </div>

    <!-- ahora se renderiza en una sola línea con scroll -->
    <div id="list" class="track"></div>

    <div style="margin-top:1rem;">
      <button onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <script src="app_alumno.js"></script>
</body>
</html>
