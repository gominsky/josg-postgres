<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo de partituras</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    :root{
      --pcat-ink:#0f172a;
      --pcat-border:#e5e7eb;
      --pcat-accentA:#ea6b38;  /* tangerine corporativo */
      --pcat-accentB:#f59e0b;  /* naranja corporativo */
      --pcat-chip-bg:#ffffff;
      --pcat-chip-fg:#0f172a;
      --pcat-chip-bd:#ffffff;
    }

    body{ color:var(--pcat-ink); background:#fff; }

    /* Topbar con logo (como index) */
    .pcat-topbar{ display:flex; align-items:center; justify-content:space-between; margin:6px 0 2px; }
    .pcat-topbar img{ height:46px; }
    .pcat-topbar .pcat-spacer{ width:36px; height:36px; }

    .pcat-head{ text-align:center; margin:8px 0 6px; }
    .pcat-head h2{
      margin:0; font-weight:600; letter-spacing:.3px;
      font-size: clamp(22px, 5.2vw, 32px); color:#0f172a;
    }

    /* Buscador centrado */
    .pcat-search{
      display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center;
      margin: 6px 4px 14px;
    }
    .pcat-input{
      flex:1 1 260px; max-width:520px;
      padding:.6rem .75rem; border:1px solid var(--pcat-border); border-radius:12px;
      outline:0; background:#fff; color:#111827;
      transition: box-shadow .12s ease, border-color .12s ease;
    }
    .pcat-input:focus{ border-color:#94a3b8; box-shadow:0 0 0 3px rgba(148,163,184,.25); }
    .pcat-search button{
      padding:.6rem .95rem; border:1px solid #d1d5db; border-radius:12px; background:#fff; color:#111;
      font-weight:700; letter-spacing:.02em;
    }
    .pcat-search button:hover{ background:#f9fafb; }

    /* Carrusel horizontal */
    .pcat-track{
      display:flex; gap:12px; overflow-x:auto; padding: 4px 2px 12px; scrollbar-width:thin;
      scroll-snap-type:x proximity;
    }

    /* ===== Tarjeta a TODO color, 3 FILAS (autor, título, enlaces+duración) ===== */
    .pcat-card{
      scroll-snap-align:start;
      flex: 0 0 360px; border-radius:16px;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
      display:flex; padding:14px; color:#fff; min-height: 138px;
    }
    .pcat-track .pcat-card:nth-child(odd){  background: var(--pcat-accentA); }
    .pcat-track .pcat-card:nth-child(even){ background: var(--pcat-accentB); }

    .pcat-stack{ display:flex; flex-direction:column; gap:8px; width:100%; }

    /* Fila 1: Autor (grande) */
    .pcat-author{
      margin:0; font-weight:700; line-height:1.18; letter-spacing:.2px;
      font-size:1.14rem; color:#fff; text-shadow: 0 1px 0 rgba(0,0,0,.06);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* Fila 2: Título (algo menor) */
    .pcat-title{
      margin:0; font-weight:600; line-height:1.25; letter-spacing:.12px;
      font-size:1rem; color:#fff; opacity:.98;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }

    /* Fila 3: enlaces + duración */
    .pcat-footer{
      display:flex; align-items:center; justify-content:space-between; gap:.6rem; flex-wrap:wrap;
    }
    .pcat-chips{ display:flex; gap:.5rem; flex-wrap:wrap; }
    .pcat-chip{
      display:inline-block; text-decoration:none; font-weight:700; font-size:.93rem;
      padding:.5rem .8rem; border-radius:999px;
      background:var(--pcat-chip-bg); color:var(--pcat-chip-fg);
      border:1px solid var(--pcat-chip-bd);
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      white-space: nowrap;
    }
    .pcat-chip:hover{ transform: translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,.18); }
    .pcat-chip:active{ opacity:.9; transform: translateY(0); }

    .pcat-dur{
      color:#fff; font-weight:700; font-size:.85rem; opacity:.95;
      border:1px dashed rgba(255,255,255,.7); border-radius:999px; padding:.32rem .55rem;
    }

    .pcat-back{ margin: 12px 4px 2px; text-align:center; }
  </style>
</head>
<body data-page="partituras">
  <div class="container">
    <div class="pcat-topbar">
      <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG">
      <div class="pcat-spacer" aria-hidden="true"></div>
    </div>

    <div class="pcat-head">
      <h2>Catálogo de partituras</h2>
    </div>

    <div class="pcat-search">
      <input id="q" class="pcat-input" placeholder="Buscar por título o autor…">
      <button onclick="filtrar()">Buscar</button>
    </div>

    <div id="list" class="pcat-track"></div>

    <div class="pcat-back">
      <button onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <!-- 1) PLANTILLA: definir window.render ANTES de app_alumno.js -->
  <script>
  (function(){
    const mount = document.getElementById('list');
    if (!mount) return;

    function safe(u){
      try { if (typeof ensureProto === 'function') return ensureProto(u); } catch(_){}
      if (!u) return '';
      const s = String(u).trim();
      if (!s) return '';
      if (/^[a-zA-Z][\\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
      return 'https://' + s;
    }

    // PLANTILLA: 1) Autor, 2) Título, 3) Chips (Vídeo / Audio / Partitura) + duración
    window.render = function(list){
      if (!Array.isArray(list) || !list.length){
        mount.innerHTML = '<p style="margin:6px; color:#6b7280;">No hay partituras para tus grupos.</p>';
        return;
      }
      mount.innerHTML = list.map(p => {
        const autor  = (p.autor  || '—').trim();
        const titulo = (p.titulo || 'Sin título').trim();
        const dur    = (p.duracion || '').toString().trim();

        const chipVid  = p.enlace_video     ? `<a class="pcat-chip" href="${safe(p.enlace_video)}" target="_blank" rel="noopener">Vídeo</a>` : '';
        const chipAud  = p.enlace_audio     ? `<a class="pcat-chip" href="${safe(p.enlace_audio)}" target="_blank" rel="noopener">Audio</a>` : '';
        const chipPart = p.enlace_partitura ? `<a class="pcat-chip" href="${safe(p.enlace_partitura)}" target="_blank" rel="noopener">Partitura</a>` : '';

        return `
          <article class="pcat-card">
            <div class="pcat-stack">
              <h3 class="pcat-author">${autor}</h3>
              <p class="pcat-title">${titulo}</p>
              <div class="pcat-footer">
                <div class="pcat-chips">${chipVid}${chipAud}${chipPart}</div>
                ${dur ? `<span class="pcat-dur">${dur}</span>` : ''}
              </div>
            </div>
          </article>`;
      }).join('');
    };

    // Si ya hay datos (cargados por app_alumno.js), repinta
    if (Array.isArray(window.__PARTS)) {
      window.render(window.__PARTS);
    }
  })();
  </script>

  <!-- 2) LÓGICA DE CARGA (después, para que use la plantilla nueva) -->
  <script src="app_alumno.js"></script>
</body>
</html>
