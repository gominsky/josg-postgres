<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Partituras</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    /* Específico de esta página: buscador + tarjetas */
    .search{
      display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center;
      margin: 6px 4px 14px;
    }
    .input{
      flex:1 1 260px; max-width:520px;
      padding:.75rem .9rem; border:1px solid #e5e7eb; border-radius:12px;
      outline:0; background:#fff; color:#111827; font-size:1rem;
      transition:border-color .12s ease, box-shadow .12s ease;
    }
    .input:focus{ border-color:#f59e0b; box-shadow:0 0 0 4px rgba(245,158,11,.15); }

    .row-scroll{
      display:flex; gap:12px; overflow-x:auto; padding: 4px 2px 12px;
      scrollbar-width:thin; scroll-snap-type:x proximity;
    }
    .card{
      scroll-snap-align:start; flex: 0 0 360px; border-radius:16px; color:#fff;
      box-shadow:0 6px 18px rgba(0,0,0,.12); padding:14px; display:flex; flex-direction:column; gap:8px;
      min-height:148px; position:relative; overflow:hidden;
    }
    .card-a{ background:#ea6b38; } .card-b{ background:#f59e0b; }
    .author{ margin:0; font-weight:800; letter-spacing:.2px; font-size:1.1rem; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow: 0 1px 0 rgba(0,0,0,.06); }
    .title{ margin:0; font-weight:700; line-height:1.2; font-size:1.05rem; }
    .dur{ margin:.1rem 0 0; font-weight:700; font-size:.92rem; background:rgba(255,255,255,.18); display:inline-block; padding:.2rem .5rem; border-radius:.5rem; }

    .chips{ display:flex; gap:.5rem; flex-wrap:wrap; margin-top:2px; }
    .chip-link{
      display:inline-block; text-decoration:none; font-weight:700; font-size:.92rem;
      padding:.48rem .8rem; border-radius:999px; background:#ffffff; color:#111; border:1px solid #ffffff;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease; white-space:nowrap; max-width:100%; overflow-wrap:anywhere; word-break:break-word;
    }
    .card-a .chip-link{ color:#ad4319; } .card-b .chip-link{ color:#7a4d00; }
    .chip-link:hover{ transform: translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,.18); }

    /* Motivo suave sobre la tarjeta */
    .card > * { position:relative; z-index:1; }
    .card.m-staff::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,.22) 0 1px, transparent 1px 8px);
      opacity:.18; z-index:0;
    }
    .card .motif{
      position:absolute; right:-8px; bottom:-12px; pointer-events:none;
      font-size: var(--sz, 84px); line-height:1; color:#fff; opacity:.18; transform: rotate(var(--rot, -10deg)); filter: blur(.2px); z-index:0;
    }
    /* Autor un poco más grande */
.author{
  margin:0; font-weight:800; letter-spacing:.2px;
  font-size:1.25rem;         /* antes 1.1rem */
  line-height:1.15;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-shadow: 0 1px 0 rgba(0,0,0,.06);
}

/* Obra (título) y duración en blanco explícito */
.title{ margin:0; font-weight:700; line-height:1.2; font-size:1.05rem; color:#fff; }
.dur{
  margin:.1rem 0 0; font-weight:700; font-size:.92rem;
  color:#fff;                         /* forzado a blanco */
  background:rgba(255,255,255,.18);
  display:inline-block; padding:.2rem .5rem
}
/* === Fix de alfas mal escritos (evita que el navegador ignore reglas) === */
.dur{ background: rgba(255,255,255,.18) !important; }             /* antes: 18 */
.card.m-staff::before{
  background: repeating-linear-gradient(180deg,
    rgba(255,255,255,.22) 0 1px,                                     /* antes: 22 */
    transparent 1px 8px
  ) !important;
}

/* === Tipografía y color pedidos === */
.card .author{
  font-size: 1.25rem !important;   /* autor un poco más grande */
}

.card .title,
.card .dur{
  color: #fff !important;          /* obra + duración en blanco */
  text-shadow: 0 1px 0 rgba(0,0,0,.18); /* un pelín de contraste */
}

/* no tocar los chips: siguen con su color propio */

  </style>
</head>
<body data-page="partituras" class="page-partituras">
  <div class="container">
    <!-- Topbar unificada -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span><span class="name"></span>
      </div>
      <button id="btn-logout" class="icon-btn" title="Cerrar sesión" aria-label="Cerrar sesión">⎋</button>
    </div>

    <!-- HERO musical que ENVUELVE buscador + lista -->
    <div class="hero" aria-label="Bienvenida">
      <div class="motifs-layer" aria-hidden="true"></div>
      <img class="hero-logo" src="../imagenes/logoJOSG.png" alt="JOSG">
      <h1>¡En tu mano!</h1>
      <p>Partituras</p>

      <div class="panel">
        <div class="search">
          <input id="q" class="input" placeholder="Buscar por título o autor…">
        </div>

        <div id="list" class="row-scroll"></div>

        <div class="actions" style="margin-top:.9rem;">
          <button class="btn btn-primary" onclick="location.href='index.html'">&larr; Inicio</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Pill + botón -->
  <script>
    (function(){
      function mostrarPill(){
        const pill = document.getElementById('user-pill');
        if(!pill) return;
        const nombre = (localStorage.getItem('alumno_nombre') || '').trim();
        if(!nombre){ pill.style.display='none'; return; }
        pill.querySelector('.avatar').textContent = (nombre[0] || 'U').toUpperCase();
        pill.querySelector('.name').textContent   = nombre;
        pill.style.display = 'inline-flex';
        const btn = document.getElementById('btn-logout');
        if (btn && localStorage.getItem('token')) btn.style.display = 'flex';
      }
      document.addEventListener('DOMContentLoaded', mostrarPill);
      window.addEventListener('pageshow', mostrarPill);
    })();
  </script>

  <!-- Logout universal -->
  <script>
    (function () {
      const btn = document.getElementById('btn-logout');
      function doLogout(){
        try{
          localStorage.removeItem('token');
          localStorage.removeItem('alumno_id');
          localStorage.removeItem('alumno_nombre');
        }catch(e){}
        location.href = 'login.html';
      }
      if (btn){
        btn.addEventListener('click', doLogout);
        btn.style.display = localStorage.getItem('token') ? 'flex' : 'none';
      }
    })();
  </script>

  <!-- Lógica de Partituras -->
  <script>
    const API_BASE = '/firmas';
    const alumno_id = localStorage.getItem('alumno_id');
    const token     = localStorage.getItem('token');
    if (!alumno_id || !token) { location.href = 'index.html'; }

    const $list = document.getElementById('list');
    const $q    = document.getElementById('q');

    let ALL = [];
    function normalizePublicURL(raw){
    if (!raw) return '';
    let s = String(raw).trim();

    // 1) Protocolos absolutos (https, http, drive, etc.): usa tal cual
    if (/^[a-zA-Z][\w.+-]*:\/\//.test(s)) return s;

    // 2) Quita prefijos de app (evita zonas con login)
    s = s
      .replace(/^\/?(?:josgmaestro|firmas)\//i, '/')  // /josgmaestro/... -> /
      .replace(/^\/?public\//i, '/');                 // /public/... -> /

    // 3) Si apunta a /partituras o /uploads/partituras, déjalo limpio
    if (/^\/?(?:partituras|uploads\/partituras)\//i.test(s)) {
      s = '/' + s.replace(/^\/+/, '');                // asegura barra inicial
      // Normaliza /uploads/partituras -> /partituras (si sirves estático ahí)
      s = s.replace(/^\/uploads\/partituras\//i, '/partituras/');
      return s;
    }

    // 4) Caso “partituras/archivo.pdf” sin barra: añádela
    if (/^(?:partituras|uploads\/partituras)\//i.test(s)) {
      s = '/' + s;
      s = s.replace(/^\/uploads\/partituras\//i, '/partituras/');
      return s;
    }

    // 5) Cualquier otra ruta relativa: vuelve absoluta sobre este origen
    if (!s.startsWith('/')) s = '/' + s;
    return s;
  }
    // ✅ Arreglado el regex (detecta http:, https:, mailto:, etc.)
    const ensureProto = (u)=>{
      if (!u) return '';
      const s = String(u).trim();
      if (!s) return '';
      if (/^[a-zA-Z][\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
      return 'https://' + s;
    };
    const safeUrl = u => { try { return ensureProto(u); } catch { return ''; } };

    const randomSymbol = () => ['♩','♪','♫','♬'][Math.floor(Math.random()*4)];
    const randomRot  = () => (Math.floor(Math.random()*25) - 12) + 'deg';
    const randomSize = () => (78 + Math.floor(Math.random()*19)) + 'px';
    const randomMotifClass = () => (Math.random() < 0.55 ? 'm-staff' : '');

    function cardHTML(p, idx){
      const autor  = (p.autor || '—').trim();
      const titulo = (p.titulo || 'Sin título').trim();
      const dur    = (p.duracion || '').toString().trim();
        // Preferir enlace público si existe, si no el protegido con JWT
      const raw = (p.enlace_partitura || '').toString().trim();
      let hrefPart = '';
      if (raw) {
        const pub = normalizePublicURL(raw);
        if (pub) hrefPart = pub;           // ← primer intento: estático público
      }
      if (!hrefPart) {
        const base = `${API_BASE}/api/alumno/${encodeURIComponent(alumno_id)}/partituras/${encodeURIComponent(p.id)}/archivo`;
        hrefPart = `${base}?tipo=partitura&jwt=${encodeURIComponent(token)}`; // ← fallback firmado
      }
      const linkPart = hrefPart
        ? `<a class="chip-link" href="${hrefPart}" target="_blank" rel="noopener noreferrer">Partitura</a>`
        : '';

  
      const mediaRaw = p.enlace_video || p.enlace_audio || p.enlace_media || p.enlace || p.url_media || p.url || '';
      const linkMedia = String(mediaRaw).trim()
        ? `<a class="chip-link" href="${safeUrl(mediaRaw)}" target="_blank" rel="noopener noreferrer">Audio/Vídeo</a>` : '';

      const colorCls  = (idx % 2 === 0) ? 'card-a' : 'card-b';
      const motifCls  = randomMotifClass();
      const motifSym  = randomSymbol();
      const motifHTML = `<span class="motif" style="--rot:${randomRot()}; --sz:${randomSize()}">${motifSym}</span>`;

      return `
        <article class="card ${colorCls} ${motifCls}">
          <h3 class="author">${autor}</h3>
          <p class="title">${titulo}</p>
          ${dur ? `<p class="dur">Duración: ${dur}</p>` : ''}
          <div class="chips">${linkPart}${linkMedia}</div>
          ${motifHTML}
        </article>
      `;
    }

    function render(list){
      if (!Array.isArray(list) || list.length === 0){
        $list.innerHTML = `<p style="margin:6px; color:#6b7280;">No hay partituras para tus grupos.</p>`;
        return;
      }
      $list.innerHTML = list.map((p,i) => cardHTML(p,i)).join('');
    }

    function filtrar(){
      const q = ($q.value || '').toLowerCase();
      const out = ALL.filter(p => {
        const txt = `${p.titulo||''} ${p.autor||''}`.toLowerCase();
        return txt.includes(q);
      });
      render(out);
    }

    function debounce(fn, wait = 160){ let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); }; }
    $q.addEventListener('input', debounce(filtrar, 160));

    async function cargar(){
      try{
        const r = await fetch(`${API_BASE}/api/alumno/${encodeURIComponent(alumno_id)}/partituras`, {
          cache:'no-store',
          headers: token ? { 'Authorization':'Bearer ' + token } : {}
        });
        if (!r.ok) throw new Error('No se pudieron cargar las partituras');
        const j = await r.json();
        ALL = Array.isArray(j) ? j : (Array.isArray(j.data) ? j.data : []);
        render(ALL);
      }catch(e){
        console.error(e);
        $list.innerHTML = `<p style="margin:6px; color:#6b7280;">Error cargando las partituras.</p>`;
      }
    }
    document.addEventListener('DOMContentLoaded', cargar);
  </script>

  <!-- Motivos musicales -->
  <script>
    (function(){
      const SYMBOLS = ['♩','♪','♫','♬','♭','♯','♮','🎵','🎶','🎼'];
      const COUNT_MIN = 7, COUNT_MAX = 10;
      const SIZE_MIN = 36, SIZE_MAX = 80;
      const ROT_MIN  = -16, ROT_MAX  = 16;
      const PADDING  = 10, EDGE_PAD = 6, MAX_TRIES = 80;

      const rInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
      const pick=a=>a[Math.floor(Math.random()*a.length)];
      const rel=(el,p)=>{const r=el.getBoundingClientRect(),b=p.getBoundingClientRect();return {x:r.left-b.left,y:r.top-b.top,w:r.width,h:r.height};};
      const hit=(a,b,p)=>!(a.x+a.w+p<=b.x||b.x+b.w+p<=a.x||a.y+a.h+p<=b.y||b.y+b.h+p<=a.y);

      function place(){
        const hero=document.querySelector('.hero'), layer=document.querySelector('.motifs-layer'); if(!hero||!layer)return;
        layer.innerHTML='';
        const avoid=[]; ['.hero-logo','h1','p','.panel .actions'].forEach(sel=>{const el=hero.querySelector(sel); if(!el)return; const r=rel(el,hero); avoid.push({x:r.x-10,y:r.y-10,w:r.w+20,h:r.h+20});});
        const placed=[]; const count=rInt(COUNT_MIN,COUNT_MAX);
        for(let i=0;i<count;i++){
          const s=document.createElement('span'); s.className='motif'; s.textContent=pick(SYMBOLS); s.style.opacity='0'; layer.appendChild(s);
          let ok=false;
          for(let t=0;t<MAX_TRIES;t++){
            const size=rInt(SIZE_MIN,SIZE_MAX), rot=rInt(ROT_MIN,ROT_MAX);
            s.style.fontSize=size+'px'; s.style.transform=`rotate(${rot}deg)`;
            const left=rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientWidth - size - EDGE_PAD));
            const top =rInt(EDGE_PAD, Math.max(EDGE_PAD, hero.clientHeight - size - EDGE_PAD));
            s.style.left=left+'px'; s.style.top=top+'px';
            const rr=rel(s,hero);
            if (rr.x<EDGE_PAD||rr.y<EDGE_PAD||rr.x+rr.w>hero.clientWidth-EDGE_PAD||rr.y+rr.h>hero.clientHeight-EDGE_PAD) continue;
            if (avoid.some(av=>hit(rr,av,PADDING))) continue;
            if (placed.some(pr=>hit(rr,pr,PADDING))) continue;
            placed.push(rr); s.style.opacity=''; ok=true; break;
          }
          if(!ok) layer.removeChild(s);
        }
      }
      window.addEventListener('load',place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
