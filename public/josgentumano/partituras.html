<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡JOSG en tu mano! · Partituras</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    /* Específico de esta página: buscador + tarjetas */
    .search{
      display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center;
      margin: 6px 4px 14px;
    }
    .input{
      flex:1 1 260px; max-width:520px;
      padding:.75rem .9rem; border:1px solid #e5e7eb; border-radius:12px;
      outline:0; font-size:16px; line-height:1.2;
      box-shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 1px rgba(16,24,40,.04) inset;
    }
    .button{
      padding:.7rem 1rem; border:1px solid #111827; border-radius:12px;
      font-weight:700; background:#111827; color:#fff; cursor:pointer;
    }
    .button.secondary{ background:#fff; color:#111827; }
    .button:disabled{ opacity:.5; cursor:not-allowed; }

    .grid{
      display:grid; grid-template-columns:repeat(10, minmax(0,1fr)); gap:14px;
    }
    @media (max-width:1280px){ .grid{ grid-template-columns:repeat(8, minmax(0,1fr)); } }
    @media (max-width:1024px){ .grid{ grid-template-columns:repeat(6, minmax(0,1fr)); } }
    @media (max-width:768px) { .grid{ grid-template-columns:repeat(4, minmax(0,1fr)); } }
    @media (max-width:480px) { .grid{ grid-template-columns:repeat(2, minmax(0,1fr)); } }

    .cards{
      grid-column:1 / -1;
      display:flex; gap:14px; overflow:auto; scroll-snap-type:x mandatory; padding-bottom:4px;
    }
    .cards::-webkit-scrollbar{ height:8px; }
    .cards::-webkit-scrollbar-thumb{ background:#d1d5db; border-radius:999px; }
    .cards::-webkit-scrollbar-track{ background:transparent; }

    .card{
      scroll-snap-align:start; flex: 0 0 360px; border-radius:16px; color:#fff;
      box-shadow:0 6px 18px rgba(0,0,0,.12); padding:14px; display:flex; flex-direction:column; gap:8px;
      min-height:148px; position:relative; overflow:hidden;
    }
    .card-a{ background:#ea6b38; } .card-b{ background:#f59e0b; }
    .author{ margin:0; font-weight:800; letter-spacing:.2px; font-size:1.25rem; }
    .title{ margin:0; font-weight:700; line-height:1.2; font-size:1.05rem; }
    .dur{ margin:.1rem 0 0; font-weight:700; font-size:.92rem; background:rgba(255,255,255,.2); display:inline-block; padding:.2rem .5rem; border-radius:.5rem; }

    .chips{ display:flex; gap:.5rem; flex-wrap:wrap; margin-top:2px; }
    .chip-link{
      display:inline-block; text-decoration:none; font-weight:700; font-size:.92rem;
      padding:.48rem .8rem; border-radius:999px; background:#ffffff; color:#111; border:1px solid #ffffff;
      transition: transform .08s ease-out, box-shadow .15s ease;
    }
    .chip-link:hover{ transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,.18); }
    .chip-more{ background:transparent; border-color:#fff; color:#fff; }

    .pill{
      display:inline-flex; align-items:center; gap:.35rem; border:1px solid rgba(255,255,255,.68);
      background: rgba(17, 24, 39, .18); border-radius:999px; padding:.28rem .55rem; font-weight:700; font-size:.9rem;
    }
    .pill .dot{ width:.5rem; height:.5rem; border-radius:999px; display:inline-block; background:#10b981; }

    .actions{ margin-top:auto; display:flex; gap:.5rem; flex-wrap:wrap; }
    .btn{
      display:inline-flex; align-items:center; gap:.5rem; text-decoration:none; font-weight:800;
      padding:.5rem .7rem; border-radius:.6rem; border:1px solid rgba(255,255,255,.7);
      background: rgba(17,24,39,.18); color:#fff; transition: transform .08s ease-out, box-shadow .15s ease;
    }
    .btn:hover{ transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,.22); }
    .btn svg{ width:18px; height:18px; }

    /* Motivo suave sobre la tarjeta */
    .card > * { position:relative; z-index:1; }
    .card.m-staff::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,.22) 0 1px, transparent 1px 8px);
      opacity:.18; z-index:0;
    }
    .card .motif{
      position:absolute; right:-8px; bottom:-12px; pointer-events:none;
      font-size: var(--sz, 84px); line-height:1; color:#fff; opacity:.22; transform: rotate(var(--rot, -10deg)); filter: blur(.2px); z-index:0;
    }
    /* Autor un poco más grande */
.author{
  margin:0; font-weight:800; letter-spacing:.2px;
  font-size:1.25rem;         
  text-shadow: 0 1px 0 rgba(0,0,0,.18); 
}
.title{
  font-weight:700; line-height:1.2; 
  margin:0;
  font-size:1.05rem;
}
.dur{
  margin:.1rem 0 0; font-weight:700; font-size:.92rem; 
  background:rgba(255,255,255,.2); display:inline-block; padding:.2rem .5rem; 
  border-radius:.5rem; 
}
  </style>
</head>
<body data-page="partituras" class="page-partituras">
  <div class="container">
    <!-- Topbar unificada -->
    <div class="topbar">
      <div id="user-pill" class="user-pill" style="display:none;">
        <span class="avatar"></span>
        <span class="name"></span>
        <button id="logout" class="logout small">Salir</button>
      </div>
      <div class="logo">
        <a href="./index.html" class="brand">
          <img src="../images/logo.svg" alt="JOSG" />
          <span>JOSG</span>
        </a>
      </div>
    </div>

    <div class="search">
      <input id="q" class="input" type="search" placeholder="Buscar por título, autor, instrumento…" />
      <button id="refresh" class="button secondary">Recargar</button>
    </div>

    <div id="list" class="grid"></div>
  </div>

  <template id="x-icons">
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none;">
      <symbol id="icon-open" viewBox="0 0 24 24"><path fill="currentColor" d="M14 3h7v7h-2V6.41l-7.29 7.3l-1.42-1.42l7.3-7.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24"><path fill="currentColor" d="M11 15V8h2v7l2.5-2.5l1.42 1.42L12 19.34l-4.92-4.92L8.5 12.5L11 15ZM5 5h14v2H5V5Zm0 14h14v2H5v-2Z"/></symbol>
      <symbol id="icon-info" viewBox="0 0 24 24"><path fill="currentColor" d="M11 17h2v-6h-2v6Zm0-8h2V7h-2v2Zm1 13q-2.075 0-3.9-.788t-3.175-2.137Q3.575 18.575 2.788 16.75T2 12t.788-3.9T2.925 4.925Q4.275 3.575 6.1 2.788T10 2q2.075 0 3.9.788t3.175 2.137q1.35 1.35 2.138 3.175T20 12t-.787 3.9t-2.138 3.175q-1.35 1.35-3.175 2.138T12 22Z"/></symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24"><path fill="currentColor" d="M7 7V5h10v10h-2V7H7Zm-4 4V7h2v4h4v2H5v4H3v-6Zm8 8v-6h10v6H11Z"/></symbol>
      <symbol id="icon-link" viewBox="0 0 24 24"><path fill="currentColor" d="M10.59 13.41L9.17 12l-5.59 5.59L2 19l3.41 3.41l5.59-5.59L10.59 13.41ZM20.59 3.41L17.17 0l-5.59 5.59L13.41 7l7.18-7.18ZM21 8.59l-3 3l-4.59-4.59L17.41 4L21 8.59Z"/></symbol>
    </svg>
  </template>

  <script type="module">
    import { API_BASE, getAlumnoCreds, doLogout, formatFileSize } from '../scripts/app_common.js';

    (function initTopbar(){
      const pill = document.getElementById('user-pill');
      const { alumno_id, token, alumno_nombre } = getAlumnoCreds();
      if (alumno_id && token) {
        pill.style.display = 'inline-flex';
        pill.querySelector('.name').textContent = alumno_nombre || 'Alumno';
      }
      document.getElementById('logout').addEventListener('click', doLogout);
    })();

    (function main(){
      const { alumno_id, token } = getAlumnoCreds();
      if (!alumno_id || !token) { location.href = 'index.html'; }

      const $list = document.getElementById('list');
      const $q    = document.getElementById('q');

      let ALL = [];
      function normalizePublicURL(raw){
        if (!raw) return '';
        let s = String(raw).trim();

        // 1) Protocolos absolutos (https, http, drive, etc.): usa tal cual
        if (/^[a-zA-Z][\w.+-]*:\/\//.test(s)) return s;

        // 2) Quita prefijos de app (evita zonas con login)
        s = s
          .replace(/^\/?(?:josgmaestro|firmas)\//i, '/')  // /josgmaestro/... -> /
          .replace(/^\/?public\//i, '/');                 // /public/... -> /

        // 3) Si apunta a /partituren (nuevo) o /partituras (antiguo) o /uploads/*, déjalo limpio
        if (/^\/?(?:partituren|partituras|uploads\/partituren|uploads\/partituras)\//i.test(s)) {
          s = '/' + s.replace(/^\/+/, '');                // asegura barra inicial
          // Normaliza uploads -> /partituren y mapea /partituras -> /partituren (retrocompatibilidad)
          s = s.replace(/^\/uploads\/partituren\//i, '/partituren/');
          s = s.replace(/^\/uploads\/partituras\//i, '/partituren/');
          s = s.replace(/^\/partituras\//i, '/partituren/');
          return s;
        }

        // 4) Caso “partituren/archivo.pdf” (o partituras/...) sin barra: añádela
        if (/^(?:partituren|partituras|uploads\/partituren|uploads\/partituras)\//i.test(s)) {
          s = '/' + s;
          // Normaliza uploads -> /partituren y mapea /partituras -> /partituren (retrocompatibilidad)
          s = s.replace(/^\/uploads\/partituren\//i, '/partituren/');
          s = s.replace(/^\/uploads\/partituras\//i, '/partituren/');
          s = s.replace(/^\/partituras\//i, '/partituren/');
          return s;
        }

        // 5) Cualquier otra ruta relativa: vuelve absoluta sobre este origen
        if (!s.startsWith('/')) s = '/' + s;
        return s;
      }

      // Añade protocolo si falta (http/https/etc.)
      const ensureProto = (u)=>{
        if (!u) return '';
        const s = String(u).trim();
        if (!s) return '';
        if (/^[a-zA-Z][\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
        return 'https://' + s;
      };
      const safeUrl = u => { try { return ensureProto(u); } catch { return ''; } };

      const randomSymbol = () => ['♩','♪','♫','♬'][Math.floor(Math.random()*4)];
      const randomRot  = () => (Math.floor(Math.random()*25) - 12) + 'deg';
      const randomSize = () => (78 + Math.floor(Math.random()*19)) + 'px';
      const randomMotifClass = () => (Math.random() < 0.55 ? 'm-staff' : '');

      function cardHTML(p, idx){
        const autor  = (p.autor || '—').trim();
        const titulo = (p.titulo || 'Sin título').trim();
        const dur    = (p.duracion || '').trim();
        const motif  = randomSymbol();

        // Elegir el mejor enlace público (si existe)
        let hrefPart = normalizePublicURL(p.enlace_partitura || '');
        if (!hrefPart) {
          // Fallback firmado a través de la API
          const base = `${API_BASE}/api/alumno/${encodeURIComponent(alumno_id)}/partituras/${encodeURIComponent(p.id)}/archivo`;
          hrefPart = `${base}?tipo=partitura&jwt=${encodeURIComponent(token)}`;
        }

        let hrefAudio = safeUrl(p.enlace_audio || '');
        let hrefInfo  = safeUrl(p.enlace_info  || '');

        const motifClass = randomMotifClass();

        return `
        <div class="card ${idx % 2 ? 'card-a' : 'card-b'} ${motifClass}">
          <div class="motif" style="--rot:${randomRot()}; --sz:${randomSize()}">${motif}</div>

          <div class="pill"><span class="dot"></span> Partitura</div>
          <p class="author">${autor}</p>
          <h3 class="title">${titulo}</h3>
          ${dur ? `<p class="dur">${dur}</p>` : ''}

          <div class="chips">
            ${hrefPart ? `<a class="chip-link" href="${hrefPart}" target="_blank" rel="noopener">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><use href="#icon-open"></use></svg>
              Abrir partitura
            </a>` : ''}

            ${hrefAudio ? `<a class="chip-link" href="${hrefAudio}" target="_blank" rel="noopener">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><use href="#icon-link"></use></svg>
              Audio
            </a>` : ''}

            ${hrefInfo ? `<a class="chip-link chip-more" href="${hrefInfo}" target="_blank" rel="noopener">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><use href="#icon-info"></use></svg>
              Más info
            </a>` : ''}
          </div>

          <div class="actions">
            ${hrefPart ? `<a class="btn" href="${hrefPart}" download>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><use href="#icon-download"></use></svg>
              Descargar
            </a>` : ''}

            ${hrefPart ? `<button class="btn btn-copy" data-href="${hrefPart}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><use href="#icon-copy"></use></svg>
              Copiar enlace
            </button>` : ''}
          </div>
        </div>`;
      }

      function render(list){
        if (!Array.isArray(list) || !list.length) {
          $list.innerHTML = `<p style="margin:6px; color:#6b7280;">No hay partituras para tus grupos.</p>`;
          return;
        }
        const html = [
          `<div class="cards">`,
          ...list.map((p, i) => cardHTML(p, i)),
          `</div>`
        ].join('\n');
        $list.innerHTML = html;

        // Copiar enlace
        $list.querySelectorAll('.btn-copy').forEach(btn=>{
          btn.addEventListener('click', async (e)=>{
            const href = e.currentTarget.getAttribute('data-href');
            try {
              await navigator.clipboard.writeText(href);
              e.currentTarget.textContent = 'Copiado ✓';
              setTimeout(()=>{ e.currentTarget.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><use href="#icon-copy"></use></svg> Copiar enlace'; }, 1200);
            } catch {
              alert('No se pudo copiar el enlace.');
            }
          });
        });
      }

      function filter(q){
        q = (q||'').trim().toLowerCase();
        if (!q) return ALL;
        return ALL.filter(p => {
          const autor = (p.autor||'').toLowerCase();
          const titulo = (p.titulo||'').toLowerCase();
          const inst = (p.instrumento||'').toLowerCase();
          const dur = (p.duracion||'').toLowerCase();
          return autor.includes(q) || titulo.includes(q) || inst.includes(q) || dur.includes(q);
        });
      }

      async function load(){
        try{
          const r = await fetch(`${API_BASE}/api/alumno/${encodeURIComponent(alumno_id)}/partituras`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (!r.ok) throw new Error('No se pudieron cargar las partituras');
          const data = await r.json();
          ALL = Array.isArray(data) ? data : [];
          render(filter($q.value));
        }catch(e){
          console.error(e);
          $list.innerHTML = `<p style="margin:6px; color:#6b7280;">Error cargando las partituras.</p>`;
        }
      }

      document.getElementById('refresh').addEventListener('click', load);
      $q.addEventListener('input', () => render(filter($q.value)));

      load();

      // ajustar scroll-snap / centrado simple
      function place(){
        document.querySelectorAll('.cards').forEach(c=>{
          const w = c.getBoundingClientRect().width;
          c.scrollLeft = Math.max(0, (c.scrollWidth - w) / 2 - 16);
        });
      }
      window.addEventListener('load', place);
      window.addEventListener('pageshow',e=>{if(e.persisted)setTimeout(place,0);});
      let tm=null; window.addEventListener('resize',()=>{clearTimeout(tm);tm=setTimeout(place,120);});
    })();
  </script>
</body>
</html>
