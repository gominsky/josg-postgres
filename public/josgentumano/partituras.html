<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo de partituras</title>
  <link rel="stylesheet" href="../styles/estilos_app.css" />
  <style>
    :root{
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --chip:#f8fafc;
      --accentA:#ea6b38;  /* tangerine */
      --accentB:#f59e0b;  /* naranja corporativo */
      --accentA-30: rgba(234,107,56,.3);
      --accentB-30: rgba(245,158,11,.3);
    }

    body{ color:var(--ink); background:#fff; }

    /* Topbar con logo (igual que index) */
    .topbar{ display:flex; align-items:center; justify-content:space-between; margin:6px 0 2px; }
    .topbar img{ height:46px; }
    .topbar .spacer{ width:36px; height:36px; } /* para equilibrar sin botón */

    /* Cabecera */
    .head{ text-align:center; margin:8px 0 6px; }
    .head h2{
      margin:0; font-weight:600; letter-spacing:.3px;
      font-size: clamp(22px, 5.2vw, 32px); color:#0f172a;
    }

    /* Buscador centrado */
    .search{
      display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center;
      margin: 6px 4px 14px;
    }
    .input{
      flex:1 1 260px; max-width:520px;
      padding:.6rem .75rem; border:1px solid var(--border); border-radius:12px;
      outline:0; background:#fff; color:#111827;
      transition: box-shadow .12s ease, border-color .12s ease;
    }
    .input:focus{ border-color:#94a3b8; box-shadow:0 0 0 3px rgba(148,163,184,.25); }
    .search button{
      padding:.6rem .95rem; border:1px solid #d1d5db; border-radius:12px; background:#fff; color:#111;
      font-weight:700; letter-spacing:.02em;
    }
    .search button:hover{ background:#f9fafb; }

    /* Carrusel horizontal */
    .track{
      display:flex; gap:12px; overflow-x:auto; padding: 4px 2px 10px; scrollbar-width:thin;
      scroll-snap-type:x proximity;
    }

    /* ===== NUEVO DISEÑO DE FICHA (apaisada) ===== */
    .card{
      position:relative; scroll-snap-align:start;
      flex: 0 0 360px; background:#fff; border:1px solid var(--border); border-radius:16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      display:flex; gap:12px; padding:12px 14px;
      overflow:hidden;
    }
    /* barra vertical de acento (alternada) */
    .card::before{
      content:""; position:absolute; left:0; top:0; bottom:0; width:8px;
      background: var(--accentA);
    }
    .track .card:nth-child(even)::before{ background: var(--accentB); }

    .stack{ display:flex; flex-direction:column; gap:6px; width:100%; }

    .title{
      margin:0; font-weight:700; line-height:1.2; letter-spacing:.2px; font-size:1.05rem;
      color:#0f172a; padding-left:4px;
    }
    .meta{
      color:var(--muted); font-size:.92rem; padding-left:4px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .desc{
      color:#374151; padding-left:4px; margin-top:2px;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }

    /* Fila inferior: duración + enlaces */
    .footer{
      margin-top:4px; display:flex; align-items:center; justify-content:space-between;
      gap:.75rem; flex-wrap:wrap; padding-left:4px;
    }
    .dur{
      color:#0f172a; background:var(--chip);
      border:1px solid #e2e8f0; padding:.26rem .6rem; border-radius:999px; font-weight:600; font-size:.82rem;
    }
    /* ajustes de color según par/impar (sutil borde) */
    .track .card:nth-child(odd) .dur{ border-color: var(--accentA-30); }
    .track .card:nth-child(even) .dur{ border-color: var(--accentB-30); }

    .links{ display:flex; gap:.45rem; flex-wrap:wrap; }
    .btn-link{
      text-decoration:none; font-weight:700; font-size:.92rem; letter-spacing:.01em;
      padding:.44rem .76rem; border-radius:999px; background:#fff;
      border:1px solid #d1d5db; color:#0f172a;
      transition: background .12s ease, color .12s ease, transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    /* hover rellena con el color de la ficha (alternado) */
    .track .card:nth-child(odd) .btn-link:hover{
      color:#fff; background: var(--accentA); border-color: var(--accentA);
      transform: translateY(-1px); box-shadow: 0 6px 18px rgba(234,107,56,.22);
    }
    .track .card:nth-child(even) .btn-link:hover{
      color:#fff; background: var(--accentB); border-color: var(--accentB);
      transform: translateY(-1px); box-shadow: 0 6px 18px rgba(245,158,11,.22);
    }

    /* Botón volver centrado */
    .back{ margin: 12px 4px 2px; text-align:center; }
  </style>
</head>
<body data-page="partituras">
  <div class="container">
    <div class="topbar">
      <img src="/../imagenes/logoJOSG.png" alt="Logo JOSG">
      <div class="spacer" aria-hidden="true"></div>
    </div>

    <div class="head">
      <h2>Catálogo de partituras</h2>
    </div>

    <div class="search">
      <input id="q" class="input" placeholder="Buscar por título o autor…">
      <button onclick="filtrar()">Buscar</button>
    </div>

    <div id="list" class="track"></div>

    <div class="back">
      <button onclick="location.href='index.html'">&larr; Inicio</button>
    </div>
  </div>

  <script src="app_alumno.js"></script>
  <script>
  (function(){
    const mount = document.getElementById('list');
    if (!mount) return;

    function safe(u){
      try { if (typeof ensureProto === 'function') return ensureProto(u); } catch(_) {}
      if (!u) return '';
      const s = String(u).trim();
      if (!s) return '';
      if (/^[a-zA-Z][\\w.+-]*:/.test(s) || s.startsWith('//') || s.startsWith('/')) return s;
      return 'https://' + s;
    }

    // Render sólo para esta página (nuevo diseño)
    window.render = function(list){
      if (!Array.isArray(list) || !list.length){
        mount.innerHTML = '<p class="meta" style="margin:6px; color:#6b7280;">No hay partituras para tus grupos.</p>';
        return;
      }
      mount.innerHTML = list.map(p => {
        const titulo = p.titulo || 'Sin título';
        const autor  = (p.autor || '').trim();
        const arreg  = (p.arreglista || '').trim();
        const meta   = [autor && `<em>${autor}</em>`, arreg && `<em>arr. ${arreg}</em>`].filter(Boolean).join(' · ');
        const dur    = (p.duracion || '').toString().trim();
        const part   = p.enlace_partitura ? `<a class="btn-link" href="${safe(p.enlace_partitura)}" target="_blank" rel="noopener">Partitura</a>` : '';
        const aud    = p.enlace_audio ? `<a class="btn-link" href="${safe(p.enlace_audio)}" target="_blank" rel="noopener">Audio</a>` : '';

        return `
          <article class="card">
            <div class="stack">
              <h3 class="title">${titulo}</h3>
              ${meta ? `<div class="meta">${meta}</div>` : ''}
              ${p.descripcion ? `<p class="desc">${p.descripcion}</p>` : ''}
              <div class="footer">
                ${dur ? `<span class="dur">Duración: ${dur}</span>` : '<span></span>'}
                <div class="links">${part}${aud}</div>
              </div>
            </div>
          </article>`;
      }).join('');
    };
  })();
  </script>
</body>
</html>
